<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶可夢頂級帳號庫 - V84 2.5 Pro 真實等級標示版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyAXHqvXLLTmYl8kVV1fR0gJRFangwV85n8",
            authDomain: "pokemon-acc.firebaseapp.com",
            projectId: "pokemon-acc",
            storageBucket: "pokemon-acc.firebasestorage.app",
            messagingSenderId: "51529572144",
            appId: "1:51529572144:web:ae349a50d1152a755532f5",
            databaseURL: "https://pokemon-acc-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const inventoryRef = ref(db, 'inventory');
        let inventoryData = [];

        window.addEventListener('DOMContentLoaded', () => {
            ['googleSheetId', 'gasUrl', 'geminiApiKey'].forEach(id => {
                const savedValue = localStorage.getItem(id);
                if (savedValue) document.getElementById(id).value = savedValue;
            });
        });

        window.saveSettings = function() {
            ['googleSheetId', 'gasUrl', 'geminiApiKey'].forEach(id => {
                localStorage.setItem(id, document.getElementById(id).value.trim());
            });
            const btn = document.getElementById('saveBtn');
            btn.innerHTML = '✅ 已儲存';
            btn.classList.replace('bg-gray-800', 'bg-green-600');
            setTimeout(() => {
                btn.innerHTML = '💾 儲存設定';
                btn.classList.replace('bg-green-600', 'bg-gray-800');
            }, 2000);
        };

        onValue(inventoryRef, (snapshot) => {
            const data = snapshot.val();
            inventoryData = [];
            if (data) { Object.keys(data).forEach(key => inventoryData.push({ uid: key, ...data[key] })); }
            renderInventory(); 
        });

        window.syncAllToSheets = async function(btn) {
            const filterStatus = document.getElementById('filterStatus')?.value || 'all';
            const sortMode = document.getElementById('sortMode')?.value || 'priceDesc';
            const searchQuery = document.getElementById('searchInput')?.value.toLowerCase().trim() || '';

            let displayData = inventoryData.filter(item => {
                if (filterStatus === 'active' && item.status === 'sold') return false;
                if (filterStatus === 'sold' && item.status !== 'sold') return false;
                if (searchQuery && !item.accountId.toLowerCase().includes(searchQuery)) return false;
                return true;
            });

            displayData.sort((a, b) => {
                if (sortMode === 'priceDesc') return (parseInt(b.price)||0) - (parseInt(a.price)||0) || b.timestamp - a.timestamp;
                else if (sortMode === 'priceAsc') return (parseInt(a.price)||Infinity) - (parseInt(b.price)||Infinity) || b.timestamp - a.timestamp;
                else return b.timestamp - a.timestamp;
            });

            if(displayData.length === 0) return;
            if(!confirm(`確定要鏡像重排覆蓋到試算表嗎？`)) return;
            
            const sheetId = document.getElementById('googleSheetId').value.trim(); const scriptUrl = document.getElementById('gasUrl').value.trim();
            if(!sheetId || !scriptUrl) return;
            
            const oldText = btn.innerHTML; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 重排中...'; btn.disabled = true;
            const allData = displayData.map(item => ({ accountId: item.accountId, data: decodeURIComponent(item.fullText), status: item.status }));
            
            try {
                await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'syncExactOrder', id: sheetId, allData: allData }) });
                btn.innerHTML = '✅ 鏡像同步成功！'; setTimeout(() => { btn.innerHTML = oldText; btn.disabled = false; }, 3000);
            } catch (e) { btn.innerHTML = oldText; btn.disabled = false; }
        };

        window.markAsSold = async function(uid, accountId, btn) {
            const isAlreadySold = btn.innerText.includes('補塗');
            if(!isAlreadySold) {
                if(!confirm(`確定標記為售出？`)) return;
                update(ref(db, `inventory/${uid}`), { status: 'sold' });
            }
            const sheetId = document.getElementById('googleSheetId').value.trim(); const scriptUrl = document.getElementById('gasUrl').value.trim();
            if(sheetId && scriptUrl) {
                btn.disabled = true; const oldIcon = btn.innerHTML; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                try {
                    await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'sold', id: sheetId, accountId: accountId }) });
                    btn.innerHTML = '✅'; setTimeout(() => { btn.innerHTML = isAlreadySold ? '🟡 補塗' : '💰 售出'; btn.disabled = false; }, 2000);
                } catch(e) { btn.innerHTML = oldIcon; btn.disabled = false; }
            }
        };

        window.restoreAccount = async function(uid, accountId, btn) {
            if(!confirm(`確定要恢復為現貨嗎？`)) return;
            update(ref(db, `inventory/${uid}`), { status: 'active' });
            const sheetId = document.getElementById('googleSheetId').value.trim(); const scriptUrl = document.getElementById('gasUrl').value.trim();
            if(sheetId && scriptUrl) {
                btn.disabled = true; const oldIcon = btn.innerHTML; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                try {
                    await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'restore', id: sheetId, accountId: accountId }) });
                    btn.innerHTML = '✅'; 
                } catch(e) { btn.innerHTML = oldIcon; btn.disabled = false; }
            }
        };

        let currentEditUid = null;
        
        window.saveAccountToInventory = async function() {
            const getVal = (id) => document.getElementById(id).value;
            const getChk = (id) => document.getElementById(id).checked;
            const accountId = getVal('g_id').trim();
            if(!accountId) { showMsg("請輸入帳號代碼！", "red"); return; }
            
            const newItem = {
                accountId, level: getVal('g_level'), team: getVal('g_team'), price: getVal('g_price') || "未標價",
                stardust: getVal('g_stardust'), xp: getVal('g_xp'), rarecandy: getVal('st_rarecandy'), coin: getVal('st_coin'), 
                greenpass: getVal('st_greenpass'), masterball: getVal('st_masterball'), poke_bag: getVal('st_poke_bag'), item_bag: getVal('st_item_bag'), 
                rare_list: getVal('g_rare_list'), hundos: getVal('g_hundos'), st_hundo_leg: getVal('st_hundo_leg'), st_legend: getVal('st_legend'), 
                st_shiny: getVal('st_shiny'), st_shiny_leg: getVal('st_shiny_leg'), st_costume: getVal('st_costume'), st_bg_comm: getVal('st_bg_comm'), 
                st_bg_special: getVal('st_bg_special'), st_dyna: getVal('st_dyna'), st_giga: getVal('st_giga'), st_perfect: getVal('st_perfect'),
                st_old_poke: getVal('st_old_poke'), st_old_leg: getVal('st_old_leg'),
                chk_kyurem: getChk('chk_kyurem'), sel_kyurem: getVal('sel_kyurem'),
                chk_zamazenta: getChk('chk_zamazenta'), sel_dogs: getVal('sel_dogs'),
                chk_necrozma: getChk('chk_necrozma'), sel_necrozma: getVal('sel_necrozma'),
                chk_lati: getChk('chk_lati'), sel_lati: getVal('sel_lati'),
                chk_hoenn: getChk('chk_hoenn'), sel_hoenn: getVal('sel_hoenn'),
                chk_dyna_form: getChk('chk_dyna'), chk_groudon: getChk('chk_groudon'),
                chk_kyogre: getChk('chk_kyogre'), chk_rayquaza: getChk('chk_rayquaza'),
                fullText: encodeURIComponent(window.generateText()), status: getVal('g_item_status')
            };

            for(let i=1; i<=11; i++) newItem['chk_sp_'+i] = getChk('chk_sp_'+i);

            if (currentEditUid) {
                const existingItem = inventoryData.find(i => i.uid === currentEditUid);
                newItem.timestamp = existingItem ? existingItem.timestamp : Date.now();
                update(ref(db, `inventory/${currentEditUid}`), newItem);
                showMsg("✅ 帳號資料已更新！", "green");
                const sheetId = document.getElementById('googleSheetId').value.trim(); const scriptUrl = document.getElementById('gasUrl').value.trim();
                if(sheetId && scriptUrl) fetch(scriptUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'add', id: sheetId, accountId: accountId, data: decodeURIComponent(newItem.fullText) }) });
            } else {
                newItem.timestamp = Date.now(); push(inventoryRef, newItem); showMsg("✅ 帳號已新增！", "green");
            }
            window.resetForm();
        };

        function showMsg(text, color) {
            const msg = document.createElement('div');
            msg.className = `fixed top-20 left-1/2 -translate-x-1/2 bg-${color}-600 text-white px-6 py-2 rounded-full shadow-lg z-[100] animate-bounce`;
            msg.innerHTML = text; document.body.appendChild(msg); setTimeout(() => msg.remove(), 2500);
        }

        window.editAccount = function(uid) {
            const item = inventoryData.find(i => i.uid === uid); if(!item) return;
            window.togglePage(1); 
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            const setVal = (id, val) => { document.getElementById(id).value = val || ''; };
            const setChk = (id, val) => { document.getElementById(id).checked = !!val; };

            setVal('g_id', item.accountId); setVal('g_level', item.level); setVal('g_team', item.team || '藍隊');
            setVal('g_price', item.price === "未標價" ? "" : item.price); setVal('g_stardust', item.stardust); setVal('g_xp', item.xp);
            setVal('st_rarecandy', item.rarecandy); setVal('st_coin', item.coin); setVal('st_greenpass', item.greenpass);
            setVal('st_masterball', item.masterball); setVal('st_poke_bag', item.poke_bag); setVal('st_item_bag', item.item_bag);
            setVal('g_rare_list', item.rare_list); setVal('g_hundos', item.hundos); setVal('g_item_status', item.status || 'active');
            setVal('st_hundo_leg', item.st_hundo_leg); setVal('st_legend', item.st_legend); setVal('st_shiny', item.st_shiny);
            setVal('st_shiny_leg', item.st_shiny_leg); setVal('st_costume', item.st_costume); setVal('st_bg_comm', item.st_bg_comm);
            setVal('st_bg_special', item.st_bg_special); setVal('st_dyna', item.st_dyna); setVal('st_giga', item.st_giga); setVal('st_perfect', item.st_perfect);
            setVal('st_old_poke', item.st_old_poke); setVal('st_old_leg', item.st_old_leg);

            const txt = decodeURIComponent(item.fullText || "");

            setChk('chk_sp_1', item.chk_sp_1 !== undefined ? item.chk_sp_1 : txt.includes('色違美洛耶塔'));
            setChk('chk_sp_2', item.chk_sp_2 !== undefined ? item.chk_sp_2 : txt.includes('色違夢幻'));
            setChk('chk_sp_3', item.chk_sp_3 !== undefined ? item.chk_sp_3 : (txt.includes('凱路迪歐') && !txt.includes('凱路迪歐,瑪夏多')));
            setChk('chk_sp_4', item.chk_sp_4 !== undefined ? item.chk_sp_4 : txt.includes('至尊鳳王'));
            setChk('chk_sp_5', item.chk_sp_5 !== undefined ? item.chk_sp_5 : txt.includes('至尊洛奇亞'));
            setChk('chk_sp_6', item.chk_sp_6 !== undefined ? item.chk_sp_6 : (txt.includes('瑪夏多') && !txt.includes('凱路迪歐,瑪夏多')));
            setChk('chk_sp_7', item.chk_sp_7 !== undefined ? item.chk_sp_7 : txt.includes('色違基拉祈'));
            setChk('chk_sp_8', item.chk_sp_8 !== undefined ? item.chk_sp_8 : txt.includes('色違謝米'));
            setChk('chk_sp_9', item.chk_sp_9 !== undefined ? item.chk_sp_9 : txt.includes('波爾凱尼恩'));
            setChk('chk_sp_10', item.chk_sp_10 !== undefined ? item.chk_sp_10 : txt.includes('薩戮德'));
            setChk('chk_sp_11', item.chk_sp_11 !== undefined ? item.chk_sp_11 : txt.includes('凱路迪歐,瑪夏多'));

            const hasKyurem = item.chk_kyurem !== undefined ? item.chk_kyurem : txt.includes('酋雷姆合體');
            setChk('chk_kyurem', hasKyurem);
            if(txt.includes('‼️酋雷姆雙型態合體‼️')) setVal('sel_kyurem', '‼️酋雷姆雙型態合體‼️');
            else if(txt.includes('‼️闇黑酋雷姆合體‼️')) setVal('sel_kyurem', '‼️闇黑酋雷姆合體‼️');
            else if(txt.includes('‼️焰白酋雷姆合體‼️')) setVal('sel_kyurem', '‼️焰白酋雷姆合體‼️');
            else setVal('sel_kyurem', item.sel_kyurem || '‼️酋雷姆雙型態合體‼️');

            const hasDogs = item.chk_zamazenta !== undefined ? item.chk_zamazenta : txt.includes('劍盾');
            setChk('chk_zamazenta', hasDogs);
            if(txt.includes('‼️雙狗劍盾型態‼️')) setVal('sel_dogs', '‼️雙狗劍盾型態‼️');
            else if(txt.includes('‼️蒼響劍盾型態‼️')) setVal('sel_dogs', '‼️蒼響劍盾型態‼️');
            else if(txt.includes('‼️藏瑪然特劍盾型態‼️')) setVal('sel_dogs', '‼️藏瑪然特劍盾型態‼️');
            else setVal('sel_dogs', item.sel_dogs || '‼️雙狗劍盾型態‼️');

            const hasNecrozma = item.chk_necrozma !== undefined ? item.chk_necrozma : txt.includes('奈克洛茲瑪');
            setChk('chk_necrozma', hasNecrozma);
            if(txt.includes('‼️奈克洛茲瑪雙型態合體‼️')) setVal('sel_necrozma', '‼️奈克洛茲瑪雙型態合體‼️');
            else if(txt.includes('‼️奈克洛茲瑪日獅型態合體‼️')) setVal('sel_necrozma', '‼️奈克洛茲瑪日獅型態合體‼️');
            else if(txt.includes('‼️奈克洛茲瑪月亮型態合體‼️')) setVal('sel_necrozma', '‼️奈克洛茲瑪月亮型態合體‼️');
            else setVal('sel_necrozma', item.sel_necrozma || '‼️奈克洛茲瑪雙型態合體‼️');

            const hasLati = item.chk_lati !== undefined ? item.chk_lati : (txt.includes('飛機兄妹') || txt.includes('拉帝'));
            setChk('chk_lati', hasLati);
            if(txt.includes('⭐️飛機兄妹可Mega⭐️')) setVal('sel_lati', '⭐️飛機兄妹可Mega⭐️');
            else if(txt.includes('⭐️拉帝歐斯可Mega⭐️')) setVal('sel_lati', '⭐️拉帝歐斯可Mega⭐️');
            else if(txt.includes('⭐️拉帝亞斯可Mega⭐️')) setVal('sel_lati', '⭐️拉帝亞斯可Mega⭐️');
            else setVal('sel_lati', item.sel_lati || '⭐️飛機兄妹可Mega⭐️');

            const hasHoenn = item.chk_hoenn !== undefined ? item.chk_hoenn : (txt.includes('豐原三神') || txt.includes('豐原雙神') || txt.includes('固拉多可 Mega') || txt.includes('蓋歐卡可 Mega') || txt.includes('烈空坐能量夠Mega'));
            setChk('chk_hoenn', hasHoenn);
            if(txt.includes('⭐️豐原三神可 Mega⭐️')) setVal('sel_hoenn', '⭐️豐原三神可 Mega⭐️');
            else if(txt.includes('⭐️豐原雙神可 Mega⭐️')) setVal('sel_hoenn', '⭐️豐原雙神可 Mega⭐️');
            else if(txt.includes('⭐️固拉多可 Mega⭐️')) setVal('sel_hoenn', '⭐️固拉多可 Mega⭐️');
            else if(txt.includes('⭐️蓋歐卡可 Mega⭐️')) setVal('sel_hoenn', '⭐️蓋歐卡可 Mega⭐️');
            else if(txt.includes('⭐️烈空坐能量夠Mega⭐️')) setVal('sel_hoenn', '⭐️烈空坐能量夠Mega⭐️');
            else setVal('sel_hoenn', item.sel_hoenn || '⭐️豐原三神可 Mega⭐️');

            setChk('chk_dyna', item.chk_dyna_form !== undefined ? item.chk_dyna_form : txt.includes('✨可打極巨化／超極巨化✨'));
            setChk('chk_groudon', item.chk_groudon !== undefined ? item.chk_groudon : txt.includes('固拉多斷崖之劍'));
            setChk('chk_kyogre', item.chk_kyogre !== undefined ? item.chk_kyogre : txt.includes('蓋歐卡根源波動'));
            setChk('chk_rayquaza', item.chk_rayquaza !== undefined ? item.chk_rayquaza : txt.includes('烈空坐畫龍點睛'));

            document.getElementById('sel_kyurem').classList.toggle('hidden', !document.getElementById('chk_kyurem').checked);
            document.getElementById('sel_dogs').classList.toggle('hidden', !document.getElementById('chk_zamazenta').checked);
            document.getElementById('sel_necrozma').classList.toggle('hidden', !document.getElementById('chk_necrozma').checked);
            document.getElementById('sel_lati').classList.toggle('hidden', !document.getElementById('chk_lati').checked);
            document.getElementById('sel_hoenn').classList.toggle('hidden', !document.getElementById('chk_hoenn').checked);
            
            currentEditUid = uid;
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = '💾 儲存修改';
            submitBtn.classList.replace('bg-red-600', 'bg-blue-600');
            submitBtn.classList.replace('hover:bg-red-700', 'hover:bg-blue-700');
            document.getElementById('cancelEditBtn').classList.remove('hidden');

            showMsg("✅ 自動反向解析完成！勾選狀態已完美還原！", "blue");
        };

        window.deleteAccount = async function(uid, accountId) {
            if(confirm('確定要永久刪除此紀錄嗎？')) { 
                remove(ref(db, `inventory/${uid}`)); 
                const sId = document.getElementById('googleSheetId').value; const gUrl = document.getElementById('gasUrl').value; 
                if(sId && gUrl) fetch(gUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'delete', id: sId, accountId: accountId }) }); 
            }
        };

        window.renderInventory = function() {
            const tbody = document.getElementById('inventoryBody'); if(!tbody) return; tbody.innerHTML = ''; 
            const filterStatus = document.getElementById('filterStatus')?.value || 'all'; const sortMode = document.getElementById('sortMode')?.value || 'priceDesc'; const searchQuery = document.getElementById('searchInput')?.value.toLowerCase().trim() || '';
            let displayData = inventoryData.filter(item => {
                if (filterStatus === 'active' && item.status === 'sold') return false;
                if (filterStatus === 'sold' && item.status !== 'sold') return false;
                if (searchQuery && !item.accountId.toLowerCase().includes(searchQuery)) return false;
                return true;
            });
            displayData.sort((a, b) => {
                if (sortMode === 'priceDesc') return (parseInt(b.price)||0) - (parseInt(a.price)||0) || b.timestamp - a.timestamp;
                else if (sortMode === 'priceAsc') return (parseInt(a.price)||Infinity) - (parseInt(b.price)||Infinity) || b.timestamp - a.timestamp;
                else return b.timestamp - a.timestamp;
            });
            displayData.forEach(item => {
                const isS = item.status === 'sold'; const rC = isS ? 'bg-amber-50 opacity-80' : 'hover:bg-blue-50 bg-white'; const nR = document.createElement('tr'); nR.className = `${rC} border-b border-gray-100 transition duration-300`;
                let tC = item.team === '紅隊' ? 'text-red-500' : (item.team === '藍隊' ? 'text-blue-500' : 'text-yellow-500');
                const sB = isS ? '<span class="ml-2 bg-red-100 text-red-600 text-[10px] px-2 py-0.5 rounded-full font-bold border border-red-200">SOLD</span>' : '<span class="ml-2 bg-green-100 text-green-600 text-[10px] px-2 py-0.5 rounded-full font-bold border border-green-200">STOCK</span>';
                
                const aB = isS 
                    ? `<button onclick="window.markAsSold('${item.uid}', '${item.accountId}', this)" class="bg-amber-100 text-amber-800 border border-amber-300 px-2 py-1 rounded text-[10px] shadow-sm font-bold">🟡 補塗</button>
                       <button onclick="window.restoreAccount('${item.uid}', '${item.accountId}', this)" class="bg-green-100 hover:bg-green-200 text-green-800 border border-green-300 px-2 py-1 rounded text-[10px] shadow-sm font-bold transition">🟢 恢復</button>` 
                    : `<button onclick="window.markAsSold('${item.uid}', '${item.accountId}', this)" class="bg-amber-400 text-gray-900 px-2 py-1 rounded text-[10px] shadow-sm font-bold transition transform active:scale-95">💰 售出</button>`;
                
                const sId = item.accountId.substring(0, 6).toUpperCase(); const lD = item.level ? `${item.level}等 ` : '';
                
                nR.innerHTML = `<td class="px-4 py-4"><div class="font-mono font-bold text-base uppercase flex items-center">${sId}${sB}</div><div class="text-[10px] text-gray-400 font-mono mt-0.5 break-all">${item.accountId}</div></td><td class="px-4 py-4 text-sm font-bold ${tC}">${lD}${item.team}</td><td class="px-4 py-4 text-sm text-red-600 font-bold">$ ${item.price}</td><td class="px-4 py-4 text-center"><div class="flex gap-1 justify-center flex-wrap"><button onclick="window.copyInventoryText('${item.fullText}', this)" class="bg-gray-800 text-white px-2 py-1 rounded text-[10px] shadow-sm">複製</button>${aB}<button onclick="window.editAccount('${item.uid}')" class="bg-blue-500 text-white px-2 py-1 rounded text-[10px] shadow-sm">✏️</button></div></td><td class="px-4 py-4 text-center"><button onclick="window.deleteAccount('${item.uid}', '${item.accountId}')" class="text-red-300 hover:text-red-600 p-1"><i class="fas fa-trash-alt"></i></button></td>`;
                tbody.appendChild(nR);
            });

            if(valid(v('st_legend'))) res.push(`✅神獸總數${v('st_legend')}隻`); 
            if(valid(v('st_shiny'))) res.push(`✅色違寶可夢${v('st_shiny')}隻`);
            if(valid(v('st_shiny_leg'))) res.push(`✅色違神獸${v('st_shiny_leg')}隻`); 
            
            if(valid(v('st_costume'))) res.push(`✅裝扮寶可夢${v('st_costume')}隻`);
            if(valid(v('st_bg_comm'))) res.push(`✅紀念背卡${v('st_bg_comm')}隻`); 
            if(valid(v('st_bg_special'))) res.push(`✅特別背卡${v('st_bg_special')}隻`);
            
            if(valid(v('st_dyna'))) res.push(`✅極巨化${v('st_dyna')}隻`); 
            if(valid(v('st_giga'))) res.push(`✅超極巨化${v('st_giga')}隻`);
            if(valid(v('st_perfect'))) res.push(`✅完美${v('st_perfect')}隻`);
            
            let pb = parseNum(v('st_poke_bag')); if(!isNaN(pb) && pb >= 1000) res.push(`🎒寶可夢背包 ${v('st_poke_bag')}`);
            let ib = parseNum(v('st_item_bag')); if(!isNaN(ib) && ib >= 1000) res.push(`🎒道具背包 ${v('st_item_bag')}`);
            
            if(valid(v('st_masterball'))) res.push(`🩷大師球*${v('st_masterball')}`);
            if(valid(v('st_greenpass'))) res.push(`🩷綠票${v('st_greenpass')}張`); 
            if(!isBelow60 && valid(v('st_rarecandy'))) res.push(`🩷神奇糖果 ${v('st_rarecandy')} 顆`); // ✅ 已精確修改此處
            if(valid(v('st_coin'))) res.push(`寶可幣 ${v('st_coin')}`); 
            if(valid(v('g_price'))) res.push(`💰價格 ${v('g_price')}`);
            
            return res.join('\n');
        };

        window.copyInventoryText = function(txt, btn) {
            const area = document.getElementById('hiddenCopyArea'); area.style.display = 'block'; area.value = decodeURIComponent(txt);
            area.select(); document.execCommand('copy'); area.style.display = 'none';
            btn.innerHTML = '已複製'; setTimeout(() => btn.innerHTML = '複製', 1500);
        };

        window.copySimpleText = function(txt, btn) {
            const area = document.getElementById('hiddenCopyArea'); area.style.display = 'block'; area.value = txt;
            area.select(); document.execCommand('copy'); area.style.display = 'none';
            const oldT = btn.innerHTML; btn.innerHTML = '✅'; setTimeout(() => btn.innerHTML = oldT, 1200);
        };
    </script>
