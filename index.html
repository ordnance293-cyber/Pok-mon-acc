<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帳號管理中心 - 專業帳號整理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        /* 自訂彈窗的滾動條美化 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c7c7cc; border-radius: 8px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased relative">

    <header class="sticky top-0 z-50 glass-effect border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2">
                    <div class="bg-blue-600 p-2 rounded-lg text-white shadow-md">
                        <i class="fas fa-gamepad text-xl"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight text-gray-900">寶可夢頂級帳號庫</span>
                </div>
                <div class="flex items-center space-x-4">
                    <img class="h-8 w-8 rounded-full border border-gray-300 shadow-sm" src="https://picsum.photos/id/64/100/100" alt="Avatar">
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-blue-100 mb-8">
            <div class="flex items-center gap-3 mb-4">
                <div class="bg-blue-100 p-3 rounded-xl text-blue-600">
                    <i class="fas fa-bolt text-xl"></i>
                </div>
                <div>
                    <h2 class="text-lg font-bold text-gray-900">極速文案解析區</h2>
                    <p class="text-sm text-gray-500">直接將您的「賣場文案」貼在下方。若有多隻帳號，請在帳號之間保留「一個空白行」即可自動分開處理。</p>
                </div>
            </div>
            
            <textarea id="bulkDataInput" rows="6" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all font-mono text-sm mb-4 custom-scrollbar" placeholder="在此貼上您的帳號介紹文案... (可直接貼上包含 emoji 的整段文字)"></textarea>
            
            <div class="flex justify-between items-center">
                <p class="text-xs text-blue-600 font-medium bg-blue-50 px-3 py-1 rounded-full"><i class="fas fa-robot mr-1"></i>系統將自動抓取：編號、等級、星塵與價格</p>
                <button onclick="processBulkData()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl font-medium transition-all shadow-md flex items-center gap-2 transform hover:scale-105">
                    <i class="fas fa-magic"></i> 智慧解析並建立
                </button>
            </div>
        </div>

        <section class="mb-6 flex flex-col md:flex-row gap-4 justify-between items-center">
            <div class="relative w-full md:w-96">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="accountSearch" placeholder="搜尋編號、等級或關鍵字..." 
                    class="w-full pl-10 pr-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
            </div>
            <div class="flex gap-2 w-full md:w-auto overflow-x-auto pb-2 md:pb-0 items-center">
                <button class="px-4 py-2 bg-gray-200 rounded-full text-sm font-medium whitespace-nowrap">全部帳號</button>
                <div class="w-px h-6 bg-gray-300 mx-2 hidden md:block"></div>
                <button onclick="exportTableToCSV('寶可夢庫存清單.csv')" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-full text-sm font-medium whitespace-nowrap transition-all shadow-sm flex items-center gap-2">
                    <i class="fas fa-file-excel"></i>匯出 CSV
                </button>
            </div>
        </section>

        <section class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse" id="mainTable">
                    <thead>
                        <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider font-semibold">
                            <th class="px-6 py-4">帳號編號</th>
                            <th class="px-6 py-4">等級與陣營</th>
                            <th class="px-6 py-4">重點資源</th>
                            <th class="px-6 py-4">售價 (NT$)</th>
                            <th class="px-6 py-4 text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100" id="accountTable">
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-3">
                                    <div class="bg-gray-100 p-2 rounded-lg text-gray-500"><i class="fas fa-hashtag"></i></div>
                                    <p class="font-bold text-gray-900 text-lg">0000範例</p>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-sm font-bold text-blue-600">請貼上文案以產生</td>
                            <td class="px-6 py-4 text-sm text-gray-500"><i class="fas fa-star text-yellow-400 mr-1"></i>星塵: ---</td>
                            <td class="px-6 py-4">
                                <span class="px-3 py-1 bg-yellow-100 text-yellow-800 text-sm font-bold rounded-full">---</span>
                            </td>
                            <td class="px-6 py-4 text-center">
                                <button class="text-blue-600 hover:text-blue-800 font-medium text-sm px-3 py-1 bg-blue-50 rounded-lg"><i class="fas fa-eye mr-1"></i>詳情</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex justify-between items-center text-sm text-gray-500">
                <p id="tableStatus">準備就緒，等待匯入資料</p>
            </div>
        </section>
    </main>

    <div id="detailModal" class="fixed inset-0 bg-gray-900 bg-opacity-60 z-[100] hidden flex justify-center items-center backdrop-blur-sm transition-opacity opacity-0">
        <div class="bg-white rounded-2xl max-w-md w-full mx-4 shadow-2xl transform transition-all scale-95 border border-gray-100" id="modalCard">
            <div class="flex justify-between items-center border-b border-gray-100 px-6 py-4 bg-gray-50 rounded-t-2xl">
                <h3 class="text-lg font-bold text-gray-900 flex items-center gap-2"><i class="fas fa-clipboard-list text-blue-500"></i> 完整文案內容</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 transition-colors"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div id="modalContent" class="px-6 py-4 text-sm text-gray-700 leading-relaxed max-h-[60vh] overflow-y-auto custom-scrollbar font-sans">
                </div>
            <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 rounded-b-2xl text-right">
                <button onclick="copyModalText()" class="bg-gray-800 hover:bg-black text-white px-4 py-2 rounded-lg text-sm font-medium transition-all shadow-sm mr-2"><i class="far fa-copy mr-1"></i>複製文案</button>
                <button onclick="closeModal()" class="bg-white border border-gray-300 hover:bg-gray-100 text-gray-700 px-4 py-2 rounded-lg text-sm font-medium transition-all">關閉</button>
            </div>
        </div>
    </div>

    <textarea id="hiddenCopyArea" class="hidden"></textarea>

    <script>
        // 搜尋過濾邏輯
        document.getElementById('accountSearch').addEventListener('keyup', function() {
            let filter = this.value.toUpperCase();
            let rows = document.querySelector("#accountTable").getElementsByTagName("tr");
            
            for (let i = 0; i < rows.length; i++) {
                let text = rows[i].textContent || rows[i].innerText;
                rows[i].style.display = text.toUpperCase().indexOf(filter) > -1 ? "" : "none";
            }
        });

        // 智慧批次解析邏輯
        function processBulkData() {
            const input = document.getElementById('bulkDataInput').value;
            if(!input.trim()) {
                alert("請先貼上賣場文案！");
                return;
            }

            // 利用兩個以上的換行符號來分割不同的帳號區塊 (若用戶一次貼多個)
            const blocks = input.split(/\n\s*\n/);
            const tableBody = document.getElementById('accountTable');
            let addedCount = 0;

            // 清除預設範例
            if(tableBody.innerHTML.includes('0000範例')) {
                tableBody.innerHTML = '';
            }

            blocks.forEach((block) => {
                if(!block.trim()) return;
                
                // 將單一帳號的文字逐行拆解
                const lines = block.split('\n').map(l => l.trim()).filter(l => l !== '');
                if(lines.length === 0) return;

                // 智慧萃取規則
                let accId = lines[0]; // 預設第一行為編號 (如 3834vv)
                let accLevel = lines.length > 1 ? lines[1] : '未知等級'; // 預設第二行為等級 (如 70等藍隊)
                
                // 決定陣營顏色
                let levelColor = 'text-gray-700';
                if(accLevel.includes('藍')) levelColor = 'text-blue-600';
                if(accLevel.includes('紅')) levelColor = 'text-red-600';
                if(accLevel.includes('黃')) levelColor = 'text-yellow-600';

                // 使用 Regex 抓取價格 (尋找 "價格" 或 "$" 後面的數字)
                const priceMatch = block.match(/價格\s*[:：]?\s*(\d+)/) || block.match(/\$\s*(\d+)/);
                const price = priceMatch ? priceMatch[1] : '未標價';

                // 使用 Regex 抓取星塵
                const stardustMatch = block.match(/星塵\s*[:：]?\s*([\d萬]+)/);
                const stardust = stardustMatch ? stardustMatch[1] : '未知';

                // 將完整文字轉換為安全格式存入按鈕屬性中，用以傳遞給 Modal
                // 將換行替換為特定標記，稍後還原
                const safeText = encodeURIComponent(block);

                const newRow = document.createElement('tr');
                newRow.className = 'hover:bg-gray-50 transition-colors';
                newRow.innerHTML = `
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-3">
                            <div class="bg-gray-100 p-2 rounded-lg text-gray-500"><i class="fas fa-hashtag"></i></div>
                            <p class="font-bold text-gray-900 text-lg uppercase tracking-wider">${accId}</p>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-sm font-bold ${levelColor}">${accLevel}</td>
                    <td class="px-6 py-4 text-sm text-gray-600 font-medium"><i class="fas fa-star text-yellow-400 mr-1"></i>星塵: ${stardust}</td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 bg-yellow-100 text-yellow-800 text-sm font-bold rounded-full shadow-sm">$ ${price}</span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="openModal('${safeText}')" class="text-blue-600 hover:bg-blue-600 hover:text-white border border-blue-600 transition-all font-medium text-sm px-4 py-1.5 rounded-lg"><i class="fas fa-eye mr-1"></i>詳情</button>
                    </td>
                `;
                tableBody.appendChild(newRow);
                addedCount++;
            });

            document.getElementById('bulkDataInput').value = '';
            const totalRows = tableBody.getElementsByTagName('tr').length;
            document.getElementById('tableStatus').innerText = `已成功匯入 ${addedCount} 筆，目前共管理 ${totalRows} 隻帳號`;
        }

        // --- 彈窗 (Modal) 控制邏輯 ---
        const modal = document.getElementById('detailModal');
        const modalCard = document.getElementById('modalCard');
        const hiddenCopyArea = document.getElementById('hiddenCopyArea');

        function openModal(encodedText) {
            // 解碼並將換行符號轉成 <br> 顯示在網頁上
            const rawText = decodeURIComponent(encodedText);
            const htmlText = rawText.replace(/\n/g, '<br>');
            
            document.getElementById('modalContent').innerHTML = htmlText;
            hiddenCopyArea.value = rawText; // 存一份純文字給複製按鈕用
            
            modal.classList.remove('hidden');
            // 延遲一點點加上 opacity 產生淡入動畫
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalCard.classList.remove('scale-95');
                modalCard.classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalCard.classList.remove('scale-100');
            modalCard.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300); // 等待 Tailwind 的過渡動畫結束
        }

        // 一鍵複製文案功能
        function copyModalText() {
            hiddenCopyArea.style.display = 'block';
            hiddenCopyArea.select();
            document.execCommand('copy');
            hiddenCopyArea.style.display = 'none';
            alert('✅ 文案已成功複製到剪貼簿！可以直接去 FB 或 8591 貼上囉！');
        }

        // 點擊背景自動關閉彈窗
        modal.addEventListener('click', function(e) {
            if (e.target === modal) closeModal();
        });

        // 匯出 CSV 邏輯
        function exportTableToCSV(filename) {
            let csv = [];
            let rows = document.querySelectorAll("#mainTable tr");
            for (let i = 0; i < rows.length; i++) {
                let row = [], cols = rows[i].querySelectorAll("td, th");
                // 略過最後一個 "操作" 按鈕欄位
                for (let j = 0; j < cols.length - 1; j++) {
                    let data = cols[j].innerText.replace(/(\r\n|\n|\r)/gm, " ").trim();
                    row.push('"' + data + '"');
                }
                if (rows[i].style.display !== 'none') {
                    csv.push(row.join(","));
                }
            }
            let csvFile = new Blob(["\uFEFF" + csv.join("\n")], {type: "text/csv;charset=utf-8;"});
            let downloadLink = document.createElement("a");
            downloadLink.download = filename;
            downloadLink.href = window.URL.createObjectURL(csvFile);
            downloadLink.style.display = "none";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        }
    </script>
</body>
</html>
