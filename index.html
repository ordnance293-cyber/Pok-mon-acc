<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶可夢頂級帳號庫 - 雲端同步系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAXHqvXLLTmYl8kVV1fR0gJRFangwV85n8",
            authDomain: "pokemon-acc.firebaseapp.com",
            projectId: "pokemon-acc",
            storageBucket: "pokemon-acc.firebasestorage.app",
            messagingSenderId: "51529572144",
            appId: "1:51529572144:web:ae349a50d1152a755532f5",
            databaseURL: "https://pokemon-acc-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const inventoryRef = ref(db, 'inventory');
        let inventoryData = [];

        // 監聽雲端資料
        onValue(inventoryRef, (snapshot) => {
            const data = snapshot.val();
            inventoryData = [];
            if (data) {
                Object.keys(data).forEach(key => {
                    inventoryData.push({ uid: key, ...data[key] });
                });
                inventoryData.sort((a, b) => b.timestamp - a.timestamp);
            }
            renderInventory();
        });

        // 新增到雲端
        window.addAccountToInventory = function() {
            const accountId = document.getElementById('g_id').value.trim();
            if(!accountId) { alert("請至少輸入帳號代碼！"); return; }
            const newItem = {
                accountId: accountId,
                level: document.getElementById('g_level').value,
                team: document.getElementById('g_team').value,
                price: document.getElementById('g_price').value || "未標價",
                stardust: document.getElementById('g_stardust').value || "未知",
                fullText: encodeURIComponent(window.generateText()),
                timestamp: Date.now()
            };
            push(inventoryRef, newItem);
            document.getElementById('g_id').value = '';
            document.getElementById('g_hundos').value = '';
            window.clearImage();
        };

        // 刪除雲端資料
        window.deleteAccount = function(uid) {
            if(confirm('確定要從雲端刪除這筆資料嗎？')) {
                remove(ref(db, `inventory/${uid}`));
            }
        };

        function renderInventory() {
            const tbody = document.getElementById('inventoryBody');
            tbody.innerHTML = ''; 
            inventoryData.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-blue-50 border-b bg-white';
                let tColor = item.team === '紅隊' ? 'text-red-500' : (item.team === '藍隊' ? 'text-blue-500' : 'text-yellow-500');
                tr.innerHTML = `
                    <td class="px-4 py-3 font-mono font-bold uppercase">${item.accountId}</td>
                    <td class="px-4 py-3 text-sm font-bold ${tColor}">${item.level}等 ${item.team}</td>
                    <td class="px-4 py-3 text-sm text-gray-600">${item.stardust}</td>
                    <td class="px-4 py-3 text-sm font-bold text-red-600">$ ${item.price}</td>
                    <td class="px-4 py-3 text-center"><button onclick="window.copyInventoryText('${item.fullText}', this)" class="bg-gray-800 text-white px-3 py-1 rounded text-xs">複製文案</button></td>
                    <td class="px-4 py-3 text-center"><button onclick="window.deleteAccount('${item.uid}')" class="text-red-400 hover:text-red-600"><i class="fas fa-trash-alt"></i></button></td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById('inventoryCount').innerText = inventoryData.length;
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">
    <header class="bg-white border-b p-4 sticky top-0 z-50 flex justify-between items-center shadow-sm">
        <h1 class="text-xl font-bold text-gray-900"><i class="fas fa-cloud text-blue-600 mr-2"></i>寶可夢雲端庫存系統</h1>
        <div class="flex gap-2">
            <input type="password" id="geminiApiKey" placeholder="AI Key" class="border p-1.5 rounded text-xs w-32 focus:ring-2 focus:ring-blue-500">
            <button onclick="saveApiKey()" class="bg-gray-800 text-white px-3 py-1.5 rounded text-xs">儲存金鑰</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 py-8">
        <div class="bg-white rounded-xl shadow-sm border p-6 mb-8">
            <div class="flex justify-between items-center mb-4 border-b pb-4">
                <h2 class="text-lg font-bold"><i class="fas fa-bolt text-yellow-500 mr-2"></i>快速建檔區</h2>
                <button onclick="addAccountToInventory()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded font-bold shadow-md">同步至雲端</button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="space-y-3 bg-gray-50 p-3 rounded-lg border border-dashed flex flex-col items-center justify-center relative">
                    <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="previewImage(event)">
                    <label for="imageInput" class="cursor-pointer bg-white border px-3 py-1.5 rounded text-xs hover:bg-gray-100 w-full text-center font-bold">
                        <i class="fas fa-upload mr-1"></i>上傳截圖
                    </label>
                    <img id="imagePreview" src="" class="hidden rounded shadow-sm max-h-40 object-contain w-full">
                    <span id="imagePlaceholder" class="text-xs text-gray-400 py-8">尚未上傳圖片</span>
                    <button type="button" id="aiBtn" onclick="analyzeImage()" class="hidden w-full bg-purple-600 hover:bg-purple-700 text-white px-3 py-2 rounded text-xs font-bold mt-2 shadow-md">
                        <i class="fas fa-robot mr-1"></i>AI 自動辨識 (已啟用壓縮)
                    </button>
                    <button type="button" id="clearImageBtn" onclick="clearImage()" class="hidden absolute top-2 right-2 text-red-500 bg-white rounded-full w-6 h-6 flex items-center justify-center shadow"><i class="fas fa-times"></i></button>
                </div>

                <div class="space-y-3">
                    <label class="block text-xs font-bold text-gray-500">基本資訊</label>
                    <input type="text" id="g_id" placeholder="帳號代碼" class="w-full p-2 border rounded uppercase text-sm">
                    <div class="flex gap-2">
                        <input type="number" id="g_level" value="70" class="w-1/2 p-2 border rounded text-sm">
                        <select id="g_team" class="w-1/2 p-2 border rounded text-sm">
                            <option>藍隊</option><option>紅隊</option><option>黃隊</option>
                        </select>
                    </div>
                    <input type="number" id="g_price" placeholder="價格" class="w-full p-2 border-yellow-300 bg-yellow-50 rounded text-sm">
                    <input type="text" id="g_stardust" placeholder="星塵數量" class="w-full p-2 border rounded text-sm">
                </div>

                <div class="space-y-2">
                    <label class="block text-xs font-bold text-gray-500">亮點特徵</label>
                    <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="chk_marshadow"> 瑪夏多調查</label>
                    <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="chk_kyurem"> 酋雷姆合體</label>
                    <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="chk_necrozma"> 奈克洛茲瑪合體</label>
                    <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="chk_mega_ray"> 烈空坐能量</label>
                </div>

                <div class="space-y-3">
                    <label class="block text-xs font-bold text-gray-500 text-purple-600"><i class="fas fa-magic mr-1"></i>AI 辨識結果會出現在這</label>
                    <textarea id="g_hundos" placeholder="等待 AI 辨識..." class="w-full p-2 border border-purple-300 bg-purple-50 rounded h-32 text-sm"></textarea>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
            <div class="p-4 bg-gray-50 border-b font-bold text-gray-700 flex justify-between items-center">
                <span>雲端同步總表 (<span id="inventoryCount">0</span>)</span>
            </div>
            <table class="w-full text-left">
                <thead class="bg-white text-xs text-gray-500 border-b">
                    <tr><th class="px-4 py-3">代碼</th><th class="px-4 py-3">資訊</th><th class="px-4 py-3">星塵</th><th class="px-4 py-3">價格</th><th class="px-4 py-3 text-center">文案</th><th class="px-4 py-3 text-center">操作</th></tr>
                </thead>
                <tbody id="inventoryBody" class="divide-y"></tbody>
            </table>
        </div>
    </main>

    <textarea id="hiddenCopyArea" class="hidden"></textarea>

    <script>
        // 載入與儲存 Key
        document.getElementById('geminiApiKey').value = localStorage.getItem('geminiApiKey') || '';
        window.saveApiKey = function() {
            localStorage.setItem('geminiApiKey', document.getElementById('geminiApiKey').value);
            alert('AI Key 已儲存！');
        };

        // 圖片預覽與清除
        window.previewImage = function(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('imagePreview').src = e.target.result;
                document.getElementById('imagePreview').classList.remove('hidden');
                document.getElementById('imagePlaceholder').classList.add('hidden');
                document.getElementById('aiBtn').classList.remove('hidden');
                document.getElementById('clearImageBtn').classList.remove('hidden');
            }
            reader.readAsDataURL(file);
        };

        window.clearImage = function() {
            document.getElementById('imageInput').value = '';
            document.getElementById('imagePreview').classList.add('hidden');
            document.getElementById('imagePlaceholder').classList.remove('hidden');
            document.getElementById('aiBtn').classList.add('hidden');
            document.getElementById('clearImageBtn').classList.add('hidden');
            document.getElementById('g_hundos').value = '';
        };

        // ✨ 核心升級：圖片自動壓縮 + 呼叫 API
        window.analyzeImage = async function() {
            const apiKey = document.getElementById('geminiApiKey').value;
            if(!apiKey) { alert('請先在右上角填寫並儲存 AI Key！'); return; }
            const file = document.getElementById('imageInput').files[0];
            if(!file) return;

            const aiBtn = document.getElementById('aiBtn');
            aiBtn.disabled = true; 
            aiBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>壓縮與辨識中...';

            try {
                // 1. 圖片壓縮邏輯 (利用 Canvas)
                const compressedBase64 = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 800; // 限制最大寬度
                            const MAX_HEIGHT = 800; // 限制最大高度
                            let width = img.width;
                            let height = img.height;

                            if (width > height) {
                                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                            } else {
                                if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                            }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            // 壓縮成 JPEG，品質 0.7
                            resolve(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]); 
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                });

                // 2. 傳送壓縮後的圖片給 Gemini
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "這是一張寶可夢遊戲的截圖。請幫我辨識圖中出現的所有寶可夢的「中文名稱」。只要給我名字就好，用半形逗號隔開，不要有其他多餘的字。" },
                                { inlineData: { mimeType: "image/jpeg", data: compressedBase64 } }
                            ]
                        }]
                    })
                });

                const data = await resp.json();
                if(data.error) {
                    alert('辨識失敗：' + data.error.message);
                } else {
                    document.getElementById('g_hundos').value = data.candidates[0].content.parts[0].text.trim();
                }
            } catch (e) { 
                alert('發生錯誤，請確認網路連線或 API Key 是否正確。'); 
            } finally {
                aiBtn.disabled = false; 
                aiBtn.innerHTML = '<i class="fas fa-robot mr-1"></i>AI 自動辨識 (已啟用壓縮)';
            }
        };

        // 產生文案與複製
        window.generateText = function() {
            const v = (id) => document.getElementById(id).value.trim();
            const checked = (id) => document.getElementById(id).checked;
            let res = [`帳號代碼: ${v('g_id')}`, `等級陣營: ${v('g_level')}等${v('g_team')}`];
            if(checked('chk_marshadow')) res.push("🔥瑪夏多特殊調查🔥");
            if(checked('chk_kyurem')) res.push("‼️酋雷姆合體‼️");
            if(checked('chk_necrozma')) res.push("‼️奈克洛茲瑪合體‼️");
            if(checked('chk_mega_ray')) res.push("⭐️烈空坐能量⭐️");
            if(v('g_stardust')) res.push(`星塵數量: ${v('g_stardust')}`);
            if(v('g_hundos')) res.push(`✅神獸/異色名單:\n${v('g_hundos')}`);
            if(v('g_price')) res.push(`💰售價: $${v('g_price')}`);
            return res.join('\n');
        };

        window.copyInventoryText = function(txt, btn) {
            const area = document.getElementById('hiddenCopyArea');
            area.style.display = 'block'; area.value = decodeURIComponent(txt);
            area.select(); document.execCommand('copy'); area.style.display = 'none';
            const old = btn.innerText; btn.innerText = '已複製！'; setTimeout(() => btn.innerText = old, 1500);
        };
    </script>
</body>
</html>
