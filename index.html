    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAXHqvXLLTmYl8kVV1fR0gJRFangwV85n8",
            authDomain: "pokemon-acc.firebaseapp.com",
            projectId: "pokemon-acc",
            storageBucket: "pokemon-acc.firebasestorage.app",
            messagingSenderId: "51529572144",
            appId: "1:51529572144:web:ae349a50d1152a755532f5",
            databaseURL: "https://pokemon-acc-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const inventoryRef = ref(db, 'inventory');
        let inventoryData = [];

        onValue(inventoryRef, (snapshot) => {
            const data = snapshot.val();
            inventoryData = [];
            if (data) {
                Object.keys(data).forEach(key => {
                    inventoryData.push({ uid: key, ...data[key] });
                });
            }
            renderInventory(); // иіҮж–ҷжӣҙж–°жҷӮйҮҚж–°жёІжҹ“дёҰжҺ’еәҸ
        });

        // рҹҢҹ ж–°еўһеҲ° Google и©Ұз®—иЎЁ
        window.syncToGoogleSheets = async function(accountId, fullText, btn) {
            const sheetId = document.getElementById('googleSheetId').value.trim();
            const scriptUrl = document.getElementById('gasUrl').value.trim();
            if(!sheetId || !scriptUrl) { alert("и«ӢеЎ«еҜ«й ӮйғЁи©Ұз®—иЎЁиЁӯе®ҡпјҒ"); return; }
            
            const oldText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> еӮійҖҒдёӯ...';
            btn.disabled = true;
            
            try {
                await fetch(scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'add', 
                        id: sheetId, 
                        accountId: accountId, 
                        data: decodeURIComponent(fullText) 
                    })
                });
                btn.innerHTML = 'вң… е·Іж–°еўһиҮіиЎЁе–®';
                setTimeout(() => { btn.innerHTML = oldText; btn.disabled = false; }, 2000);
            } catch (e) { alert("еҗҢжӯҘеӨұж•—пјҒ"); btn.innerHTML = oldText; btn.disabled = false; }
        };

        window.addAccountToInventory = function() {
            const accountId = document.getElementById('g_id').value.trim();
            if(!accountId) { alert("и«Ӣијёе…Ҙеёіиҷҹд»ЈзўјпјҒ"); return; }
            const newItem = {
                accountId: accountId,
                level: document.getElementById('g_level').value,
                team: document.getElementById('g_team').value,
                price: document.getElementById('g_price').value || "жңӘжЁҷеғ№",
                stardust: document.getElementById('g_stardust').value || "жңӘзҹҘ",
                fullText: encodeURIComponent(window.generateText()),
                timestamp: Date.now()
            };
            push(inventoryRef, newItem);
            document.querySelectorAll('input, textarea').forEach(el => {
                if(!['geminiApiKey','googleSheetId','gasUrl','g_level'].includes(el.id) && el.type !== 'checkbox') el.value = '';
                if(el.type === 'checkbox') el.checked = false;
            });
            document.querySelectorAll('.dynamic-select').forEach(el => el.classList.add('hidden'));
            window.clearImage();
        };

        // рҹҢҹ еҲӘйҷӨжҷӮпјҢеҗҢжҷӮеҲӘйҷӨ Google и©Ұз®—иЎЁзҡ„иіҮж–ҷ
        window.deleteAccount = async function(uid, accountId) {
            if(confirm('зўәе®ҡиҰҒеҲӘйҷӨе—Һпјҹ\n\nжіЁж„ҸпјҡйҖҷжңғеҗҢжҷӮеҫһгҖҢйӣІз«Ҝеә«еӯҳгҖҚиҲҮгҖҢи©Ұз®—иЎЁгҖҚдёӯеҲӘйҷӨйҖҷзӯҶиіҮж–ҷпјҒ')) { 
                remove(ref(db, `inventory/${uid}`)); 
                const sheetId = document.getElementById('googleSheetId').value.trim();
                const scriptUrl = document.getElementById('gasUrl').value.trim();
                if(sheetId && scriptUrl) {
                    try {
                        await fetch(scriptUrl, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'delete', id: sheetId, accountId: accountId })
                        });
                    } catch(e) { console.error("и©Ұз®—иЎЁеҲӘйҷӨз•°еёё", e); }
                }
            }
        };

        // рҹҢҹ жёІжҹ“иҲҮжҺ’еәҸйӮҸијҜ
        window.renderInventory = function() {
            const tbody = document.getElementById('inventoryBody');
            if(!tbody) return;
            tbody.innerHTML = ''; 
            
            const sortMode = document.getElementById('sortMode') ? document.getElementById('sortMode').value : 'priceDesc';
            let displayData = [...inventoryData];
            
            // жҺ’еәҸйӯ”жі•
            displayData.sort((a, b) => {
                if (sortMode === 'priceDesc') {
                    let pA = parseInt(a.price); pA = isNaN(pA) ? -1 : pA;
                    let pB = parseInt(b.price); pB = isNaN(pB) ? -1 : pB;
                    if(pA !== pB) return pB - pA;
                    return b.timestamp - a.timestamp;
                } else if (sortMode === 'priceAsc') {
                    let pA = parseInt(a.price); pA = isNaN(pA) ? Infinity : pA;
                    let pB = parseInt(b.price); pB = isNaN(pB) ? Infinity : pB;
                    if(pA !== pB) return pA - pB;
                    return b.timestamp - a.timestamp;
                } else {
                    return b.timestamp - a.timestamp; // жңҖж–°еҠ е…Ҙ
                }
            });

            displayData.forEach(item => {
                const newRow = document.createElement('tr');
                newRow.className = 'hover:bg-blue-50 bg-white border-b border-gray-100';
                let teamColor = item.team === 'зҙ…йҡҠ' ? 'text-red-500' : (item.team === 'и—ҚйҡҠ' ? 'text-blue-500' : 'text-yellow-500');
                newRow.innerHTML = `
                    <td class="px-6 py-4 font-mono font-bold uppercase">${item.accountId}</td>
                    <td class="px-6 py-4 text-sm font-bold ${teamColor}">${item.level}зӯү ${item.team}</td>
                    <td class="px-6 py-4 text-sm text-red-600 font-bold">$ ${item.price}</td>
                    <td class="px-6 py-4 text-center flex gap-2 justify-center">
                        <button onclick="window.copyInventoryText('${item.fullText}', this)" class="bg-gray-800 text-white px-3 py-1.5 rounded text-xs shadow">иӨҮиЈҪж–ҮжЎҲ</button>
                        <button onclick="window.syncToGoogleSheets('${item.accountId}', '${item.fullText}', this)" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded text-xs shadow">рҹҡҖ жӢӢиҪүи©Ұз®—иЎЁ</button>
                    </td>
                    <td class="px-6 py-4 text-center"><button onclick="window.deleteAccount('${item.uid}', '${item.accountId}')" class="text-red-400 hover:text-red-600 p-2"><i class="fas fa-trash-alt"></i></button></td>
                `;
                tbody.appendChild(newRow);
            });
            const countEl = document.getElementById('inventoryCount');
            if(countEl) countEl.innerText = inventoryData.length;
        }
    </script>

                        <div>жҘөе·ЁеҢ–<input type="number" id="st_dyna" class="w-full p-1 border rounded"></div>
                        <div>и¶…жҘөе·ЁеҢ–<input type="number" id="st_giga" class="w-full p-1 border rounded"></div>
                        <div>е®ҢзҫҺ<input type="number" id="st_perfect" class="w-full p-1 border rounded"></div>
                    </div>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border overflow-hidden mt-4">
            <div class="p-4 bg-gray-50 border-b font-bold flex justify-between items-center flex-wrap gap-2">
                <span>йӣІз«ҜеҗҢжӯҘзёҪиЎЁ (<span id="inventoryCount">0</span>)</span>
                <select id="sortMode" onchange="renderInventory()" class="border p-1.5 rounded font-normal text-xs text-gray-700 bg-white focus:ring-blue-500 focus:border-blue-500 shadow-sm cursor-pointer">
                    <option value="priceDesc">рҹ’° е”®еғ№пјҡй«ҳ вһ” дҪҺ</option>
                    <option value="priceAsc">рҹ’° е”®еғ№пјҡдҪҺ вһ” й«ҳ</option>
                    <option value="newest">рҹҶ• жңҖж–°еҠ е…ҘжҷӮй–“</option>
                </select>
            </div>
            <table class="w-full text-left text-sm">
                <thead class="bg-gray-50"><tr><th class="px-6 py-3 border-b">д»Јзўј</th><th class="px-6 py-3 border-b">иіҮиЁҠ</th><th class="px-6 py-3 border-b">е”®еғ№</th><th class="px-6 py-3 border-b text-center">иҮӘеӢ•еҢ–</th><th class="px-6 py-3 border-b text-center">еҲӘйҷӨ</th></tr></thead>
                <tbody id="inventoryBody"></tbody>
            </table>
        </div>
    </main>

    <textarea id="hiddenCopyArea" class="hidden"></textarea>

    <script>
        ['geminiApiKey', 'googleSheetId', 'gasUrl'].forEach(id => {
            document.getElementById(id).value = localStorage.getItem(id) || '';
        });
        window.saveApiKey = function() {
            ['geminiApiKey', 'googleSheetId', 'gasUrl'].forEach(id => {
                localStorage.setItem(id, document.getElementById(id).value.trim());
            });
            alert('иЁӯе®ҡе·Іе„ІеӯҳпјҒ');
        };

        window.previewImages = function(event) {
            const files = event.target.files;
            const container = document.getElementById('imagePreviewContainer');
            container.innerHTML = ''; 
            if(files.length === 0) return;
            for(let i = 0; i < files.length; i++) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result; img.className = 'rounded h-12 border';
                    container.appendChild(img);
                }
                reader.readAsDataURL(files[i]);
            }
            document.getElementById('aiBtn').classList.remove('hidden');
        };

        window.clearImage = function() {
            document.getElementById('imageInput').value = '';
            document.getElementById('imagePreviewContainer').innerHTML = '';
            document.getElementById('aiBtn').classList.add('hidden');
        };

        window.analyzeMultipleImages = async function() {
            const apiKey = document.getElementById('geminiApiKey').value.trim();
            const files = document.getElementById('imageInput').files;
            if(!apiKey || files.length === 0) return;
            const aiBtn = document.getElementById('aiBtn');
            aiBtn.disabled = true; aiBtn.innerHTML = 'иҫЁиӯҳдёӯ...';
            try {
                let parts = [{ text: "иҫЁиӯҳеҜ¶еҸҜеӨўеһӢж…Ӣ(иө·жәҗзӯү)гҖҒиүІйҒ•гҖҒжҡ—еҪұпјҢзөұиЁҲж•ёйҮҸгҖӮжҠ“еҮәжҲӘең–жңҖдёҠж–№гҖҺеҜ¶еҸҜеӨў XX/YYгҖҸзҡ„ XX ж•ёеӯ—гҖӮијёеҮә JSON: {pokemon_list: 'еӯ—дёІ', total_perfect: ж•ёеӯ—}" }];
                for(let i=0; i<files.length; i++){
                    const base64 = await new Promise(r => {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const img = new Image();
                            img.onload = () => {
                                const canvas = document.createElement('canvas');
                                canvas.width = 800; canvas.height = 800 * (img.height/img.width);
                                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                                r(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                            };
                            img.src = e.target.result;
                        };
                        reader.readAsDataURL(files[i]);
                    });
                    parts.push({ inlineData: { mimeType: "image/jpeg", data: base64 } });
                }
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts }] })
                });
                const data = await resp.json();
                let cleanText = data.candidates[0].content.parts[0].text.replace(/```json/gi, '').replace(/```/g, '').trim();
                let res = JSON.parse(cleanText);
                
                document.getElementById('g_hundos').value = res.pokemon_list || '';
                if(res.total_perfect) document.getElementById('st_hundo_leg').value = res.total_perfect;
            } catch (e) { alert("AIиҫЁиӯҳз•°еёё"); }
            aiBtn.disabled = false; aiBtn.innerHTML = 'рҹӨ– AI иҮӘеӢ•еЎ«ж•ёйҮҸ';
        };

        window.generateText = function() {
            const v = (id) => document.getElementById(id).value.trim();
            const checked = (id) => document.getElementById(id).checked;
            let res = [];
            
            res.push(v('g_id'));
            res.push(`${v('g_level')}зӯү${v('g_team')}`);
            
            let spList = [];
            for(let i=1; i<=10; i++){ if(checked('chk_sp_'+i)) spList.push(document.getElementById('chk_sp_'+i).value); }
            if(spList.length > 0) res.push(`рҹ”Ҙ${spList.join(', ')}зү№ж®ҠиӘҝжҹҘрҹ”Ҙ`);
            
            if(v('g_rare_list')) res.push(`рҹ”Ҙ${v('g_rare_list')}рҹ”Ҙ`);
            
            if(v('st_old_poke')) res.push(`вҖјпёҸ${v('st_old_poke')} йҡ» 16вҖ“20е№ҙеҜ¶еҸҜеӨўвҖјпёҸ`);
            if(v('st_old_leg')) res.push(`вҖјпёҸ${v('st_old_leg')} йҡ» 16вҖ“20е№ҙзҘһзҚёвҖјпёҸ`);
            if(checked('chk_kyurem')) res.push(v('sel_kyurem'));
            if(checked('chk_zamazenta')) res.push(v('sel_dogs'));
            if(checked('chk_necrozma')) res.push(v('sel_necrozma'));
            if(checked('chk_dyna')) res.push(`вңЁеҸҜжү“жҘөе·ЁеҢ–пјҸи¶…жҘөе·ЁеҢ–вңЁ`);
            if(checked('chk_lati')) res.push(v('sel_lati'));
            if(checked('chk_hoenn')) res.push(v('sel_hoenn'));
            if(checked('chk_groudon')) res.push(`еӣәжӢүеӨҡжңүй–Ӣж–·еҙ–д№ӢеҠҚ`);
            if(checked('chk_kyogre')) res.push(`и“ӢжӯҗеҚЎжңүй–Ӣж №жәҗжіўеӢ•`);
            if(checked('chk_rayquaza')) res.push(`зғҲз©әеқҗжңүй–Ӣз•«йҫҚй»һзқӣ`);
            
            if(v('g_xp')) res.push(`з¶“й©— ${v('g_xp')}иҗ¬`);
            if(v('g_stardust')) res.push(`жҳҹеЎө ${v('g_stardust')}иҗ¬`);
            
            if(v('st_hundo_leg')) {
                let listStr = v('g_hundos') ? ` ${v('g_hundos')}` : '';
                res.push(`вң…${v('st_hundo_leg')}йҡ»зҷҫзҘһ${listStr}`);
            }
            if(v('st_legend')) res.push(`вң…зҘһзҚёзёҪж•ё${v('st_legend')}йҡ»`);
            if(v('st_shiny')) res.push(`вң…иүІйҒ•еҜ¶еҸҜеӨў${v('st_shiny')}йҡ»`);
            if(v('st_shiny_leg')) res.push(`вң…иүІйҒ•зҘһзҚё${v('st_shiny_leg')}йҡ»`);
            if(v('st_costume')) res.push(`вң…иЈқжү®еҜ¶еҸҜеӨў${v('st_costume')}йҡ»`);
            if(v('st_bg_comm')) res.push(`вң…зҙҖеҝөиғҢеҚЎ${v('st_bg_comm')}йҡ»`);
            if(v('st_bg_special')) res.push(`вң…зү№еҲҘиғҢеҚЎ${v('st_bg_special')}йҡ»`);
            if(v('st_dyna')) res.push(`вң…жҘөе·ЁеҢ–${v('st_dyna')}йҡ»`);
            if(v('st_giga')) res.push(`вң…и¶…жҘөе·ЁеҢ–${v('st_giga')}йҡ»`);
            if(v('st_perfect')) res.push(`вң…е®ҢзҫҺ${v('st_perfect')}йҡ»`);
            
            if(v('st_bag')) res.push(`иғҢеҢ…${v('st_bag')}`);
            if(v('st_masterball')) res.push(`рҹ©·еӨ§её«зҗғ*${v('st_masterball')}`);
            if(v('st_greenpass')) res.push(`рҹ©·з¶ зҘЁ${v('st_greenpass')}ејө`);
            if(v('st_rarecandy')) res.push(`рҹ©·зҘһеҘҮзі–жһң ${v('st_rarecandy')} йЎҶ`);
            if(v('st_coin')) res.push(`еҜ¶еҸҜе№Ј ${v('st_coin')}`);
            if(v('g_price')) res.push(`рҹ’°еғ№ж ј ${v('g_price')}`);
            
            return res.join('\n');
        };

        window.copyInventoryText = function(txt, btn) {
            const area = document.getElementById('hiddenCopyArea');
            area.style.display = 'block'; area.value = decodeURIComponent(txt);
            area.select(); document.execCommand('copy'); area.style.display = 'none';
            btn.innerHTML = 'е·ІиӨҮиЈҪ'; setTimeout(() => btn.innerHTML = 'иӨҮиЈҪж–ҮжЎҲ', 1500);
        };
    </script>
</body>
</html>
