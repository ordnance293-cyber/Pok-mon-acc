<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶可夢帳號管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-200 font-sans min-h-screen flex flex-col">

    <header class="bg-red-600 text-white shadow-lg border-b-4 border-gray-800">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-2 tracking-wide">
                <i class="fa-solid fa-gamepad"></i> 寶可夢帳號管理系統
            </h1>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 flex-grow">
        
        <section class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h2 class="text-xl font-semibold text-gray-100 flex items-center gap-2">
                <i class="fa-solid fa-users"></i> 訓練家清單
            </h2>
            
            <div class="flex gap-3">
                <button 
                    onclick="kyuremFusion()" 
                    class="bg-purple-600 hover:bg-purple-500 text-white px-5 py-2 rounded-lg shadow-lg border border-purple-400 transition duration-200 flex items-center gap-2 text-sm font-bold tracking-wider">
                    <i class="fa-solid fa-dragon"></i>
                    酋雷姆合體
                </button>

                <button 
                    onclick="exportTableToCSV('pokemon_accounts.csv')" 
                    class="bg-green-600 hover:bg-green-500 text-white px-5 py-2 rounded-lg shadow-lg border border-green-400 transition duration-200 flex items-center gap-2 text-sm font-bold tracking-wider">
                    <i class="fa-solid fa-file-csv"></i>
                    匯出帳號資料
                </button>
            </div>
        </section>

        <section class="bg-gray-800 rounded-xl shadow-xl border border-gray-700 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse" id="dataTable">
                    <thead>
                        <tr class="bg-gray-900 text-gray-400 text-sm uppercase tracking-wider border-b border-gray-700">
                            <th class="p-4 font-semibold">帳號 ID</th>
                            <th class="p-4 font-semibold">訓練家名稱</th>
                            <th class="p-4 font-semibold">陣營隊伍</th>
                            <th class="p-4 font-semibold">目前等級</th>
                            <th class="p-4 font-semibold">寶可幣</th>
                            <th class="p-4 font-semibold">帳號狀態</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm divide-y divide-gray-700">
                        <tr class="hover:bg-gray-700 transition duration-150">
                            <td class="p-4 text-gray-400">#PTC-8832</td>
                            <td class="p-4 font-bold text-white">AshKetchum_99</td>
                            <td class="p-4 text-blue-400 font-medium"><i class="fa-brands fa-diaspora"></i> 神秘隊 (藍)</td>
                            <td class="p-4 text-yellow-400 font-bold">Lv. 45</td>
                            <td class="p-4">1,250</td>
                            <td class="p-4">
                                <span class="bg-green-900 text-green-300 border border-green-700 px-2 py-1 rounded-full text-xs font-medium">正常運作</span>
                            </td>
                        </tr>
                        <tr class="hover:bg-gray-700 transition duration-150">
                            <td class="p-4 text-gray-400">#PTC-1094</td>
                            <td class="p-4 font-bold text-white">Red_Legend</td>
                            <td class="p-4 text-red-400 font-medium"><i class="fa-brands fa-hotjar"></i> 勇氣隊 (紅)</td>
                            <td class="p-4 text-yellow-400 font-bold">Lv. 50</td>
                            <td class="p-4">8,400</td>
                            <td class="p-4">
                                <span class="bg-green-900 text-green-300 border border-green-700 px-2 py-1 rounded-full text-xs font-medium">正常運作</span>
                            </td>
                        </tr>
                        <tr class="hover:bg-gray-700 transition duration-150">
                            <td class="p-4 text-gray-400">#PTC-5566</td>
                            <td class="p-4 font-bold text-white">Goh_Catcher</td>
                            <td class="p-4 text-yellow-400 font-medium"><i class="fa-solid fa-bolt"></i> 直覺隊 (黃)</td>
                            <td class="p-4 text-yellow-400 font-bold">Lv. 38</td>
                            <td class="p-4">320</td>
                            <td class="p-4">
                                <span class="bg-yellow-900 text-yellow-300 border border-yellow-700 px-2 py-1 rounded-full text-xs font-medium">閒置中</span>
                            </td>
                        </tr>
                        <tr class="hover:bg-gray-700 transition duration-150">
                            <td class="p-4 text-gray-400">#PTC-0001</td>
                            <td class="p-4 font-bold text-white">TeamRocket_Boss</td>
                            <td class="p-4 text-gray-400 font-medium"><i class="fa-solid fa-ban"></i> 無陣營</td>
                            <td class="p-4 text-yellow-400 font-bold">Lv. 12</td>
                            <td class="p-4">0</td>
                            <td class="p-4">
                                <span class="bg-red-900 text-red-300 border border-red-700 px-2 py-1 rounded-full text-xs font-medium">已被封鎖</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <footer class="bg-gray-900 border-t border-gray-800 mt-auto text-center py-6 text-sm text-gray-500">
        <p>&copy; 2026 寶可夢帳號管理中樞. All rights reserved.</p>
    </footer>

    <script>
        // 酋雷姆合體邏輯 (維持原樣)
        function kyuremFusion() {
            const forms = [
                "我是闇黑酋雷姆合體！",
                "我是焰白酋雷姆合體！",
                "我是雙型態合體！"
            ];
            // 產生 0 到 2 的隨機整數
            const randomIndex = Math.floor(Math.random() * forms.length);
            // 跳出結果
            alert(forms[randomIndex]);
        }

        // CSV 匯出邏輯 (維持原樣)
        function exportTableToCSV(filename) {
            const table = document.getElementById("dataTable");
            let csv = [];
            
            for (let i = 0; i < table.rows.length; i++) {
                let row = [], cols = table.rows[i].querySelectorAll("td, th");
                
                for (let j = 0; j < cols.length; j++) {
                    let data = cols[j].innerText.trim().replace(/"/g, '""');
                    row.push('"' + data + '"');
                }
                
                csv.push(row.join(","));
            }

            const csvString = csv.join("\n");
            const blob = new Blob(["\uFEFF" + csvString], { type: "text/csv;charset=utf-8;" });
            
            const link = document.createElement("a");
            if (link.download !== undefined) { 
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", filename);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }
    </script>
</body>
</html>
