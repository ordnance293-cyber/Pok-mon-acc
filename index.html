<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶可夢頂級帳號庫 - 試算表級文案生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c7c7cc; border-radius: 8px; }
        /* 美化 Checkbox */
        .poke-checkbox { @apply w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 cursor-pointer; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased relative">

    <header class="sticky top-0 z-50 glass-effect border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2">
                    <div class="bg-blue-600 p-2 rounded-lg text-white shadow-md">
                        <i class="fas fa-gamepad text-xl"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight text-gray-900">寶可夢頂級帳號庫</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-900">✨ 試算表級文案生成器</h1>
            <p class="text-gray-500 text-sm mt-1">完美繼承您的公式邏輯：只需填寫與勾選，右側將一秒生成 100% 精準的賣場排版。</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 h-[80vh] overflow-y-auto custom-scrollbar">
                <form id="generatorForm" class="space-y-6">
                    
                    <div class="p-4 bg-gray-50 rounded-xl border border-gray-100">
                        <h3 class="font-bold text-gray-800 border-b border-gray-200 pb-2 mb-4"><i class="fas fa-id-card text-blue-500 mr-2"></i>基本資訊</h3>
                        <div class="grid grid-cols-3 gap-4">
                            <div>
                                <label class="block text-xs font-medium text-gray-700 mb-1">帳號代碼</label>
                                <input type="text" id="g_id" value="3834vv" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm font-mono uppercase">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-700 mb-1">等級</label>
                                <input type="number" id="g_level" value="70" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-700 mb-1">陣營</label>
                                <select id="g_team" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                                    <option value="藍隊" selected>藍隊</option>
                                    <option value="紅隊">紅隊</option>
                                    <option value="黃隊">黃隊</option>
                                    <option value="無陣營">無陣營</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="p-4 bg-red-50 rounded-xl border border-red-100">
                        <h3 class="font-bold text-red-800 border-b border-red-200 pb-2 mb-4"><i class="fas fa-fire text-red-500 mr-2"></i>特殊調查與合體 (一鍵勾選)</h3>
                        
                        <div class="space-y-2 mb-4">
                            <label class="flex items-center gap-2 text-sm text-gray-800 cursor-pointer">
                                <input type="checkbox" id="chk_marshadow" class="poke-checkbox" checked>
                                🔥凱路迪歐, 瑪夏多特殊調查🔥
                            </label>
                            <label class="flex items-center gap-2 text-sm text-gray-800 cursor-pointer">
                                <input type="checkbox" id="chk_kyurem" class="poke-checkbox" checked>
                                ‼️酋雷姆闇黑/雙型態合體‼️
                            </label>
                            <label class="flex items-center gap-2 text-sm text-gray-800 cursor-pointer">
                                <input type="checkbox" id="chk_zamazenta" class="poke-checkbox" checked>
                                ‼️蒼響劍盾型態‼️
                            </label>
                            <label class="flex items-center gap-2 text-sm text-gray-800 cursor-pointer">
                                <input type="checkbox" id="chk_necrozma" class="poke-checkbox" checked>
                                ‼️奈克洛茲瑪月亮/雙型態合體‼️
                            </label>
                        </div>
                        
                        <div>
                            <label class="block text-xs font-medium text-gray-700 mb-1">🔥 自訂稀有神獸亮點 (每行會自動加 🔥)</label>
                            <textarea id="g_custom_fire" rows="3" class="w-full p-2 border border-red-200 rounded-lg focus:ring-2 focus:ring-red-400 outline-none text-sm custom-scrollbar">稀有無極汰那 
100%完全體基格爾德 
100%酋雷姆（任選型態合體）</textarea>
                        </div>
                    </div>

                    <div class="p-4 bg-purple-50 rounded-xl border border-purple-100">
                        <h3 class="font-bold text-purple-800 border-b border-purple-200 pb-2 mb-4"><i class="fas fa-bolt text-purple-500 mr-2"></i>Mega 與專屬招式</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                            <label class="flex items-center gap-2 text-sm text-gray-800 cursor-pointer"><input type="checkbox" id="chk_dyna" class="poke-checkbox" checked>✨可打極巨化／超極巨化✨</label>
                            <label class="flex items-center gap-2 text-sm text-gray-800 cursor-pointer"><input type="checkbox" id="chk_mega_ray" class="poke-checkbox" checked>⭐️烈空坐能量夠Mega⭐️</label>
                            <label class="flex items-center gap-2 text-sm text-gray-800 cursor-pointer"><input type="checkbox" id="chk_mega_lati" class="poke-checkbox">⭐️飛機兄妹可Mega⭐️</label>
                            <label class="flex items-center gap-2 text-sm text-gray-800 cursor-pointer"><input type="checkbox" id="chk_mega_hoenn" class="poke-checkbox">⭐️豐原雙神可Mega⭐️</label>
                            
                            <label class="flex items-center gap-2 text-sm text-gray-800 cursor-pointer"><input type="checkbox" id="chk_move_groudon" class="poke-checkbox" checked>固拉多有開斷崖之劍</label>
                            <label class="flex items-center gap-2 text-sm text-gray-800 cursor-pointer"><input type="checkbox" id="chk_move_kyogre" class="poke-checkbox" checked>蓋歐卡有開根源波動</label>
                            <label class="flex items-center gap-2 text-sm text-gray-800 cursor-pointer"><input type="checkbox" id="chk_move_ray" class="poke-checkbox" checked>烈空坐有開畫龍點睛</label>
                        </div>
                    </div>

                    <div class="p-4 bg-green-50 rounded-xl border border-green-100">
                        <h3 class="font-bold text-green-800 border-b border-green-200 pb-2 mb-4"><i class="fas fa-chart-pie text-green-500 mr-2"></i>數據統計 (自動加 ✅)</h3>
                        <div class="mb-3">
                            <label class="block text-xs font-medium text-gray-700 mb-1">百神詳細清單</label>
                            <input type="text" id="g_hundos" value="5隻百神 100%完全體鋼彈 色違席多藍恩 色違拉帝亞斯 蓋諾塞克特 酋雷姆（任選型態合體）" class="w-full p-2 border border-green-200 rounded-lg focus:ring-2 focus:ring-green-500 outline-none text-sm">
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            <div><label class="block text-[10px] text-gray-600">神獸總數</label><input type="number" id="st_legend" value="296" class="w-full p-1.5 border border-green-200 rounded text-sm"></div>
                            <div><label class="block text-[10px] text-gray-600">色違寶可夢</label><input type="number" id="st_shiny" value="26" class="w-full p-1.5 border border-green-200 rounded text-sm"></div>
                            <div><label class="block text-[10px] text-gray-600">色違神獸</label><input type="number" id="st_shiny_leg" value="19" class="w-full p-1.5 border border-green-200 rounded text-sm"></div>
                            <div><label class="block text-[10px] text-gray-600">裝扮寶可夢</label><input type="number" id="st_costume" value="2" class="w-full p-1.5 border border-green-200 rounded text-sm"></div>
                            <div><label class="block text-[10px] text-gray-600">特別背卡</label><input type="number" id="st_bg2" value="6" class="w-full p-1.5 border border-green-200 rounded text-sm"></div>
                            <div><label class="block text-[10px] text-gray-600">紀念背卡</label><input type="number" id="st_bg1" value="" placeholder="無" class="w-full p-1.5 border border-green-200 rounded text-sm"></div>
                            <div><label class="block text-[10px] text-gray-600">🔥極巨化</label><input type="number" id="st_dyna" value="2" class="w-full p-1.5 border border-green-200 rounded text-sm"></div>
                            <div><label class="block text-[10px] text-gray-600">完美(100%)</label><input type="number" id="st_perfect" value="5" class="w-full p-1.5 border border-green-200 rounded text-sm"></div>
                        </div>
                    </div>

                    <div class="p-4 bg-yellow-50 rounded-xl border border-yellow-100">
                        <h3 class="font-bold text-yellow-800 border-b border-yellow-200 pb-2 mb-4"><i class="fas fa-coins text-yellow-500 mr-2"></i>資源與定價</h3>
                        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                            <div>
                                <label class="block text-xs font-medium text-gray-700 mb-1">星塵</label>
                                <input type="text" id="g_stardust" value="360萬" class="w-full p-2 border border-yellow-300 rounded-lg text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-700 mb-1">神奇糖果</label>
                                <input type="number" id="g_candy" value="432" class="w-full p-2 border border-yellow-300 rounded-lg text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-700 mb-1">綠票/寶可幣</label>
                                <input type="text" id="g_pass_coins" placeholder="例: 綠票4張" value="" class="w-full p-2 border border-yellow-300 rounded-lg text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-700 mb-1">💰 價格</label>
                                <input type="number" id="g_price" value="3800" class="w-full p-2 border border-yellow-400 rounded-lg text-sm font-bold text-red-600 bg-yellow-100">
                            </div>
                        </div>
                    </div>

                </form>
            </div>

            <div class="flex flex-col h-[80vh]">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-lg font-bold text-gray-800"><i class="far fa-eye text-blue-500 mr-2"></i>試算表產出預覽</h2>
                    <button onclick="copyGeneratedText()" class="bg-gray-900 hover:bg-black text-white px-5 py-2 rounded-xl text-sm font-medium transition-all shadow-md flex items-center gap-2 transform hover:scale-105">
                        <i class="far fa-copy"></i> 一鍵複製文案
                    </button>
                </div>
                
                <textarea id="livePreview" readonly class="w-full flex-grow p-6 bg-white border border-gray-300 rounded-2xl shadow-inner focus:outline-none text-gray-800 font-sans leading-relaxed resize-none custom-scrollbar text-[15px]"></textarea>
            </div>

        </div>
    </main>

    <script>
        const formInputs = document.querySelectorAll('#generatorForm input, #generatorForm select, #generatorForm textarea');
        const previewBox = document.getElementById('livePreview');

        // 核心：模擬試算表公式，把所有資料串接起來
        function updatePreview() {
            const v = (id) => document.getElementById(id).value.trim();
            const checked = (id) => document.getElementById(id).checked;
            let result = [];

            // 1. 帳號與等級
            result.push(v('g_id'));
            result.push(`${v('g_level')}等${v('g_team')}`);
            
            // 2. 特殊調查與亮點
            if(checked('chk_marshadow')) result.push(`🔥凱路迪歐, 瑪夏多特殊調查🔥`);
            
            const customFires = v('g_custom_fire').split('\n').filter(l => l.trim() !== '');
            customFires.forEach(h => result.push(`🔥${h.replace(/🔥/g, '').trim()}🔥`));

            // 3. 合體型態
            if(checked('chk_kyurem')) result.push(`‼️酋雷姆闇黑/雙型態合體‼️`);
            if(checked('chk_zamazenta')) result.push(`‼️蒼響劍盾型態‼️`);
            if(checked('chk_necrozma')) result.push(`‼️奈克洛茲瑪月亮/雙型態合體‼️`);

            // 4. Mega與極巨化
            if(checked('chk_dyna')) result.push(`✨可打極巨化／超極巨化✨`);
            if(checked('chk_mega_ray')) result.push(`⭐️烈空坐能量夠Mega⭐️`);
            if(checked('chk_mega_lati')) result.push(`⭐️飛機兄妹可Mega⭐️`);
            if(checked('chk_mega_hoenn')) result.push(`⭐️豐原雙神可Mega⭐️`);

            // 5. 專屬招式
            if(checked('chk_move_groudon')) result.push(`固拉多有開斷崖之劍`);
            if(checked('chk_move_kyogre')) result.push(`蓋歐卡有開根源波動`);
            if(checked('chk_move_ray')) result.push(`烈空坐有開畫龍點睛`);

            // 6. 星塵資源 (置中安插)
            if(v('g_stardust')) result.push(`星塵 ${v('g_stardust')}`);

            // 7. 統計數據
            if(v('g_hundos')) result.push(`✅${v('g_hundos')}`);
            if(v('st_legend')) result.push(`✅神獸總數${v('st_legend')}隻`);
            if(v('st_shiny')) result.push(`✅色違寶可夢${v('st_shiny')}隻`);
            if(v('st_shiny_leg')) result.push(`✅色違神獸${v('st_shiny_leg')}隻`);
            if(v('st_costume')) result.push(`✅裝扮寶可夢${v('st_costume')}隻`);
            if(v('st_bg1')) result.push(`✅紀念背卡${v('st_bg1')}隻`);
            if(v('st_bg2')) result.push(`✅特別背卡${v('st_bg2')}隻`);
            if(v('st_dyna')) result.push(`🔥極巨化${v('st_dyna')}隻`);
            if(v('st_perfect')) result.push(`✅完美${v('st_perfect')}隻`);

            // 8. 其他資源與價格
            if(v('g_candy')) result.push(`💗神奇糖果 ${v('g_candy')} 顆`);
            if(v('g_pass_coins')) result.push(v('g_pass_coins'));
            if(v('g_price')) result.push(`💰價格 ${v('g_price')}`);

            // 輸出至預覽區
            previewBox.value = result.join('\n');
        }

        // 綁定所有表單元素的變化事件
        formInputs.forEach(input => {
            input.addEventListener('input', updatePreview);
            input.addEventListener('change', updatePreview);
        });

        // 一鍵複製功能
        function copyGeneratedText() {
            previewBox.select();
            document.execCommand('copy');
            window.getSelection().removeAllRanges();
            
            const btn = event.currentTarget;
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> 複製成功！';
            btn.classList.add('bg-green-600');
            btn.classList.remove('bg-gray-900');
            
            setTimeout(() => {
                btn.innerHTML = originalHTML;
                btn.classList.remove('bg-green-600');
                btn.classList.add('bg-gray-900');
            }, 2000);
        }

        // 網頁載入時立刻產出一次預設的 3834vv 範例
        window.addEventListener('DOMContentLoaded', updatePreview);
    </script>
</body>
</html>
