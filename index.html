<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶可夢頂級帳號庫 - V35 終極穩定版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyAXHqvXLLTmYl8kVV1fR0gJRFangwV85n8",
            authDomain: "pokemon-acc.firebaseapp.com",
            projectId: "pokemon-acc",
            storageBucket: "pokemon-acc.firebasestorage.app",
            messagingSenderId: "51529572144",
            appId: "1:51529572144:web:ae349a50d1152a755532f5",
            databaseURL: "https://pokemon-acc-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const inventoryRef = ref(db, 'inventory');
        let inventoryData = [];

        // 網頁載入時，自動填入上次儲存的設定
        window.addEventListener('DOMContentLoaded', () => {
            ['googleSheetId', 'gasUrl', 'geminiApiKey'].forEach(id => {
                const savedValue = localStorage.getItem(id);
                if (savedValue) document.getElementById(id).value = savedValue;
            });
        });

        // 按下儲存按鈕時，把設定存在瀏覽器記憶體
        window.saveSettings = function() {
            ['googleSheetId', 'gasUrl', 'geminiApiKey'].forEach(id => {
                const val = document.getElementById(id).value.trim();
                localStorage.setItem(id, val);
            });
            const btn = document.getElementById('saveBtn');
            btn.innerHTML = '✅ 已儲存';
            btn.classList.replace('bg-gray-800', 'bg-green-600');
            setTimeout(() => {
                btn.innerHTML = '💾 儲存設定';
                btn.classList.replace('bg-green-600', 'bg-gray-800');
            }, 2000);
        };

        // 監聽 Firebase 資料庫變動
        onValue(inventoryRef, (snapshot) => {
            const data = snapshot.val();
            inventoryData = [];
            if (data) {
                Object.keys(data).forEach(key => {
                    inventoryData.push({ uid: key, ...data[key] });
                });
            }
            renderInventory(); 
        });

        // 同步至 Google 試算表 (單筆)
        window.syncToGoogleSheets = async function(accountId, fullText, btn) {
            const sheetId = document.getElementById('googleSheetId').value.trim();
            const scriptUrl = document.getElementById('gasUrl').value.trim();
            if(!sheetId || !scriptUrl) { 
                showMsg("❌ 請先在頂部填寫並儲存試算表設定！", "red");
                return; 
            }
            
            const oldText = btn.innerHTML; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; btn.disabled = true;
            try {
                await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'add', id: sheetId, accountId: accountId, data: decodeURIComponent(fullText) }) });
                btn.innerHTML = '<i class="fas fa-check"></i>'; 
                setTimeout(() => { btn.innerHTML = '拋轉'; btn.disabled = false; }, 2000);
            } catch (e) { btn.innerHTML = oldText; btn.disabled = false; }
        };

        // 一鍵拋轉所有現貨
        window.syncAllToSheets = async function(btn) {
            const activeData = inventoryData.filter(item => item.status !== 'sold');
            if(activeData.length === 0) { 
                showMsg("目前沒有現貨可以拋轉！", "amber");
                return; 
            }
            if(!confirm(`確定要將【${activeData.length}】個現貨帳號一次拋轉嗎？`)) return;
            
            const sheetId = document.getElementById('googleSheetId').value.trim(); const scriptUrl = document.getElementById('gasUrl').value.trim();
            if(!sheetId || !scriptUrl) { alert("請先在頂部填寫並儲存設定！"); return; }
            
            const oldText = btn.innerHTML; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 拋轉中...'; btn.disabled = true;
            const allData = activeData.map(item => ({ accountId: item.accountId, data: decodeURIComponent(item.fullText) }));
            try {
                await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'syncAll', id: sheetId, allData: allData }) });
                btn.innerHTML = '✅ 全部拋轉成功！'; setTimeout(() => { btn.innerHTML = oldText; btn.disabled = false; }, 3000);
            } catch (e) { btn.innerHTML = oldText; btn.disabled = false; }
        };

        // 標記售出
        window.markAsSold = async function(uid, accountId, btn) {
            const isAlreadySold = btn.innerText.includes('補塗');
            if(!isAlreadySold) {
                if(!confirm(`確定標記為售出？\n這會將試算表塗黃並從工作表13移除！`)) return;
                update(ref(db, `inventory/${uid}`), { status: 'sold' });
            }
            const sheetId = document.getElementById('googleSheetId').value.trim(); const scriptUrl = document.getElementById('gasUrl').value.trim();
            if(sheetId && scriptUrl) {
                btn.disabled = true;
                const oldIcon = btn.innerHTML; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                try {
                    await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'sold', id: sheetId, accountId: accountId }) });
                    btn.innerHTML = '✅'; setTimeout(() => { btn.innerHTML = isAlreadySold ? '🟡 補塗' : '💰 售出'; btn.disabled = false; }, 2000);
                } catch(e) { btn.innerHTML = oldIcon; btn.disabled = false; }
            }
        };

        // 新增/更新資料到 Firebase
        let currentEditUid = null;
        window.saveAccountToInventory = async function() {
            const accountId = document.getElementById('g_id').value.trim();
            if(!accountId) { showMsg("請輸入帳號代碼！", "red"); return; }
            
            const newItem = {
                accountId: accountId, level: document.getElementById('g_level').value, team: document.getElementById('g_team').value, price: document.getElementById('g_price').value || "未標價", stardust: document.getElementById('g_stardust').value || "", xp: document.getElementById('g_xp').value || "", rarecandy: document.getElementById('st_rarecandy').value || "", coin: document.getElementById('st_coin').value || "", greenpass: document.getElementById('st_greenpass').value || "", masterball: document.getElementById('st_masterball').value || "", poke_bag: document.getElementById('st_poke_bag').value || "", item_bag: document.getElementById('st_item_bag').value || "", rare_list: document.getElementById('g_rare_list').value || "", hundos: document.getElementById('g_hundos').value || "", st_hundo_leg: document.getElementById('st_hundo_leg').value || "", st_legend: document.getElementById('st_legend').value || "", st_shiny: document.getElementById('st_shiny').value || "", st_shiny_leg: document.getElementById('st_shiny_leg').value || "", st_costume: document.getElementById('st_costume').value || "", st_bg_comm: document.getElementById('st_bg_comm').value || "", st_bg_special: document.getElementById('st_bg_special').value || "", st_dyna: document.getElementById('st_dyna').value || "", st_giga: document.getElementById('st_giga').value || "", st_perfect: document.getElementById('st_perfect').value || "", fullText: encodeURIComponent(window.generateText()), status: document.getElementById('g_item_status').value
            };

            if (currentEditUid) {
                const existingItem = inventoryData.find(i => i.uid === currentEditUid);
                newItem.timestamp = existingItem ? existingItem.timestamp : Date.now();
                update(ref(db, `inventory/${currentEditUid}`), newItem);
                showMsg("✅ 帳號資料已更新！", "green");

                const sheetId = document.getElementById('googleSheetId').value.trim(); 
                const scriptUrl = document.getElementById('gasUrl').value.trim();
                if(sheetId && scriptUrl) {
                    fetch(scriptUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'add', id: sheetId, accountId: accountId, data: decodeURIComponent(newItem.fullText) }) });
                }
            } else {
                newItem.timestamp = Date.now();
                push(inventoryRef, newItem);
                showMsg("✅ 帳號已新增！", "green");
            }
            window.resetForm();
        };

        function showMsg(text, color) {
            const msg = document.createElement('div');
            msg.className = `fixed top-20 left-1/2 -translate-x-1/2 bg-${color}-600 text-white px-6 py-2 rounded-full shadow-lg z-[100] animate-bounce`;
            msg.innerHTML = text;
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 2500);
        }

        window.editAccount = function(uid) {
            const item = inventoryData.find(i => i.uid === uid); if(!item) return;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            document.getElementById('g_id').value = item.accountId || ''; document.getElementById('g_level').value = item.level || ''; document.getElementById('g_team').value = item.team || '藍隊'; document.getElementById('g_price').value = item.price === "未標價" ? "" : item.price; document.getElementById('g_stardust').value = item.stardust || ''; document.getElementById('g_xp').value = item.xp || ''; document.getElementById('st_rarecandy').value = item.rarecandy || ''; document.getElementById('st_coin').value = item.coin || ''; document.getElementById('st_greenpass').value = item.greenpass || ''; document.getElementById('st_masterball').value = item.masterball || ''; document.getElementById('st_poke_bag').value = item.poke_bag || ''; document.getElementById('st_item_bag').value = item.item_bag || ''; document.getElementById('g_rare_list').value = item.rare_list || ''; document.getElementById('g_hundos').value = item.hundos || ''; document.getElementById('g_item_status').value = item.status || 'active'; document.getElementById('st_hundo_leg').value = item.st_hundo_leg || ''; document.getElementById('st_legend').value = item.st_legend || ''; document.getElementById('st_shiny').value = item.st_shiny || ''; document.getElementById('st_shiny_leg').value = item.st_shiny_leg || ''; document.getElementById('st_costume').value = item.st_costume || ''; document.getElementById('st_bg_comm').value = item.st_bg_comm || ''; document.getElementById('st_bg_special').value = item.st_bg_special || ''; document.getElementById('st_dyna').value = item.st_dyna || ''; document.getElementById('st_giga').value = item.st_giga || ''; document.getElementById('st_perfect').value = item.st_perfect || '';
            
            currentEditUid = uid;
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = '💾 儲存修改';
            submitBtn.classList.replace('bg-red-600', 'bg-blue-600');
            submitBtn.classList.replace('hover:bg-red-700', 'hover:bg-blue-700');
            document.getElementById('cancelEditBtn').classList.remove('hidden');

            showMsg("已回填資料，修改後點擊「儲存修改」即可覆蓋！", "blue");
        };

        window.deleteAccount = async function(uid, accountId) {
            if(confirm('確定要永久刪除此紀錄嗎？')) { 
                remove(ref(db, `inventory/${uid}`)); 
                const sId = document.getElementById('googleSheetId').value; const gUrl = document.getElementById('gasUrl').value; 
                if(sId && gUrl) fetch(gUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'delete', id: sId, accountId: accountId }) }); 
            }
        };

        // 開啟改文案視窗
        let currentEditModalUid = null;
        let currentEditModalAccountId = null;
        window.openEditModal = function(uid, accountId) {
            const item = inventoryData.find(i => i.uid === uid);
            if(!item) return;
            currentEditModalUid = uid;
            currentEditModalAccountId = accountId;
            document.getElementById('editModalText').value = decodeURIComponent(item.fullText);
            document.getElementById('editModal').classList.remove('hidden');
            document.getElementById('editModal').classList.add('flex');
        };

        // 儲存文案並同步試算表
        window.saveEditedText = async function() {
            if(!currentEditModalUid) return;
            const newText = document.getElementById('editModalText').value.trim();
            const btn = document.getElementById('saveModalBtn');
            const oldBtnText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 同步儲存中...';
            btn.disabled = true;

            update(ref(db, `inventory/${currentEditModalUid}`), { fullText: encodeURIComponent(newText) });

            const sheetId = document.getElementById('googleSheetId').value.trim(); 
            const scriptUrl = document.getElementById('gasUrl').value.trim();
            if(sheetId && scriptUrl) {
                try {
                    await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'add', id: sheetId, accountId: currentEditModalAccountId, data: newText }) });
                } catch(e) {}
            }

            btn.innerHTML = oldBtnText;
            btn.disabled = false;
            window.closeEditModal();
            showMsg("✅ 文案修改成功，已同步至試算表！", "green");
        };

        window.closeEditModal = function() {
            document.getElementById('editModal').classList.add('hidden');
            document.getElementById('editModal').classList.remove('flex');
        };

        window.renderInventory = function() {
            const tbody = document.getElementById('inventoryBody'); if(!tbody) return; tbody.innerHTML = ''; 
            const filterStatus = document.getElementById('filterStatus')?.value || 'all'; const sortMode = document.getElementById('sortMode')?.value || 'priceDesc'; const searchQuery = document.getElementById('searchInput')?.value.toLowerCase().trim() || '';
            let displayData = inventoryData.filter(item => {
                if (filterStatus === 'active' && item.status === 'sold') return false;
                if (filterStatus === 'sold' && item.status !== 'sold') return false;
                if (searchQuery && !item.accountId.toLowerCase().includes(searchQuery)) return false;
                return true;
            });
            displayData.sort((a, b) => {
                if (sortMode === 'priceDesc') { let pA = parseInt(a.price)||0; let pB = parseInt(b.price)||0; return pB - pA || b.timestamp - a.timestamp; } 
                else if (sortMode === 'priceAsc') { let pA = parseInt(a.price)||Infinity; let pB = parseInt(b.price)||Infinity; return pA - pB || b.timestamp - a.timestamp; } 
                else return b.timestamp - a.timestamp;
            });
            displayData.forEach(item => {
                const isS = item.status === 'sold'; const rC = isS ? 'bg-amber-50 opacity-80' : 'hover:bg-blue-50 bg-white'; const nR = document.createElement('tr'); nR.className = `${rC} border-b border-gray-100 transition duration-300`;
                let tC = item.team === '紅隊' ? 'text-red-500' : (item.team === '藍隊' ? 'text-blue-500' : 'text-yellow-500');
                const sB = isS ? '<span class="ml-2 bg-red-100 text-red-600 text-[10px] px-2 py-0.5 rounded-full font-bold border border-red-200">SOLD</span>' : '<span class="ml-2 bg-green-100 text-green-600 text-[10px] px-2 py-0.5 rounded-full font-bold border border-green-200">STOCK</span>';
                const aB = isS ? `<button onclick="window.markAsSold('${item.uid}', '${item.accountId}', this)" class="bg-amber-100 text-amber-800 border border-amber-300 px-2 py-1 rounded text-[10px] shadow-sm font-bold">🟡 補塗</button>` : `<button onclick="window.markAsSold('${item.uid}', '${item.accountId}', this)" class="bg-amber-400 text-gray-900 px-2 py-1 rounded text-[10px] shadow-sm font-bold">💰 售出</button>`;
                const sId = item.accountId.substring(0, 6).toUpperCase(); const lD = item.level ? `${item.level}等 ` : '';
                
                nR.innerHTML = `<td class="px-4 py-4"><div class="font-mono font-bold text-base uppercase flex items-center">${sId}${sB}</div><div class="text-[10px] text-gray-400 font-mono mt-0.5 break-all">${item.accountId}</div></td><td class="px-4 py-4 text-sm font-bold ${tC}">${lD}${item.team}</td><td class="px-4 py-4 text-sm text-red-600 font-bold">$ ${item.price}</td><td class="px-4 py-4 text-center"><div class="flex gap-1 justify-center flex-wrap"><button onclick="window.copyInventoryText('${item.fullText}', this)" class="bg-gray-800 text-white px-2 py-1 rounded text-[10px] shadow-sm">複製</button><button onclick="window.openEditModal('${item.uid}', '${item.accountId}')" class="bg-purple-500 hover:bg-purple-600 text-white px-2 py-1 rounded text-[10px] shadow-sm font-bold transition">📝 改文</button><button onclick="window.syncToGoogleSheets('${item.accountId}', '${item.fullText}', this)" class="bg-green-600 text-white px-2 py-1 rounded text-[10px] shadow-sm">拋轉</button>${aB}<button onclick="window.editAccount('${item.uid}')" class="bg-blue-500 text-white px-2 py-1 rounded text-[10px] shadow-sm">✏️</button></div></td><td class="px-4 py-4 text-center"><button onclick="window.deleteAccount('${item.uid}', '${item.accountId}')" class="text-red-300 hover:text-red-600 p-1"><i class="fas fa-trash-alt"></i></button></td>`;
                tbody.appendChild(nR);
            });
            const cEl = document.getElementById('inventoryCount'); if(cEl) cEl.innerText = displayData.length;
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
    <header class="bg-white border-b p-4 sticky top-0 z-50 shadow-sm flex justify-between items-center flex-wrap gap-2">
        <h1 class="text-xl font-bold flex items-center gap-2 text-indigo-800">
            <i class="fas fa-shield-alt"></i> 寶可夢進銷存 V35 終極穩定版
        </h1>
        <div class="flex gap-2 items-center flex-wrap">
            <input type="text" id="googleSheetId" placeholder="試算表 ID" class="border p-1.5 rounded text-xs w-32 focus:ring-2 focus:ring-indigo-400 transition-all outline-none bg-white">
            <input type="text" id="gasUrl" placeholder="GAS 連結" class="border p-1.5 rounded text-xs w-32 focus:ring-2 focus:ring-indigo-400 transition-all outline-none bg-white">
            <input type="password" id="geminiApiKey" placeholder="請貼上新的 AI Key" class="border p-1.5 rounded text-xs w-32 bg-yellow-50 focus:ring-2 focus:ring-yellow-400 transition-all outline-none">
            <button id="saveBtn" onclick="window.saveSettings()" class="bg-gray-800 text-white px-4 py-1.5 rounded text-xs font-bold transition-all shadow-sm active:scale-90">💾 儲存設定</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 py-8">
        <div class="bg-white rounded-2xl shadow-sm border p-6 mb-8 relative">
            <div class="flex justify-between items-center mb-4 border-b pb-4">
                <h2 class="text-lg font-bold">快速建檔區</h2>
                <div class="flex gap-2">
                    <button type="button" onclick="window.resetForm()" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-xl font-bold hover:bg-gray-300 transition">🧹 清除</button>
                    <button type="button" id="cancelEditBtn" onclick="window.resetForm()" class="hidden bg-gray-500 text-white px-4 py-2 rounded-xl font-bold shadow-md hover:bg-gray-600 transition">取消編輯</button>
                    <button type="button" id="submitBtn" onclick="saveAccountToInventory()" class="bg-red-600 text-white px-6 py-2 rounded-xl font-bold shadow-md hover:bg-red-700 transition transform active:scale-95">同步至雲端列表</button>
                </div>
            </div>

            <div class="flex flex-wrap gap-2 items-center text-[11px] bg-blue-50/50 p-2 rounded-lg border border-blue-100 mb-5">
                <span class="font-bold text-blue-800"><i class="fas fa-terminal"></i> 快速搜尋指令：</span>
                <button type="button" onclick="window.copySimpleText('傳說的寶可夢,幻,究極異獸', this)" class="bg-white border border-blue-200 text-blue-700 hover:bg-blue-100 px-3 py-1 rounded shadow-sm font-bold transition-all active:scale-95">神獸總數</button>
                <button type="button" onclick="window.copySimpleText('傳說的寶可夢,幻,究極異獸&4*', this)" class="bg-white border border-blue-200 text-blue-700 hover:bg-blue-100 px-3 py-1 rounded shadow-sm font-bold transition-all active:scale-95">完美神獸</button>
                <button type="button" onclick="window.copySimpleText('傳說的寶可夢,幻,究極異獸&異色', this)" class="bg-white border border-blue-200 text-blue-700 hover:bg-blue-100 px-3 py-1 rounded shadow-sm font-bold transition-all active:scale-95">色違神獸</button>
            </div>

            <form class="grid grid-cols-1 md:grid-cols-5 gap-4">
                <div class="col-span-1 space-y-3 bg-gray-50 p-4 rounded-xl border-2 border-dashed border-gray-300 flex flex-col items-center relative">
                    <input type="file" id="imageInput" accept="image/*" multiple class="hidden" onchange="previewImages(event)">
                    <label for="imageInput" class="cursor-pointer bg-white border px-4 py-2 rounded shadow-sm text-sm font-bold hover:bg-gray-50 transition text-center">選擇多張截圖</label>
                    <div id="imagePreviewContainer" class="flex flex-wrap gap-2 w-full py-2 justify-center"></div>
                    <button type="button" id="aiBtn" onclick="analyzeMultipleImages()" class="hidden w-full bg-blue-600 text-white px-4 py-3 rounded-xl text-sm font-bold shadow-lg hover:bg-blue-700 transition">🤖 AI 自動填數量</button>
                </div>

                <div class="col-span-1 space-y-3">
                    <label class="text-xs font-bold text-gray-400 border-b block pb-1">基本資訊</label>
                    <input type="text" id="g_id" placeholder="貼上完整帳號代碼" class="w-full p-2 border rounded font-bold text-sm bg-white outline-none focus:border-indigo-400">
                    <div class="flex gap-2"><input type="number" id="g_level" placeholder="等級" class="w-1/2 p-2 border rounded text-sm outline-none"><select id="g_team" class="w-1/2 p-2 border rounded text-sm bg-white cursor-pointer"><option>藍隊</option><option>紅隊</option><option>黃隊</option></select></div>
                    <input type="number" id="g_xp" placeholder="經驗 (萬)" class="w-full p-2 border rounded text-sm outline-none">
                    <input type="text" id="g_stardust" placeholder="星塵 (萬)" class="w-full p-2 border rounded text-sm outline-none">
                    <div class="flex gap-2">
                        <input type="number" id="g_price" placeholder="價格" class="w-1/2 p-2 border-yellow-400 bg-yellow-50 font-bold rounded text-sm outline-none">
                        <select id="g_item_status" class="w-1/2 p-2 border border-green-300 bg-green-50 font-bold rounded text-sm text-green-700 cursor-pointer"><option value="active">🟢 現貨</option><option value="sold">🔴 售出</option></select>
                    </div>
                </div>

                <div class="col-span-1 space-y-3">
                    <label class="text-xs font-bold text-gray-400 border-b block pb-1">資源數據</label>
                    <div class="grid grid-cols-2 gap-2 text-[11px]">
                        <div>16-20怪<input type="number" id="st_old_poke" class="w-full p-1 border rounded"></div>
                        <div>16-20神<input type="number" id="st_old_leg" class="w-full p-1 border rounded"></div>
                        <div>大師球<input type="number" id="st_masterball" class="w-full p-1 border rounded"></div>
                        <div>綠票/卷<input type="number" id="st_greenpass" class="w-full p-1 border rounded"></div>
                        <div>神奇糖果<input type="number" id="st_rarecandy" class="w-full p-1 border rounded"></div>
                        <div>寶可幣<input type="number" id="st_coin" class="w-full p-1 border rounded"></div>
                        <div class="col-span-1">寶可夢包<input type="number" id="st_poke_bag" class="w-full p-1 border rounded"></div>

    <script>
        window.previewImages = function(event) {
            const files = event.target.files; const container = document.getElementById('imagePreviewContainer'); container.innerHTML = ''; if(files.length === 0) return;
            for(let i = 0; i < files.length; i++) {
                const reader = new FileReader(); reader.onload = (e) => { const img = document.createElement('img'); img.src = e.target.result; img.className = 'rounded h-12 border object-cover w-12 shadow-sm'; container.appendChild(img); }
                reader.readAsDataURL(files[i]);
            }
            document.getElementById('aiBtn').classList.remove('hidden');
        };

        window.clearImage = function() { document.getElementById('imageInput').value = ''; document.getElementById('imagePreviewContainer').innerHTML = ''; document.getElementById('aiBtn').classList.add('hidden'); };

        window.updateHundoCount = function() {
            const text = document.getElementById('g_hundos').value.trim();
            const countInput = document.getElementById('st_hundo_leg');
            if (!text) { countInput.value = ''; return; }
            const items = text.split(/[,，、\n]+/).filter(item => item.trim() !== '');
            let total = 0;
            items.forEach(item => {
                const match = item.match(/[*xXｘＸ]\s*(\d+)/);
                if (match) total += parseInt(match[1], 10); else total += 1;
            });
            countInput.value = total;
            countInput.classList.add('bg-green-100'); setTimeout(() => countInput.classList.remove('bg-green-100'), 300);
        };

        const parseNum = (val) => {
            if(!val) return NaN;
            return parseInt(String(val).replace(/,/g, '').replace(/\D/g, ''), 10);
        };

        const highlightInput = (id) => {
            const el = document.getElementById(id);
            if(el) { el.classList.add('ring-2', 'ring-green-400'); setTimeout(() => el.classList.remove('ring-2', 'ring-green-400'), 800); }
        };

        // 🔥 AI 視覺解析：最新極度防幻覺指令 + gemini-2.5-flash 模型 🔥
        window.analyzeMultipleImages = async function() {
            const apiKey = document.getElementById('geminiApiKey').value.trim(); const files = document.getElementById('imageInput').files; 
            if(!apiKey) { alert("請先在頂部貼上你的 AI Key 並按儲存設定！"); return; }
            if(files.length === 0) return;
            const aiBtn = document.getElementById('aiBtn'); aiBtn.disabled = true; aiBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> AI 視覺精準解析中...';
            try {
                let parts = [{ text: `你是一個精準的寶可夢GO截圖OCR分析系統。請輸出純 JSON（不含 Markdown）。

【防幻覺最高指導原則】：
絕對禁止捏造、猜測畫面上沒有的寶可夢名字或數字！所有資料必須 100% 來自圖片上可見的文字。

【關鍵數量精確提取】：
請注意搜尋列下方的文字，通常會有一個放大鏡圖示加上括號數字，例如「寶可夢 (5)」或「Q (5)」，這個 (5) 就是總數量。
1. 若搜尋列完整出現「傳說的寶可夢,幻,究極異獸&4*」：提取括號內的數字填入 hundo_leg (百神數量)。
2. 若搜尋列僅出現「傳說的寶可夢,幻,究極異獸」：提取括號內的數字填入 legendary (神獸總數)。
3. 若搜尋列出現「傳說的寶可夢,幻,究極異獸&異色」：提取括號內的數字填入 shiny_leg (色違神獸)。

【網格寶可夢清單 (pokemon_list)】：
請「嚴格」讀取圖片中每隻寶可夢圖示「正下方」的中文名字（如：基格爾德、席多藍恩、酋雷姆）。若同名出現多次請合併計數（例如：超夢*3）。如果沒有看到名字，絕對不要亂編！

【其他數據提取】：
- 道具數字：大師球(masterball)、神奇糖果(rarecandy)、寶可幣(coin)、綠券(greenpass)、寶可夢包(poke_bag)、道具包(item_bag)。
- 基本資訊：玩家等級(level)、星塵(stardust)、經驗(xp)。
- 標籤總數：異色(shiny)、活動(costume)、紀念背卡(bg_comm)、特別背卡(bg_special)、極巨化(dyna)、超極巨化(giga)、完美(perfect)。

JSON格式：{"legendary":"","shiny":"","costume":"","bg_comm":"","bg_special":"","dyna":"","giga":"","perfect":"","hundo_leg":"","shiny_leg":"","pokemon_list":"","masterball":"","rarecandy":"","coin":"","greenpass":"","poke_bag":"","item_bag":"","level":"","stardust":"","xp":""}` }];
                
                for(let i=0; i<files.length; i++){
                    const base64 = await new Promise(r => {
                        const reader = new FileReader(); reader.onload = (e) => {
                            const img = new Image(); img.onload = () => {
                                const maxSize = 800; // 防手機發燙過載設定
                                let width = img.width;
                                let height = img.height;
                                if (width > height) {
                                    if (width > maxSize) { height *= maxSize / width; width = maxSize; }
                                } else {
                                    if (height > maxSize) { width *= maxSize / height; height = maxSize; }
                                }
                                const canvas = document.createElement('canvas'); 
                                canvas.width = width; 
                                canvas.height = height;
                                canvas.getContext('2d').drawImage(img, 0, 0, width, height); 
                                r(canvas.toDataURL('image/jpeg', 0.65).split(',')[1]);
                            }; img.src = e.target.result;
                        }; reader.readAsDataURL(files[i]);
                    });
                    parts.push({ inlineData: { mimeType: "image/jpeg", data: base64 } });
                }
                
                // 採用速度最快且免費額度充足的 gemini-2.5-flash 模型
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts }] }) });
                
                if (!resp.ok) {
                    const errData = await resp.text(); 
                    throw new Error(`錯誤代碼 ${resp.status}\nGoogle 官方原因：${errData}`);
                }

                const data = await resp.json(); let cleanText = data.candidates[0].content.parts[0].text.replace(/```json/gi, '').replace(/```/g, '').trim(); let res = JSON.parse(cleanText);
                
                document.getElementById('g_hundos').value = res.pokemon_list || ''; 
                if(res.hundo_leg) document.getElementById('st_hundo_leg').value = res.hundo_leg;
                if(res.legendary) document.getElementById('st_legend').value = res.legendary;
                if(res.shiny_leg) document.getElementById('st_shiny_leg').value = res.shiny_leg; 
                if(res.shiny) document.getElementById('st_shiny').value = res.shiny;
                if(res.costume) document.getElementById('st_costume').value = res.costume;
                if(res.bg_comm) document.getElementById('st_bg_comm').value = res.bg_comm;
                if(res.bg_special) document.getElementById('st_bg_special').value = res.bg_special;
                if(res.dyna) document.getElementById('st_dyna').value = res.dyna;
                if(res.giga) document.getElementById('st_giga').value = res.giga;
                if(res.perfect) document.getElementById('st_perfect').value = res.perfect;
                
                if(res.masterball) document.getElementById('st_masterball').value = parseNum(res.masterball) || res.masterball;
                let rc = parseNum(res.rarecandy); if(!isNaN(rc) && rc >= 100) document.getElementById('st_rarecandy').value = rc;
                let coin = parseNum(res.coin); if(!isNaN(coin) && coin >= 200) document.getElementById('st_coin').value = coin;
                let pass = parseNum(res.greenpass); if(!isNaN(pass) && pass >= 10) document.getElementById('st_greenpass').value = pass;
                if(res.poke_bag) document.getElementById('st_poke_bag').value = parseNum(res.poke_bag) || res.poke_bag;
                if(res.item_bag) document.getElementById('st_item_bag').value = parseNum(res.item_bag) || res.item_bag;

                let oL = parseNum(res.level); let oS = parseNum(res.stardust); let oX = parseNum(res.xp);
                let fS = isNaN(oS) ? 0 : oS; let fX = isNaN(oX) ? 0 : oX;

                if (!isNaN(oL)) {
                    if (oL < 60) { document.getElementById('g_level').value = 60; fS += 200000; fX = 0; } 
                    else if (oL >= 68) { document.getElementById('g_level').value = 70; fS += 300000; } 
                    else { document.getElementById('g_level').value = oL; }
                    highlightInput('g_level');
                }
                if (fS >= 800000) { document.getElementById('g_stardust').value = Math.floor(fS / 10000); highlightInput('g_stardust'); }
                if (fX >= 800000) { document.getElementById('g_xp').value = Math.floor(fX / 10000); highlightInput('g_xp'); }

                window.updateHundoCount(); 
            } catch (e) { 
                alert("🚨 AI 辨識異常 🚨\n\n" + e.message); 
                console.error(e); 
            }
            aiBtn.disabled = false; aiBtn.innerHTML = '🤖 AI 自動填數量';
        };

        window.resetForm = function() {
            document.querySelectorAll('input:not([type=password]), textarea').forEach(el => { if(!['googleSheetId','gasUrl'].includes(el.id) && el.type !== 'checkbox') el.value = ''; if(el.type === 'checkbox') el.checked = false; });
            document.getElementById('g_item_status').value = 'active'; document.getElementById('g_team').value = '藍隊';
            document.querySelectorAll('.dynamic-select').forEach(el => el.classList.add('hidden')); window.clearImage();
            
            // 重置按鈕狀態
            currentEditUid = null;
            const submitBtn = document.getElementById('submitBtn');
            if(submitBtn) {
                submitBtn.innerText = '同步至雲端列表';
                submitBtn.classList.replace('bg-blue-600', 'bg-red-600');
                submitBtn.classList.replace('hover:bg-blue-700', 'hover:bg-red-700');
            }
            const cancelEditBtn = document.getElementById('cancelEditBtn');
            if(cancelEditBtn) cancelEditBtn.classList.add('hidden');
        };

        window.generateText = function() {
            const v = (id) => document.getElementById(id).value.trim(); const checked = (id) => document.getElementById(id).checked;
            let res = []; const fullId = v('g_id'); const shortId = fullId.substring(0, 6).toUpperCase(); res.push(shortId); 
            const lvlStr = v('g_level') ? v('g_level') + '等 ' : ''; res.push(`${lvlStr}${v('g_team')}`);
            let spList = []; for(let i=1; i<=10; i++){ if(checked('chk_sp_'+i)) spList.push(document.getElementById('chk_sp_'+i).value); }
            if(spList.length > 0) res.push(`🔥${spList.join(', ')}特殊調查🔥`);
            
            // 稀有怪依據換行拆解，每一行都加上前後 🔥
            const rareListText = v('g_rare_list');
            if(rareListText) {
                rareListText.split('\n').forEach(line => {
                    if(line.trim() !== '') {
                        res.push(`🔥${line.trim()}🔥`);
                    }
                });
            }

            if(v('st_old_poke')) res.push(`‼️${v('st_old_poke')} 隻 16–20年寶可夢‼️`);
            if(v('st_old_leg')) res.push(`‼️${v('st_old_leg')} 隻 16–20年神獸‼️`);
            if(checked('chk_kyurem')) res.push(v('sel_kyurem'));
            if(checked('chk_zamazenta')) res.push(v('sel_dogs'));
            if(checked('chk_necrozma')) res.push(v('sel_necrozma'));
            if(checked('chk_dyna')) res.push(`✨可打極巨化／超極巨化✨`);
            if(checked('chk_lati')) res.push(v('sel_lati'));
            if(checked('chk_hoenn')) res.push(v('sel_hoenn'));
            if(checked('chk_groudon')) res.push(`固拉多斷崖之劍`);
            if(checked('chk_kyogre')) res.push(`蓋歐卡根波動`);
            if(checked('chk_rayquaza')) res.push(`烈空坐畫龍點睛`);
            if(v('g_xp')) res.push(`經驗 ${v('g_xp')}萬`); if(v('g_stardust')) res.push(`星塵 ${v('g_stardust')}萬`);
            if(v('st_hundo_leg')) { let listStr = v('g_hundos') ? ` ${v('g_hundos')}` : ''; res.push(`✅${v('st_hundo_leg')}隻百神${listStr}`); }
            if(v('st_legend')) res.push(`✅神獸總數${v('st_legend')}隻`); if(v('st_shiny')) res.push(`✅色違寶可夢${v('st_shiny')}隻`);
            if(v('st_shiny_leg')) res.push(`✅色違神獸${v('st_shiny_leg')}隻`); if(v('st_costume')) res.push(`✅裝扮寶可夢${v('st_costume')}隻`);
            if(v('st_bg_comm')) res.push(`✅紀念背卡${v('st_bg_comm')}隻`); if(v('st_bg_special')) res.push(`✅特別背卡${v('st_bg_special')}隻`);
            if(v('st_dyna')) res.push(`✅極巨化${v('st_dyna')}隻`); if(v('st_giga')) res.push(`✅超極巨化${v('st_giga')}隻`);
            if(v('st_perfect')) res.push(`✅完美${v('st_perfect')}隻`);
            
            // 背包數量小於 1000 隱藏邏輯
            let pb = parseNum(v('st_poke_bag')); if(!isNaN(pb) && pb >= 1000) res.push(`🎒寶可夢背包 ${v('st_poke_bag')}`);
            let ib = parseNum(v('st_item_bag')); if(!isNaN(ib) && ib >= 1000) res.push(`🎒道具背包 ${v('st_item_bag')}`);
            
            if(v('st_masterball')) res.push(`🩷大師球*${v('st_masterball')}`);
            if(v('st_greenpass')) res.push(`🩷綠票${v('st_greenpass')}張`); if(v('st_rarecandy')) res.push(`🩷神奇糖果 ${v('st_rarecandy')} 顆`);
            if(v('st_coin')) res.push(`寶可幣 ${v('st_coin')}`); if(v('g_price')) res.push(`💰價格 ${v('g_price')}`);
            return res.join('\n');
        };

        window.copyInventoryText = function(txt, btn) {
            const area = document.getElementById('hiddenCopyArea'); area.style.display = 'block'; area.value = decodeURIComponent(txt);
            area.select(); document.execCommand('copy'); area.style.display = 'none';
            btn.innerHTML = '已複製'; setTimeout(() => btn.innerHTML = '複製', 1500);
        };

        window.copySimpleText = function(txt, btn) {
            const area = document.getElementById('hiddenCopyArea'); area.style.display = 'block'; area.value = txt;
            area.select(); document.execCommand('copy'); area.style.display = 'none';
            const oldT = btn.innerHTML; btn.innerHTML = '✅'; setTimeout(() => btn.innerHTML = oldT, 1200);
        };
    </script>
</body>
</html>
