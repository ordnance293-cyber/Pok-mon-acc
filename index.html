<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶可夢頂級帳號庫 - V12.1 完美符號版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAXHqvXLLTmYl8kVV1fR0gJRFangwV85n8",
            authDomain: "pokemon-acc.firebaseapp.com",
            projectId: "pokemon-acc",
            storageBucket: "pokemon-acc.firebasestorage.app",
            messagingSenderId: "51529572144",
            appId: "1:51529572144:web:ae349a50d1152a755532f5",
            databaseURL: "https://pokemon-acc-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const inventoryRef = ref(db, 'inventory');
        let inventoryData = [];

        onValue(inventoryRef, (snapshot) => {
            const data = snapshot.val();
            inventoryData = [];
            if (data) {
                Object.keys(data).forEach(key => {
                    inventoryData.push({ uid: key, ...data[key] });
                });
                inventoryData.sort((a, b) => b.timestamp - a.timestamp);
            }
            renderInventory();
        });

        window.addAccountToInventory = function() {
            const accountId = document.getElementById('g_id').value.trim();
            if(!accountId) { alert("請輸入帳號代碼！"); return; }

            const newItem = {
                accountId: accountId,
                level: document.getElementById('g_level').value,
                team: document.getElementById('g_team').value,
                price: document.getElementById('g_price').value || "未標價",
                stardust: document.getElementById('g_stardust').value || "未知",
                fullText: encodeURIComponent(window.generateText()),
                timestamp: Date.now()
            };
            push(inventoryRef, newItem);
            
            document.querySelectorAll('input, textarea').forEach(el => {
                if(el.id !== 'geminiApiKey' && el.id !== 'g_level' && el.type !== 'file' && el.type !== 'checkbox') el.value = '';
                if(el.type === 'checkbox') el.checked = false;
            });
            window.clearImage();
        };

        window.deleteAccount = function(uid) {
            if(confirm('確定要從雲端刪除嗎？')) { remove(ref(db, `inventory/${uid}`)); }
        };

        function renderInventory() {
            const tbody = document.getElementById('inventoryBody');
            tbody.innerHTML = ''; 
            inventoryData.forEach(item => {
                const newRow = document.createElement('tr');
                newRow.className = 'hover:bg-blue-50 bg-white border-b border-gray-100';
                let teamColor = item.team === '紅隊' ? 'text-red-500' : (item.team === '藍隊' ? 'text-blue-500' : 'text-yellow-500');
                newRow.innerHTML = `
                    <td class="px-6 py-4 font-mono font-bold uppercase">${item.accountId}</td>
                    <td class="px-6 py-4 text-sm font-bold ${teamColor}">${item.level}等 ${item.team}</td>
                    <td class="px-6 py-4 text-sm text-gray-600">${item.stardust}</td>
                    <td class="px-6 py-4 text-sm font-bold text-red-600">$ ${item.price}</td>
                    <td class="px-6 py-4 text-center"><button onclick="window.copyInventoryText('${item.fullText}', this)" class="bg-gray-800 text-white px-3 py-1.5 rounded text-xs">複製</button></td>
                    <td class="px-6 py-4 text-center"><button onclick="window.deleteAccount('${item.uid}')" class="text-red-400 hover:text-red-600"><i class="fas fa-trash-alt"></i></button></td>
                `;
                tbody.appendChild(newRow);
            });
            document.getElementById('inventoryCount').innerText = inventoryData.length;
        }
    </script>
</head>

        <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">

    <textarea id="hiddenCopyArea" class="hidden"></textarea>

    <script>
        document.getElementById('geminiApiKey').value = localStorage.getItem('geminiApiKey') || '';
        window.saveApiKey = function() {
            localStorage.setItem('geminiApiKey', document.getElementById('geminiApiKey').value.trim());
            alert('AI Key 已儲存！');
        };

        window.previewImages = function(event) {
            const files = event.target.files;
            const container = document.getElementById('imagePreviewContainer');
            container.innerHTML = ''; 
            if(files.length === 0) return;
            for(let i = 0; i < files.length; i++) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'rounded shadow-sm h-24 object-contain border';
                    container.appendChild(img);
                }
                reader.readAsDataURL(files[i]);
            }
            document.getElementById('imagePlaceholder').classList.add('hidden');
            document.getElementById('aiBtn').classList.remove('hidden');
            document.getElementById('clearImageBtn').classList.remove('hidden');
            document.getElementById('aiBtn').innerHTML = `<i class="fas fa-robot mr-1"></i>🤖 AI 自動填入數量 (${files.length}張)`;
        };

        window.clearImage = function() {
            document.getElementById('imageInput').value = '';
            document.getElementById('imagePreviewContainer').innerHTML = '';
            document.getElementById('imagePlaceholder').classList.remove('hidden');
            document.getElementById('aiBtn').classList.add('hidden');
            document.getElementById('clearImageBtn').classList.add('hidden');
        };

        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 1200;
                        let w = img.width, h = img.height;
                        if (w > h && w > MAX_SIZE) { h *= MAX_SIZE / w; w = MAX_SIZE; }
                        else if (h > MAX_SIZE) { w *= MAX_SIZE / h; h = MAX_SIZE; }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        window.analyzeMultipleImages = async function() {
            const apiKey = document.getElementById('geminiApiKey').value.trim();
            if(!apiKey) { alert('【錯誤】請先填寫 AI Key 並按儲存！'); return; }
            const files = document.getElementById('imageInput').files;
            if(files.length === 0) return;

            const aiBtn = document.getElementById('aiBtn');
            aiBtn.disabled = true; 
            aiBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>多圖掃描分析中...';

            try {
                let partsArray = [];
                const promptText = `這是一組同一個寶可夢GO帳號的遊戲截圖。請嚴格執行以下任務，並【只能】輸出合法的 JSON 格式，不要有任何 Markdown 標記：
1. 辨識所有圖片中出現的寶可夢。精準分辨具體型態（如：起源帕路奇亞）、色違、暗影。淨化視同普通。合併完全相同的寶可夢並加上「*數量」。結果組成字串。
2. 觀察截圖最上方類似「寶可夢 25/450」的文字，抓出總數量（例如 25）。

輸出 JSON 格式範例：
{
  "pokemon_list": "色違起源帕路奇亞*2, 暗影超夢*1",
  "total_perfect": 25
}`;
                partsArray.push({ text: promptText });
                for(let i=0; i<files.length; i++){
                    const base64 = await compressImage(files[i]);
                    partsArray.push({ inlineData: { mimeType: "image/jpeg", data: base64 } });
                }

                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: partsArray }] })
                });

                const data = await resp.json();
                if(data.error) {
                    alert('【系統回報】\n' + data.error.message);
                } else if (data.candidates && data.candidates[0].content) {
                    let rawText = data.candidates[0].content.parts[0].text;
                    let cleanText = rawText.replace(/```json/gi, '').replace(/```/g, '').trim();
                    let aiResult = JSON.parse(cleanText);

                    document.getElementById('g_hundos').value = aiResult.pokemon_list || '';
                    if(aiResult.total_perfect) {
                        document.getElementById('st_perfect').value = aiResult.total_perfect;
                        document.getElementById('st_hundo_leg').value = aiResult.total_perfect; 
                    }
                }
            } catch (e) { 
                alert('【系統回報：發生錯誤】請重新辨識。\n' + e.message); 
            } finally {
                aiBtn.disabled = false; 
                aiBtn.innerHTML = `<i class="fas fa-robot mr-1"></i>🤖 AI 自動填入數量 (${files.length}張)`;
            }
        };

        // 🌟 100% 複製你的 Emoji 模板
        window.generateText = function() {
            const v = (id) => document.getElementById(id).value.trim();
            const checked = (id) => document.getElementById(id).checked;
            let res = [];
            
            // 標題與等級陣營
            if(v('g_id')) res.push(v('g_id'));
            if(v('g_level') || v('g_team')) res.push(`${v('g_level')}等${v('g_team')}`);
            
            // 稀有內容與打勾選項
            if(v('g_rare_list')) res.push(`🔥${v('g_rare_list')}🔥`);
            
            let hasRare = v('st_old_poke') || v('st_old_leg') || checked('chk_kyurem') || checked('chk_zamazenta') || checked('chk_necrozma') || checked('chk_dyna') || checked('chk_lati') || checked('chk_hoenn') || checked('chk_groudon') || checked('chk_kyogre') || checked('chk_rayquaza');
            if(hasRare) res.push(`🔥稀有內容🔥`);
            
            if(v('st_old_poke')) res.push(`‼️${v('st_old_poke')} 隻 16–20年寶可夢‼️`);
            if(v('st_old_leg')) res.push(`‼️${v('st_old_leg')} 隻 16–20年神獸‼️`);
            if(checked('chk_kyurem')) res.push(`‼️酋雷姆雙型態合體‼️`);
            if(checked('chk_zamazenta')) res.push(`‼️雙狗劍盾型態‼️`);
            if(checked('chk_necrozma')) res.push(`‼️奈克洛茲瑪雙型態合體‼️`);
            if(checked('chk_dyna')) res.push(`✨可打極巨化／超極巨化✨`);
            if(checked('chk_lati')) res.push(`⭐️飛機兄妹可Mega⭐️`);
            if(checked('chk_hoenn')) res.push(`⭐️豐原三神可 Mega⭐️`);
            if(checked('chk_groudon')) res.push(`固拉多有開斷崖之劍`);
            if(checked('chk_kyogre')) res.push(`蓋歐卡有開根源波動`);
            if(checked('chk_rayquaza')) res.push(`烈空坐有開畫龍點睛`);
            
            // 經驗與星塵
            if(v('g_xp')) res.push(`經驗 ${v('g_xp')}萬`);
            if(v('g_stardust')) res.push(`星塵 ${v('g_stardust')}萬`);
            
            // 🌟 10 格資料全數加上 ✅
            if(v('st_hundo_leg')) {
                let listStr = v('g_hundos') ? ` ${v('g_hundos')}` : '';
                res.push(`✅${v('st_hundo_leg')}隻百神${listStr}`);
            } else if(v('g_hundos')) {
                res.push(`✅百神名單: ${v('g_hundos')}`);
            }
            if(v('st_legend')) res.push(`✅神獸總數${v('st_legend')}隻`);
            if(v('st_shiny')) res.push(`✅色違寶可夢${v('st_shiny')}隻`);
            if(v('st_shiny_leg')) res.push(`✅色違神獸${v('st_shiny_leg')}隻`);
            if(v('st_costume')) res.push(`✅裝扮寶可夢${v('st_costume')}隻`);
            if(v('st_bg_comm')) res.push(`✅紀念背卡${v('st_bg_comm')}隻`);
            if(v('st_bg_special')) res.push(`✅特別背卡${v('st_bg_special')}隻`);
            if(v('st_dyna')) res.push(`✅極巨化${v('st_dyna')}隻`);
            if(v('st_giga')) res.push(`✅超極巨化${v('st_giga')}隻`);
            if(v('st_perfect')) res.push(`✅完美${v('st_perfect')}隻`);
            
            // 🌟 資源道具全數加上 🩷 (除了背包與寶可幣)
            if(v('st_bag')) res.push(`背包${v('st_bag')}`);
            if(v('st_masterball')) res.push(`🩷大師球*${v('st_masterball')}`);
            if(v('st_greenpass')) res.push(`🩷綠票${v('st_greenpass')}張`);
            if(v('st_rarecandy')) res.push(`🩷神奇糖果 ${v('st_rarecandy')} 顆`);
            if(v('st_coin')) res.push(`寶可幣 ${v('st_coin')}`);
            if(v('g_price')) res.push(`💰價格 ${v('g_price')}`);
            
            return res.join('\n');
        };

        window.copyInventoryText = function(txt, btn) {
            const area = document.getElementById('hiddenCopyArea');
            area.style.display = 'block'; area.value = decodeURIComponent(txt);
            area.select(); document.execCommand('copy'); area.style.display = 'none';
            btn.innerHTML = '已複製'; setTimeout(() => btn.innerHTML = '複製', 1500);
        };
    </script>
</body>
</html>
