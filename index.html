<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶可夢頂級帳號庫 - V24 自動連線版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAXHqvXLLTmYl8kVV1fR0gJRFangwV85n8",
            authDomain: "pokemon-acc.firebaseapp.com",
            projectId: "pokemon-acc",
            storageBucket: "pokemon-acc.firebasestorage.app",
            messagingSenderId: "51529572144",
            appId: "1:51529572144:web:ae349a50d1152a755532f5",
            databaseURL: "https://pokemon-acc-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const inventoryRef = ref(db, 'inventory');
        let inventoryData = [];

        onValue(inventoryRef, (snapshot) => {
            const data = snapshot.val();
            inventoryData = [];
            if (data) {
                Object.keys(data).forEach(key => {
                    inventoryData.push({ uid: key, ...data[key] });
                });
            }
            renderInventory(); 
        });

        window.syncToGoogleSheets = async function(accountId, fullText, btn) {
            const sheetId = document.getElementById('googleSheetId').value.trim();
            const scriptUrl = document.getElementById('gasUrl').value.trim();
            if(!sheetId || !scriptUrl) { alert("試算表連線異常！"); return; }
            
            const oldText = btn.innerHTML; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 傳送中...'; btn.disabled = true;
            try {
                await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'add', id: sheetId, accountId: accountId, data: decodeURIComponent(fullText) }) });
                btn.innerHTML = '✅ 已拋轉'; setTimeout(() => { btn.innerHTML = oldText; btn.disabled = false; }, 2000);
            } catch (e) { alert("同步失敗！"); btn.innerHTML = oldText; btn.disabled = false; }
        };

        window.syncAllToSheets = async function(btn) {
            const activeData = inventoryData.filter(item => item.status !== 'sold');
            if(activeData.length === 0) { alert('沒有現貨資料可拋轉！'); return; }
            if(!confirm(`確定要將【${activeData.length}】個現貨帳號一次拋轉嗎？`)) return;
            
            const sheetId = document.getElementById('googleSheetId').value.trim(); const scriptUrl = document.getElementById('gasUrl').value.trim();
            if(!sheetId || !scriptUrl) { alert("試算表連線異常！"); return; }
            
            const oldText = btn.innerHTML; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 拋轉中...'; btn.disabled = true;
            const allData = activeData.map(item => ({ accountId: item.accountId, data: decodeURIComponent(item.fullText) }));
            try {
                await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'syncAll', id: sheetId, allData: allData }) });
                btn.innerHTML = '✅ 全部拋轉成功！'; setTimeout(() => { btn.innerHTML = oldText; btn.disabled = false; }, 3000);
            } catch (e) { alert("失敗！"); btn.innerHTML = oldText; btn.disabled = false; }
        };

        window.markAsSold = async function(uid, accountId, btn) {
            const isAlreadySold = btn.innerText.includes('補塗');
            if(!isAlreadySold) {
                if(!confirm(`確定要將此帳號標記為已售出嗎？\n這會將試算表中所有分頁的該筆資料標示為黃色！`)) return;
                update(ref(db, `inventory/${uid}`), { status: 'sold' });
            }
            
            const sheetId = document.getElementById('googleSheetId').value.trim();
            const scriptUrl = document.getElementById('gasUrl').value.trim();
            if(sheetId && scriptUrl) {
                const oldText = btn.innerHTML; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 處理中...'; btn.disabled = true;
                try {
                    await fetch(scriptUrl, {
                        method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'sold', id: sheetId, accountId: accountId })
                    });
                    btn.innerHTML = '✅ 已塗黃'; setTimeout(() => { btn.innerHTML = isAlreadySold ? '🟡 補塗黃色' : '💰 售出'; btn.disabled = false; }, 2000);
                } catch(e) { btn.innerHTML = oldText; btn.disabled = false; }
            }
        };

        window.addAccountToInventory = function() {
            const accountId = document.getElementById('g_id').value.trim();
            if(!accountId) { alert("請輸入帳號代碼！"); return; }
            
            const newItem = {
                accountId: accountId, 
                level: document.getElementById('g_level').value, team: document.getElementById('g_team').value, price: document.getElementById('g_price').value || "未標價", stardust: document.getElementById('g_stardust').value || "未知", 
                fullText: encodeURIComponent(window.generateText()), 
                timestamp: Date.now(),
                status: document.getElementById('g_item_status').value
            };
            push(inventoryRef, newItem);
            
            document.querySelectorAll('input, textarea').forEach(el => {
                if(!['geminiApiKey','googleSheetId','gasUrl','g_level'].includes(el.id) && el.type !== 'checkbox') el.value = '';
                if(el.type === 'checkbox') el.checked = false;
            });
            document.getElementById('g_item_status').value = 'active'; 
            document.querySelectorAll('.dynamic-select').forEach(el => el.classList.add('hidden')); window.clearImage();
        };

        window.deleteAccount = async function(uid, accountId) {
            if(confirm('確定要刪除嗎？這會同時從試算表刪除喔！')) { 
                remove(ref(db, `inventory/${uid}`)); 
                const sheetId = document.getElementById('googleSheetId').value.trim(); const scriptUrl = document.getElementById('gasUrl').value.trim();
                if(sheetId && scriptUrl) {
                    try { fetch(scriptUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'delete', id: sheetId, accountId: accountId }) }); } catch(e) {}
                }
            }
        };

        window.renderInventory = function() {
            const tbody = document.getElementById('inventoryBody');
            if(!tbody) return; tbody.innerHTML = ''; 
            
            const filterStatus = document.getElementById('filterStatus') ? document.getElementById('filterStatus').value : 'all';
            const sortMode = document.getElementById('sortMode') ? document.getElementById('sortMode').value : 'priceDesc';
            const searchQuery = document.getElementById('searchInput') ? document.getElementById('searchInput').value.toLowerCase().trim() : '';
            
            let displayData = inventoryData.filter(item => {
                if (filterStatus === 'active' && item.status === 'sold') return false;
                if (filterStatus === 'sold' && item.status !== 'sold') return false;
                if (searchQuery && !item.accountId.toLowerCase().includes(searchQuery)) return false;
                return true;
            });
            
            displayData.sort((a, b) => {
                if (sortMode === 'priceDesc') {
                    let pA = parseInt(a.price); pA = isNaN(pA) ? -1 : pA; let pB = parseInt(b.price); pB = isNaN(pB) ? -1 : pB;
                    if(pA !== pB) return pB - pA; return b.timestamp - a.timestamp;
                } else if (sortMode === 'priceAsc') {
                    let pA = parseInt(a.price); pA = isNaN(pA) ? Infinity : pA; let pB = parseInt(b.price); pB = isNaN(pB) ? Infinity : pB;
                    if(pA !== pB) return pA - pB; return b.timestamp - a.timestamp;
                } else { return b.timestamp - a.timestamp; }
            });

            displayData.forEach(item => {
                const isSold = item.status === 'sold';
                const rowBg = isSold ? 'bg-yellow-50 opacity-80' : 'hover:bg-blue-50 bg-white';
                const newRow = document.createElement('tr');
                newRow.className = `${rowBg} border-b border-gray-100 transition duration-300`;
                let teamColor = item.team === '紅隊' ? 'text-red-500' : (item.team === '藍隊' ? 'text-blue-500' : 'text-yellow-500');
                
                const soldLabel = isSold ? '<span class="ml-2 bg-red-500 text-white text-[10px] px-1.5 py-0.5 rounded shadow">已售出</span>' : '<span class="ml-2 bg-green-500 text-white text-[10px] px-1.5 py-0.5 rounded shadow">現貨</span>';
                
                const actionBtns = isSold 
                    ? `<button onclick="window.markAsSold('${item.uid}', '${item.accountId}', this)" class="bg-yellow-100 hover:bg-yellow-200 text-yellow-800 border border-yellow-300 px-3 py-1.5 rounded text-xs shadow font-bold">🟡 補塗黃色</button>`
                    : `<button onclick="window.markAsSold('${item.uid}', '${item.accountId}', this)" class="bg-yellow-400 hover:bg-yellow-500 text-gray-900 px-3 py-1.5 rounded text-xs shadow font-bold">💰 售出</button>`;

                const shortDisplayId = item.accountId.substring(0, 6).toUpperCase();

                newRow.innerHTML = `
                    <td class="px-6 py-4">
                        <div class="font-mono font-bold text-lg uppercase flex items-center">${shortDisplayId}${soldLabel}</div>
                        <div class="text-[10px] text-gray-400 font-mono mt-0.5 break-all">${item.accountId}</div>
                    </td>
                    <td class="px-6 py-4 text-sm font-bold ${teamColor}">${item.level}等 ${item.team}</td>
                    <td class="px-6 py-4 text-sm text-red-600 font-bold">$ ${item.price}</td>
                    <td class="px-6 py-4 text-center flex gap-2 justify-center flex-wrap">
                        <button onclick="window.copyInventoryText('${item.fullText}', this)" class="bg-gray-800 text-white px-3 py-1.5 rounded text-xs shadow">複製</button>
                        <button onclick="window.syncToGoogleSheets('${item.accountId}', '${item.fullText}', this)" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded text-xs shadow">拋轉</button>
                        ${actionBtns}
                    </td>
                    <td class="px-6 py-4 text-center"><button onclick="window.deleteAccount('${item.uid}', '${item.accountId}')" class="text-red-400 hover:text-red-600 p-2"><i class="fas fa-trash-alt"></i></button></td>
                `;
                tbody.appendChild(newRow);
            });
            const countEl = document.getElementById('inventoryCount');
            if(countEl) countEl.innerText = displayData.length;
        }
    </script>
</head>

                        <div>紀念背卡<input type="number" id="st_bg_comm" class="w-full p-1 border rounded"></div>
                        <div>特別背卡<input type="number" id="st_bg_special" class="w-full p-1 border rounded"></div>
                        <div>極巨化<input type="number" id="st_dyna" class="w-full p-1 border rounded"></div>
                        <div>超極巨化<input type="number" id="st_giga" class="w-full p-1 border rounded"></div>
                        <div>完美<input type="number" id="st_perfect" class="w-full p-1 border rounded"></div>
                    </div>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border overflow-hidden mt-4">
            <div class="p-4 bg-gray-50 border-b font-bold flex justify-between items-center flex-wrap gap-2">
                <span>雲端同步總表 (<span id="inventoryCount">0</span>)</span>
                <div class="flex items-center gap-2 flex-wrap">
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-2 text-gray-400"><i class="fas fa-search"></i></span>
                        <input type="text" id="searchInput" oninput="renderInventory()" placeholder="搜尋代碼..." class="border border-gray-300 pl-7 p-1.5 rounded font-normal text-xs text-gray-700 bg-white w-32 focus:outline-none focus:ring-1 focus:ring-blue-500 shadow-inner">
                    </div>

                    <button onclick="syncAllToSheets(this)" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded-lg text-xs font-bold shadow-md transition transform active:scale-95">
                        <i class="fas fa-rocket mr-1"></i> 拋轉所有現貨
                    </button>
                    <select id="filterStatus" onchange="renderInventory()" class="border border-indigo-200 p-1.5 rounded font-bold text-xs text-indigo-700 bg-indigo-50 cursor-pointer">
                        <option value="all">📦 顯示全部</option>
                        <option value="active">🟢 僅現貨</option>
                        <option value="sold">🔴 僅售出</option>
                    </select>
                    <select id="sortMode" onchange="renderInventory()" class="border p-1.5 rounded font-normal text-xs text-gray-700 bg-white cursor-pointer">
                        <option value="priceDesc">💰 售價：高 ➔ 低</option>
                        <option value="priceAsc">💰 售價：低 ➔ 高</option>
                        <option value="newest">🆕 最新加入時間</option>
                    </select>
                </div>
            </div>
            <table class="w-full text-left text-sm">
                <thead class="bg-gray-50"><tr><th class="px-6 py-3 border-b">代碼</th><th class="px-6 py-3 border-b">資訊</th><th class="px-6 py-3 border-b">售價</th><th class="px-6 py-3 border-b text-center">自動化</th><th class="px-6 py-3 border-b text-center">刪除</th></tr></thead>
                <tbody id="inventoryBody"></tbody>
            </table>
        </div>
    </main>

    <textarea id="hiddenCopyArea" class="hidden"></textarea>

    <script>
        // 🌟 初始化：只從 localStorage 讀取 AI Key。表單跟 GAS 已經寫死了！
        document.getElementById('geminiApiKey').value = localStorage.getItem('geminiApiKey') || '';
        
        window.saveApiKey = function() { 
            localStorage.setItem('geminiApiKey', document.getElementById('geminiApiKey').value.trim()); 
            alert('AI Key 設定已儲存！(試算表連線已自動綁定)'); 
        };

        window.previewImages = function(event) {
            const files = event.target.files; const container = document.getElementById('imagePreviewContainer'); container.innerHTML = ''; if(files.length === 0) return;
            for(let i = 0; i < files.length; i++) {
                const reader = new FileReader(); reader.onload = (e) => { const img = document.createElement('img'); img.src = e.target.result; img.className = 'rounded h-12 border'; container.appendChild(img); }
                reader.readAsDataURL(files[i]);
            }
            document.getElementById('aiBtn').classList.remove('hidden');
        };

        window.clearImage = function() { document.getElementById('imageInput').value = ''; document.getElementById('imagePreviewContainer').innerHTML = ''; document.getElementById('aiBtn').classList.add('hidden'); };

        window.analyzeMultipleImages = async function() {
            const apiKey = document.getElementById('geminiApiKey').value.trim(); const files = document.getElementById('imageInput').files; if(!apiKey || files.length === 0) return;
            const aiBtn = document.getElementById('aiBtn'); aiBtn.disabled = true; aiBtn.innerHTML = '辨識中...';
            try {
                let parts = [{ text: "辨識寶可夢型態(起源等)、色違、暗影，統計數量。抓出截圖最上方『寶可夢 XX/YY』的 XX 數字。輸出 JSON: {pokemon_list: '字串', total_perfect: 數字}" }];
                for(let i=0; i<files.length; i++){
                    const base64 = await new Promise(r => {
                        const reader = new FileReader(); reader.onload = (e) => {
                            const img = new Image(); img.onload = () => {
                                const canvas = document.createElement('canvas'); canvas.width = 800; canvas.height = 800 * (img.height/img.width);
                                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height); r(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                            }; img.src = e.target.result;
                        }; reader.readAsDataURL(files[i]);
                    });
                    parts.push({ inlineData: { mimeType: "image/jpeg", data: base64 } });
                }
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts }] }) });
                const data = await resp.json(); let cleanText = data.candidates[0].content.parts[0].text.replace(/```json/gi, '').replace(/```/g, '').trim(); let res = JSON.parse(cleanText);
                document.getElementById('g_hundos').value = res.pokemon_list || ''; if(res.total_perfect) document.getElementById('st_hundo_leg').value = res.total_perfect;
            } catch (e) { alert("AI辨識異常"); }
            aiBtn.disabled = false; aiBtn.innerHTML = '🤖 AI 自動填數量';
        };

        window.generateText = function() {
            const v = (id) => document.getElementById(id).value.trim(); const checked = (id) => document.getElementById(id).checked;
            let res = []; 
            const fullId = v('g_id'); const shortId = fullId.substring(0, 6).toUpperCase(); res.push(shortId); 
            res.push(`${v('g_level')}等${v('g_team')}`);
            let spList = []; for(let i=1; i<=10; i++){ if(checked('chk_sp_'+i)) spList.push(document.getElementById('chk_sp_'+i).value); }
            if(spList.length > 0) res.push(`🔥${spList.join(', ')}特殊調查🔥`);
            if(v('g_rare_list')) res.push(`🔥${v('g_rare_list')}🔥`);
            if(v('st_old_poke')) res.push(`‼️${v('st_old_poke')} 隻 16–20年寶可夢‼️`);
            if(v('st_old_leg')) res.push(`‼️${v('st_old_leg')} 隻 16–20年神獸‼️`);
            if(checked('chk_kyurem')) res.push(v('sel_kyurem'));
            if(checked('chk_zamazenta')) res.push(v('sel_dogs'));
            if(checked('chk_necrozma')) res.push(v('sel_necrozma'));
            if(checked('chk_dyna')) res.push(`✨可打極巨化／超極巨化✨`);
            if(checked('chk_lati')) res.push(v('sel_lati'));
            if(checked('chk_hoenn')) res.push(v('sel_hoenn'));
            if(checked('chk_groudon')) res.push(`固拉多有開斷崖之劍`);
            if(checked('chk_kyogre')) res.push(`蓋歐卡有開根源波動`);
            if(checked('chk_rayquaza')) res.push(`烈空坐有開畫龍點睛`);
            if(v('g_xp')) res.push(`經驗 ${v('g_xp')}萬`); if(v('g_stardust')) res.push(`星塵 ${v('g_stardust')}萬`);
            if(v('st_hundo_leg')) { let listStr = v('g_hundos') ? ` ${v('g_hundos')}` : ''; res.push(`✅${v('st_hundo_leg')}隻百神${listStr}`); }
            if(v('st_legend')) res.push(`✅神獸總數${v('st_legend')}隻`); if(v('st_shiny')) res.push(`✅色違寶可夢${v('st_shiny')}隻`);
            if(v('st_shiny_leg')) res.push(`✅色違神獸${v('st_shiny_leg')}隻`); if(v('st_costume')) res.push(`✅裝扮寶可夢${v('st_costume')}隻`);
            if(v('st_bg_comm')) res.push(`✅紀念背卡${v('st_bg_comm')}隻`); if(v('st_bg_special')) res.push(`✅特別背卡${v('st_bg_special')}隻`);
            if(v('st_dyna')) res.push(`✅極巨化${v('st_dyna')}隻`); if(v('st_giga')) res.push(`✅超極巨化${v('st_giga')}隻`);
            if(v('st_perfect')) res.push(`✅完美${v('st_perfect')}隻`);
            if(v('st_bag')) res.push(`背包${v('st_bag')}`); if(v('st_masterball')) res.push(`🩷大師球*${v('st_masterball')}`);
            if(v('st_greenpass')) res.push(`🩷綠票${v('st_greenpass')}張`); if(v('st_rarecandy')) res.push(`🩷神奇糖果 ${v('st_rarecandy')} 顆`);
            if(v('st_coin')) res.push(`寶可幣 ${v('st_coin')}`); if(v('g_price')) res.push(`💰價格 ${v('g_price')}`);
            return res.join('\n');
        };

        window.copyInventoryText = function(txt, btn) {
            const area = document.getElementById('hiddenCopyArea'); area.style.display = 'block'; area.value = decodeURIComponent(txt);
            area.select(); document.execCommand('copy'); area.style.display = 'none';
            btn.innerHTML = '已複製'; setTimeout(() => btn.innerHTML = '複製', 1500);
        };

        window.copySimpleText = function(txt, btn) {
            const area = document.getElementById('hiddenCopyArea');
            area.style.display = 'block'; area.value = txt;
            area.select(); document.execCommand('copy'); area.style.display = 'none';
            const oldText = btn.innerHTML; 
            btn.innerHTML = '✅ 已複製！'; 
            setTimeout(() => btn.innerHTML = oldText, 1500);
        };
    </script>
</body>
</html>
