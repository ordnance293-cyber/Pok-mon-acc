<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶可夢頂級帳號庫 - 批次管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c7c7cc; border-radius: 8px; }
        .poke-checkbox { width: 1rem; height: 1rem; color: #2563eb; background-color: #f3f4f6; border-color: #d1d5db; border-radius: 0.25rem; cursor: pointer; }
        /* 圖片預覽區的限制高度 */
        #imagePreview { max-height: 250px; object-fit: contain; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased relative">

    <header class="sticky top-0 z-50 glass-effect border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2">
                    <div class="bg-blue-600 p-2 rounded-lg text-white shadow-md"><i class="fas fa-layer-group text-xl"></i></div>
                    <span class="text-xl font-bold tracking-tight text-gray-900">寶可夢大量庫存系統</span>
                </div>
                <button onclick="exportTableToCSV('寶可夢庫存總表.csv')" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-all shadow-sm flex items-center gap-2">
                    <i class="fas fa-file-excel"></i>匯出全部庫存 (CSV)
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 mb-8">
            <div class="flex justify-between items-center mb-4 border-b border-gray-100 pb-4">
                <h2 class="text-xl font-bold text-gray-800"><i class="fas fa-bolt text-yellow-500 mr-2"></i>快速建檔區</h2>
                <button type="button" onclick="addAccountToInventory()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-xl font-bold transition-all shadow-md transform hover:scale-105 flex items-center gap-2">
                    <i class="fas fa-plus-circle"></i> 加入下方庫存總表
                </button>
            </div>

            <form id="generatorForm" class="grid grid-cols-1 md:grid-cols-5 gap-6">
                
                <div class="space-y-3 md:col-span-1 bg-gray-50 p-3 rounded-lg border border-dashed border-gray-300 flex flex-col items-center justify-center relative">
                    <h3 class="font-bold text-xs text-gray-500 uppercase tracking-wider w-full text-center mb-2"><i class="fas fa-image mr-1"></i>圖片對照區</h3>
                    <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="previewImage(event)">
                    <label for="imageInput" class="cursor-pointer bg-white border border-gray-300 text-gray-600 px-3 py-1 rounded text-xs hover:bg-gray-100 transition shadow-sm mb-2 w-full text-center">
                        選擇遊戲截圖
                    </label>
                    <div class="w-full flex justify-center overflow-hidden">
                        <img id="imagePreview" src="" alt="預覽圖" class="hidden rounded shadow-sm">
                        <span id="imagePlaceholder" class="text-xs text-gray-400 text-center py-8">尚未上傳圖片<br>(可將圖片丟給 AI 辨識後<br>貼入右側清單)</span>
                    </div>
                    <button type="button" id="clearImageBtn" onclick="clearImage()" class="hidden absolute top-2 right-2 text-red-500 hover:text-red-700 bg-white rounded-full w-6 h-6 flex items-center justify-center shadow"><i class="fas fa-times text-xs"></i></button>
                </div>

                <div class="space-y-3 md:col-span-1">
                    <h3 class="font-bold text-sm text-gray-500 uppercase tracking-wider">1. 基本資訊</h3>
                    <div><label class="block text-xs text-gray-700 mb-1">帳號代碼</label><input type="text" id="g_id" placeholder="例如: 3834vv" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 text-sm font-mono uppercase"></div>
                    <div class="flex gap-2">
                        <div class="w-1/2"><label class="block text-xs text-gray-700 mb-1">等級</label><input type="number" id="g_level" value="70" class="w-full p-2 border border-gray-300 rounded text-sm"></div>
                        <div class="w-1/2"><label class="block text-xs text-gray-700 mb-1">陣營</label>
                            <select id="g_team" class="w-full p-2 border border-gray-300 rounded text-sm">
                                <option value="藍隊" selected>藍隊</option><option value="紅隊">紅隊</option><option value="黃隊">黃隊</option>
                            </select>
                        </div>
                    </div>
                    <div><label class="block text-xs text-gray-700 mb-1">💰 價格</label><input type="number" id="g_price" placeholder="例如: 3800" class="w-full p-2 border border-yellow-400 rounded text-sm font-bold text-red-600 bg-yellow-50"></div>
                    <div><label class="block text-xs text-gray-700 mb-1">星塵</label><input type="text" id="g_stardust" placeholder="例如: 360萬" class="w-full p-2 border border-gray-300 rounded text-sm"></div>
                </div>

                <div class="space-y-2 md:col-span-1">
                    <h3 class="font-bold text-sm text-gray-500 uppercase tracking-wider">2. 亮點特徵</h3>
                    <label class="flex items-center gap-2 text-xs text-gray-800 cursor-pointer"><input type="checkbox" id="chk_marshadow" class="poke-checkbox">瑪夏多特殊調查</label>
                    <label class="flex items-center gap-2 text-xs text-gray-800 cursor-pointer"><input type="checkbox" id="chk_kyurem" class="poke-checkbox">酋雷姆合體</label>
                    <label class="flex items-center gap-2 text-xs text-gray-800 cursor-pointer"><input type="checkbox" id="chk_zamazenta" class="poke-checkbox">蒼響劍盾型態</label>
                    <label class="flex items-center gap-2 text-xs text-gray-800 cursor-pointer"><input type="checkbox" id="chk_necrozma" class="poke-checkbox">奈克洛茲瑪合體</label>
                    <label class="flex items-center gap-2 text-xs text-gray-800 cursor-pointer"><input type="checkbox" id="chk_dyna" class="poke-checkbox">極巨化／超極巨化</label>
                    <label class="flex items-center gap-2 text-xs text-gray-800 cursor-pointer"><input type="checkbox" id="chk_mega_ray" class="poke-checkbox">烈空坐能量</label>
                    <label class="flex items-center gap-2 text-xs text-gray-800 cursor-pointer"><input type="checkbox" id="chk_move_groudon" class="poke-checkbox">斷崖之劍</label>
                    <label class="flex items-center gap-2 text-xs text-gray-800 cursor-pointer"><input type="checkbox" id="chk_move_kyogre" class="poke-checkbox">根源波動</label>
                    <label class="flex items-center gap-2 text-xs text-gray-800 cursor-pointer"><input type="checkbox" id="chk_move_ray" class="poke-checkbox">畫龍點睛</label>
                </div>

                <div class="col-span-1 md:col-span-2 space-y-3">
                    <h3 class="font-bold text-sm text-gray-500 uppercase tracking-wider">3. 統計與自訂亮點</h3>
                    <div>
                        <label class="block text-xs text-gray-700 mb-1 flex justify-between">
                            <span>百神詳細清單 (自動加✅)</span>
                            <span class="text-blue-500 text-[10px]"><i class="fas fa-info-circle"></i> 將 AI 辨識結果貼於此</span>
                        </label>
                        <input type="text" id="g_hundos" placeholder="貼上 AI 辨識出來的名稱..." class="w-full p-2 border border-blue-200 rounded text-sm bg-blue-50 focus:ring-2 focus:ring-blue-500">
                    </div>
                    
                    <div class="grid grid-cols-5 gap-2">
                        <div><label class="block text-[10px] text-gray-600">神獸總數</label><input type="number" id="st_legend" class="w-full p-1 border border-gray-300 rounded text-sm"></div>
                        <div><label class="block text-[10px] text-gray-600">色違神獸</label><input type="number" id="st_shiny_leg" class="w-full p-1 border border-gray-300 rounded text-sm"></div>
                        <div><label class="block text-[10px] text-gray-600">裝扮</label><input type="number" id="st_costume" class="w-full p-1 border border-gray-300 rounded text-sm"></div>
                        <div><label class="block text-[10px] text-gray-600">色違裝扮</label><input type="number" id="st_shiny_costume" class="w-full p-1 border border-gray-300 rounded text-sm"></div>
                        <div><label class="block text-[10px] text-gray-600">特別背卡</label><input type="number" id="st_bg_special" class="w-full p-1 border border-gray-300 rounded text-sm"></div>
                        <div><label class="block text-[10px] text-gray-600">紀念背卡</label><input type="number" id="st_bg_comm" class="w-full p-1 border border-gray-300 rounded text-sm"></div>
                        <div><label class="block text-[10px] text-gray-600">極巨化(🔥)</label><input type="number" id="st_dyna" class="w-full p-1 border border-gray-300 rounded text-sm"></div>
                        <div><label class="block text-[10px] text-gray-600">超極巨化(🔥)</label><input type="number" id="st_giga" class="w-full p-1 border border-gray-300 rounded text-sm"></div>
                        <div><label class="block text-[10px] text-gray-600">完美</label><input type="number" id="st_perfect" class="w-full p-1 border border-gray-300 rounded text-sm"></div>
                        <div><label class="block text-[10px] text-gray-600">色違完美</label><input type="number" id="st_shundo" class="w-full p-1 border border-gray-300 rounded text-sm"></div>
                    </div>

                    <div><label class="block text-xs text-gray-700 mb-1">🔥 自訂稀有神獸 (每行自動加🔥)</label><textarea id="g_custom_fire" rows="2" class="w-full p-2 border border-red-200 rounded text-sm custom-scrollbar" placeholder="稀有無極汰那..."></textarea></div>
                </div>
            </form>
        </div>

        <section class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                <h2 class="text-lg font-bold text-gray-800"><i class="fas fa-boxes text-blue-500 mr-2"></i>庫存總表 (<span id="inventoryCount">0</span> 筆)</h2>
            </div>
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left border-collapse" id="inventoryTable">
                    <thead>
                        <tr class="bg-white text-gray-500 text-xs uppercase tracking-wider font-semibold border-b border-gray-200">
                            <th class="px-6 py-4">帳號代碼</th>
                            <th class="px-6 py-4">等級陣營</th>
                            <th class="px-6 py-4">星塵</th>
                            <th class="px-6 py-4">售價</th>
                            <th class="px-6 py-4 text-center">生成文案</th>
                            <th class="px-6 py-4 text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100" id="inventoryBody">
                    </tbody>
                </table>
                <div id="emptyState" class="text-center py-12 text-gray-400">
                    <i class="fas fa-inbox text-4xl mb-3"></i>
                    <p>目前庫存為空，請從上方填寫資料並加入庫存。</p>
                </div>
            </div>
        </section>
    </main>

    <textarea id="hiddenCopyArea" class="hidden"></textarea>

    <script>
        // --- 🌟 新增：圖片預覽功能的 JavaScript ---
        function previewImage(event) {
            const input = event.target;
            const preview = document.getElementById('imagePreview');
            const placeholder = document.getElementById('imagePlaceholder');
            const clearBtn = document.getElementById('clearImageBtn');

            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                    clearBtn.classList.remove('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function clearImage() {
            const input = document.getElementById('imageInput');
            const preview = document.getElementById('imagePreview');
            const placeholder = document.getElementById('imagePlaceholder');
            const clearBtn = document.getElementById('clearImageBtn');

            input.value = ''; // 清空選擇的檔案
            preview.src = '';
            preview.classList.add('hidden');
            placeholder.classList.remove('hidden');
            clearBtn.classList.add('hidden');
        }
        // --- 圖片預覽功能結束 ---

        let inventoryData = JSON.parse(localStorage.getItem('pokemonInventory')) || [];

        window.onload = function() {
            renderInventory();
        };

        function generateText() {
            const v = (id) => document.getElementById(id).value.trim();
            const checked = (id) => document.getElementById(id).checked;
            let result = [];

            result.push(v('g_id'));
            result.push(`${v('g_level')}等${v('g_team')}`);
            if(checked('chk_marshadow')) result.push(`🔥凱路迪歐, 瑪夏多特殊調查🔥`);
            if(v('g_custom_fire')) {
                v('g_custom_fire').split('\n').filter(l => l.trim()).forEach(h => result.push(`🔥${h.replace(/🔥/g, '').trim()}🔥`));
            }
            if(checked('chk_kyurem')) result.push(`‼️酋雷姆闇黑/雙型態合體‼️`);
            if(checked('chk_zamazenta')) result.push(`‼️蒼響劍盾型態‼️`);
            if(checked('chk_necrozma')) result.push(`‼️奈克洛茲瑪月亮/雙型態合體‼️`);
            if(checked('chk_dyna')) result.push(`✨可打極巨化／超極巨化✨`);
            if(checked('chk_mega_ray')) result.push(`⭐️烈空坐能量夠Mega⭐️`);
            if(checked('chk_move_groudon')) result.push(`固拉多有開斷崖之劍`);
            if(checked('chk_move_kyogre')) result.push(`蓋歐卡有開根源波動`);
            if(checked('chk_move_ray')) result.push(`烈空坐有開畫龍點睛`);
            if(v('g_stardust')) result.push(`星塵 ${v('g_stardust')}`);
            
            if(v('g_hundos')) result.push(`✅${v('g_hundos')}`);
            if(v('st_legend')) result.push(`✅神獸總數${v('st_legend')}隻`);
            if(v('st_shiny_leg')) result.push(`✅色違神獸${v('st_shiny_leg')}隻`);
            if(v('st_costume')) result.push(`✅裝扮${v('st_costume')}隻`);
            if(v('st_shiny_costume')) result.push(`✅色違裝扮${v('st_shiny_costume')}隻`);
            if(v('st_bg_special')) result.push(`✅特別背卡${v('st_bg_special')}隻`);
            if(v('st_bg_comm')) result.push(`✅紀念背卡${v('st_bg_comm')}隻`);
            if(v('st_dyna')) result.push(`🔥極巨化${v('st_dyna')}隻`);
            if(v('st_giga')) result.push(`🔥超極巨化${v('st_giga')}隻`);
            if(v('st_perfect')) result.push(`✅完美${v('st_perfect')}隻`);
            if(v('st_shundo')) result.push(`✅色違完美${v('st_shundo')}隻`);
            
            if(v('g_price')) result.push(`💰價格 ${v('g_price')}`);

            return result.join('\n');
        }

        function addAccountToInventory() {
            const accountId = document.getElementById('g_id').value.trim();
            if(!accountId) { alert("請至少輸入帳號代碼！"); return; }

            const level = document.getElementById('g_level').value;
            const team = document.getElementById('g_team').value;
            const price = document.getElementById('g_price').value || "未標價";
            const stardust = document.getElementById('g_stardust').value || "未知";
            
            const fullText = encodeURIComponent(generateText());
            const uid = Date.now().toString();

            const newItem = {
                uid: uid,
                accountId: accountId,
                level: level,
                team: team,
                price: price,
                stardust: stardust,
                fullText: fullText
            };

            inventoryData.unshift(newItem);
            saveToLocalStorage();
            renderInventory();

            // 新增完成後，可以選擇是否清空圖片預覽
            clearImage();
            document.getElementById('g_id').value = ''; 
        }

        function renderInventory() {
            const tbody = document.getElementById('inventoryBody');
            tbody.innerHTML = ''; 

            inventoryData.forEach(item => {
                const newRow = document.createElement('tr');
                newRow.className = 'hover:bg-blue-50 transition-colors bg-white';
                
                let teamColor = 'text-gray-500';
                if(item.team === '紅隊') teamColor = 'text-red-500';
                if(item.team === '藍隊') teamColor = 'text-blue-500';
                if(item.team === '黃隊') teamColor = 'text-yellow-500';

                newRow.innerHTML = `
                    <td class="px-6 py-4 font-mono font-bold text-gray-900 uppercase">${item.accountId}</td>
                    <td class="px-6 py-4 text-sm font-bold ${teamColor}">${item.level}等 ${item.team}</td>
                    <td class="px-6 py-4 text-sm text-gray-600">${item.stardust}</td>
                    <td class="px-6 py-4 text-sm font-bold text-red-600">$ ${item.price}</td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="copyInventoryText('${item.fullText}', this)" class="bg-gray-800 hover:bg-black text-white px-3 py-1.5 rounded-lg text-xs font-medium transition-all shadow-sm">
                            <i class="far fa-copy mr-1"></i>複製文案
                        </button>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="deleteAccount('${item.uid}')" class="text-red-400 hover:text-red-600 transition-colors p-2"><i class="fas fa-trash-alt"></i></button>
                    </td>
                `;
                tbody.appendChild(newRow);
            });

            updateCount();
        }

        function deleteAccount(uid) {
            if(confirm('確定要刪除這筆資料嗎？')) {
                inventoryData = inventoryData.filter(item => item.uid !== uid);
                saveToLocalStorage();
                renderInventory();
            }
        }

        function saveToLocalStorage() {
            localStorage.setItem('pokemonInventory', JSON.stringify(inventoryData));
        }

        function updateCount() {
            const count = inventoryData.length; 
            document.getElementById('inventoryCount').innerText = count;
            if(count === 0) {
                document.getElementById('emptyState').style.display = 'block';
            } else {
                document.getElementById('emptyState').style.display = 'none';
            }
        }

        function copyInventoryText(encodedText, btn) {
            const rawText = decodeURIComponent(encodedText);
            const hiddenArea = document.getElementById('hiddenCopyArea');
            hiddenArea.style.display = 'block';
            hiddenArea.value = rawText;
            hiddenArea.select();
            document.execCommand('copy');
            hiddenArea.style.display = 'none';
            window.getSelection().removeAllRanges();

            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> 已複製';
            btn.classList.add('bg-green-600');
            btn.classList.remove('bg-gray-800');
            setTimeout(() => {
                btn.innerHTML = originalHTML;
                btn.classList.remove('bg-green-600');
                btn.classList.add('bg-gray-800');
            }, 1500);
        }

        function exportTableToCSV(filename) {
            let csv = [];
            let rows = document.querySelectorAll("#inventoryTable tr");
            if(rows.length <= 1) { alert("目前沒有庫存可以匯出喔！"); return; }

            for (let i = 0; i < rows.length; i++) {
                let row = [], cols = rows[i].querySelectorAll("td, th");
                for (let j = 0; j < cols.length - 2; j++) {
                    let data = cols[j].innerText.replace(/(\r\n|\n|\r)/gm, " ").trim();
                    row.push('"' + data + '"');
                }
                csv.push(row.join(","));
            }
            let csvFile = new Blob(["\uFEFF" + csv.join("\n")], {type: "text/csv;charset=utf-8;"});
            let downloadLink = document.createElement("a");
            downloadLink.download = filename;
            downloadLink.href = window.URL.createObjectURL(csvFile);
            downloadLink.style.display = "none";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        }
    </script>
</body>
</html>
