<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶可夢頂級帳號庫 - V15.3 邏輯分離版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAXHqvXLLTmYl8kVV1fR0gJRFangwV85n8",
            authDomain: "pokemon-acc.firebaseapp.com",
            projectId: "pokemon-acc",
            storageBucket: "pokemon-acc.firebasestorage.app",
            messagingSenderId: "51529572144",
            appId: "1:51529572144:web:ae349a50d1152a755532f5",
            databaseURL: "https://pokemon-acc-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const inventoryRef = ref(db, 'inventory');
        let inventoryData = [];

        onValue(inventoryRef, (snapshot) => {
            const data = snapshot.val();
            inventoryData = [];
            if (data) {
                Object.keys(data).forEach(key => {
                    inventoryData.push({ uid: key, ...data[key] });
                });
                inventoryData.sort((a, b) => b.timestamp - a.timestamp);
            }
            renderInventory();
        });

        window.syncToGoogleSheets = async function(fullText, btn) {
            const sheetId = document.getElementById('googleSheetId').value.trim();
            const scriptUrl = document.getElementById('gasUrl').value.trim();
            if(!sheetId || !scriptUrl) { alert("請填寫頂部試算表設定！"); return; }
            const oldText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 同步中...';
            btn.disabled = true;
            try {
                await fetch(scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: sheetId, data: decodeURIComponent(fullText).split('\n') })
                });
                btn.innerHTML = '✅ 已填入試算表';
                setTimeout(() => { btn.innerHTML = oldText; btn.disabled = false; }, 2000);
            } catch (e) { alert("同步失敗！"); btn.innerHTML = oldText; btn.disabled = false; }
        };

        window.addAccountToInventory = function() {
            const accountId = document.getElementById('g_id').value.trim();
            if(!accountId) { alert("請輸入帳號代碼！"); return; }
            const newItem = {
                accountId: accountId,
                level: document.getElementById('g_level').value,
                team: document.getElementById('g_team').value,
                price: document.getElementById('g_price').value || "未標價",
                stardust: document.getElementById('g_stardust').value || "未知",
                fullText: encodeURIComponent(window.generateText()),
                timestamp: Date.now()
            };
            push(inventoryRef, newItem);
            document.querySelectorAll('input, textarea').forEach(el => {
                if(!['geminiApiKey','googleSheetId','gasUrl','g_level'].includes(el.id) && el.type !== 'checkbox') el.value = '';
                if(el.type === 'checkbox') el.checked = false;
            });
            document.querySelectorAll('.dynamic-select').forEach(el => el.classList.add('hidden'));
            window.clearImage();
        };

        window.deleteAccount = function(uid) {
            if(confirm('確定要從雲端刪除嗎？')) { remove(ref(db, `inventory/${uid}`)); }
        };

        function renderInventory() {
            const tbody = document.getElementById('inventoryBody');
            tbody.innerHTML = ''; 
            inventoryData.forEach(item => {
                const newRow = document.createElement('tr');
                newRow.className = 'hover:bg-blue-50 bg-white border-b border-gray-100';
                let teamColor = item.team === '紅隊' ? 'text-red-500' : (item.team === '藍隊' ? 'text-blue-500' : 'text-yellow-500');
                newRow.innerHTML = `
                    <td class="px-6 py-4 font-mono font-bold uppercase">${item.accountId}</td>
                    <td class="px-6 py-4 text-sm font-bold ${teamColor}">${item.level}等 ${item.team}</td>
                    <td class="px-6 py-4 text-sm text-red-600 font-bold">$ ${item.price}</td>
                    <td class="px-6 py-4 text-center flex gap-2 justify-center">
                        <button onclick="window.copyInventoryText('${item.fullText}', this)" class="bg-gray-800 text-white px-3 py-1.5 rounded text-xs">複製文案</button>
                        <button onclick="window.syncToGoogleSheets('${item.fullText}', this)" class="bg-green-600 text-white px-3 py-1.5 rounded text-xs">🚀 同步試算表</button>
                    </td>
                    <td class="px-6 py-4 text-center"><button onclick="window.deleteAccount('${item.uid}')" class="text-red-400 hover:text-red-600"><i class="fas fa-trash-alt"></i></button></td>
                `;
                tbody.appendChild(newRow);
            });
            document.getElementById('inventoryCount').innerText = inventoryData.length;
        }
    </script>
</head>

                    <select id="sel_hoenn" class="dynamic-select hidden w-full p-1 border rounded bg-white"><option value="⭐️豐原三神可 Mega⭐️">豐原三神可 Mega</option><option value="⭐️固拉多可 Mega⭐️">固拉多可 Mega</option><option value="⭐️蓋歐卡可 Mega⭐️">蓋歐卡可 Mega</option><option value="⭐️烈空坐能量夠Mega⭐️">烈空坐能量夠Mega</option></select>

    <textarea id="hiddenCopyArea" class="hidden"></textarea>

    <script>
        ['geminiApiKey', 'googleSheetId', 'gasUrl'].forEach(id => {
            document.getElementById(id).value = localStorage.getItem(id) || '';
        });
        window.saveApiKey = function() {
            ['geminiApiKey', 'googleSheetId', 'gasUrl'].forEach(id => {
                localStorage.setItem(id, document.getElementById(id).value.trim());
            });
            alert('設定已儲存！');
        };

        window.previewImages = function(event) {
            const files = event.target.files;
            const container = document.getElementById('imagePreviewContainer');
            container.innerHTML = ''; 
            if(files.length === 0) return;
            for(let i = 0; i < files.length; i++) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result; img.className = 'rounded h-12 border';
                    container.appendChild(img);
                }
                reader.readAsDataURL(files[i]);
            }
            document.getElementById('aiBtn').classList.remove('hidden');
        };

        window.clearImage = function() {
            document.getElementById('imageInput').value = '';
            document.getElementById('imagePreviewContainer').innerHTML = '';
            document.getElementById('aiBtn').classList.add('hidden');
        };

        window.analyzeMultipleImages = async function() {
            const apiKey = document.getElementById('geminiApiKey').value.trim();
            const files = document.getElementById('imageInput').files;
            if(!apiKey || files.length === 0) return;
            const aiBtn = document.getElementById('aiBtn');
            aiBtn.disabled = true; aiBtn.innerHTML = '辨識中...';
            try {
                let parts = [{ text: "辨識寶可夢型態(起源等)、色違、暗影，統計數量。抓出截圖最上方『寶可夢 XX/YY』的 XX 數字。輸出 JSON: {pokemon_list: '字串', total_perfect: 數字}" }];
                for(let i=0; i<files.length; i++){
                    const base64 = await new Promise(r => {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const img = new Image();
                            img.onload = () => {
                                const canvas = document.createElement('canvas');
                                canvas.width = 800; canvas.height = 800 * (img.height/img.width);
                                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                                r(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                            };
                            img.src = e.target.result;
                        };
                        reader.readAsDataURL(files[i]);
                    });
                    parts.push({ inlineData: { mimeType: "image/jpeg", data: base64 } });
                }
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts }] })
                });
                const data = await resp.json();
                let cleanText = data.candidates[0].content.parts[0].text.replace(/```json/gi, '').replace(/```/g, '').trim();
                let res = JSON.parse(cleanText);
                
                // 這裡修復了 id 錯誤 (hundos -> g_hundos)
                document.getElementById('g_hundos').value = res.pokemon_list || '';
                if(res.total_perfect) document.getElementById('st_hundo_leg').value = res.total_perfect;
            } catch (e) { alert("AI辨識異常"); }
            aiBtn.disabled = false; aiBtn.innerHTML = '🤖 AI 自動填數量';
        };

        window.generateText = function() {
            const v = (id) => document.getElementById(id).value.trim();
            const checked = (id) => document.getElementById(id).checked;
            let res = [];
            
            res.push(v('g_id'));
            res.push(`${v('g_level')}等${v('g_team')}`);
            
            // 🌟 1. 處理特殊調查打勾區
            let spList = [];
            for(let i=1; i<=10; i++){ if(checked('chk_sp_'+i)) spList.push(document.getElementById('chk_sp_'+i).value); }
            if(spList.length > 0) res.push(`🔥${spList.join(', ')}特殊調查🔥`);
            
            // 🌟 2. 處理自訂稀有怪 (完全獨立，不再強加特殊調查)
            if(v('g_rare_list')) res.push(`🔥${v('g_rare_list')}🔥`);
            
            if(v('st_old_poke')) res.push(`‼️${v('st_old_poke')} 隻 16–20年寶可夢‼️`);
            if(v('st_old_leg')) res.push(`‼️${v('st_old_leg')} 隻 16–20年神獸‼️`);
            if(checked('chk_kyurem')) res.push(v('sel_kyurem'));
            if(checked('chk_zamazenta')) res.push(v('sel_dogs'));
            if(checked('chk_necrozma')) res.push(v('sel_necrozma'));
            if(checked('chk_dyna')) res.push(`✨可打極巨化／超極巨化✨`);
            if(checked('chk_lati')) res.push(v('sel_lati'));
            if(checked('chk_hoenn')) res.push(v('sel_hoenn'));
            if(checked('chk_groudon')) res.push(`固拉多有開斷崖之劍`);
            if(checked('chk_kyogre')) res.push(`蓋歐卡有開根源波動`);
            if(checked('chk_rayquaza')) res.push(`烈空坐有開畫龍點睛`);
            
            if(v('g_xp')) res.push(`經驗 ${v('g_xp')}萬`);
            if(v('g_stardust')) res.push(`星塵 ${v('g_stardust')}萬`);
            
            if(v('st_hundo_leg')) {
                let listStr = v('g_hundos') ? ` ${v('g_hundos')}` : '';
                res.push(`✅${v('st_hundo_leg')}隻百神${listStr}`);
            }
            if(v('st_legend')) res.push(`✅神獸總數${v('st_legend')}隻`);
            if(v('st_shiny')) res.push(`✅色違寶可夢${v('st_shiny')}隻`);
            if(v('st_shiny_leg')) res.push(`✅色違神獸${v('st_shiny_leg')}隻`);
            if(v('st_costume')) res.push(`✅裝扮寶可夢${v('st_costume')}隻`);
            if(v('st_bg_comm')) res.push(`✅紀念背卡${v('st_bg_comm')}隻`);
            if(v('st_bg_special')) res.push(`✅特別背卡${v('st_bg_special')}隻`);
            if(v('st_dyna')) res.push(`✅極巨化${v('st_dyna')}隻`);
            if(v('st_giga')) res.push(`✅超極巨化${v('st_giga')}隻`);
            if(v('st_perfect')) res.push(`✅完美${v('st_perfect')}隻`);
            
            if(v('st_bag')) res.push(`背包${v('st_bag')}`);
            if(v('st_masterball')) res.push(`🩷大師球*${v('st_masterball')}`);
            if(v('st_greenpass')) res.push(`🩷綠票${v('st_greenpass')}張`);
            
            // 🌟 修復了這裡的 id 錯誤 (rarecandy -> st_rarecandy)
            if(v('st_rarecandy')) res.push(`🩷神奇糖果 ${v('st_rarecandy')} 顆`);
            
            if(v('st_coin')) res.push(`寶可幣 ${v('st_coin')}`);
            if(v('g_price')) res.push(`💰價格 ${v('g_price')}`);
            
            return res.join('\n');
        };

        window.copyInventoryText = function(txt, btn) {
            const area = document.getElementById('hiddenCopyArea');
            area.style.display = 'block'; area.value = decodeURIComponent(txt);
            area.select(); document.execCommand('copy'); area.style.display = 'none';
            btn.innerHTML = '已複製'; setTimeout(() => btn.innerHTML = '複製文案', 1500);
        };
    </script>
</body>
</html>
