<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>純數字驅動儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 隱藏數字輸入框的預設上下箭頭，讓介面更乾淨 */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans selection:bg-indigo-500 selection:text-white">

    <header class="bg-gray-800 shadow-lg border-b border-gray-700 py-6 px-4 md:px-8">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">
                <i class="fa-solid fa-chart-pie mr-2 text-indigo-400"></i>即時數據監控中心
            </h1>
            <span class="text-sm text-gray-400 bg-gray-700 px-3 py-1 rounded-full"><i class="fa-solid fa-circle-dot text-green-400 mr-2 animate-pulse"></i>系統運作中</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto py-10 px-4 md:px-8">
        
        <section class="bg-gray-800 rounded-2xl p-6 shadow-xl border border-gray-700 mb-10">
            <h2 class="text-lg font-semibold mb-6 text-gray-300 border-b border-gray-700 pb-2"><i class="fa-solid fa-keyboard mr-2"></i>數據輸入區 (請直接輸入數字)</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                
                <div>
                    <label for="progressInput" class="block text-sm font-medium text-gray-400 mb-2">專案進度 (%)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                            <i class="fa-solid fa-percent text-gray-500"></i>
                        </div>
                        <input type="number" id="progressInput" value="65" min="0" max="100" class="bg-gray-700 border border-gray-600 text-white text-lg rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full pl-10 p-3 outline-none transition-all placeholder-gray-500" placeholder="0-100">
                    </div>
                </div>

                <div>
                    <label for="loadInput" class="block text-sm font-medium text-gray-400 mb-2">伺服器負載 (%)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                            <i class="fa-solid fa-server text-gray-500"></i>
                        </div>
                        <input type="number" id="loadInput" value="42" min="0" max="100" class="bg-gray-700 border border-gray-600 text-white text-lg rounded-lg focus:ring-cyan-500 focus:border-cyan-500 block w-full pl-10 p-3 outline-none transition-all placeholder-gray-500" placeholder="0-100">
                    </div>
                </div>

                <div>
                    <label for="usersInput" class="block text-sm font-medium text-gray-400 mb-2">目前在線人數 (人)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                            <i class="fa-solid fa-users text-gray-500"></i>
                        </div>
                        <input type="number" id="usersInput" value="1250" min="0" class="bg-gray-700 border border-gray-600 text-white text-lg rounded-lg focus:ring-purple-500 focus:border-purple-500 block w-full pl-10 p-3 outline-none transition-all placeholder-gray-500" placeholder="輸入人數">
                    </div>
                </div>

            </div>
        </section>

        <section>
            <h2 class="text-lg font-semibold mb-6 text-gray-300"><i class="fa-solid fa-display mr-2"></i>視覺化面板</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                
                <div class="bg-gray-800 rounded-2xl p-6 shadow-xl border border-gray-700 flex flex-col justify-center transform transition duration-300 hover:scale-105">
                    <div class="flex justify-between items-end mb-4">
                        <h3 class="text-gray-400 font-medium">專案總體進度</h3>
                        <span id="progressText" class="text-3xl font-bold text-indigo-400">65%</span>
                    </div>
                    <div class="w-full bg-gray-700 rounded-full h-4 overflow-hidden">
                        <div id="progressDisplay" class="bg-gradient-to-r from-indigo-500 to-indigo-300 h-4 rounded-full transition-all duration-500 ease-out" style="width: 65%"></div>
                    </div>
                </div>

                <div class="bg-gray-800 rounded-2xl p-6 shadow-xl border border-gray-700 flex flex-col justify-center transform transition duration-300 hover:scale-105">
                    <div class="flex justify-between items-end mb-4">
                        <h3 class="text-gray-400 font-medium">伺服器即時負載</h3>
                        <span id="loadText" class="text-3xl font-bold text-cyan-400">42%</span>
                    </div>
                    <div class="w-full bg-gray-700 rounded-full h-4 overflow-hidden">
                        <div id="loadDisplay" class="bg-cyan-500 h-4 rounded-full transition-all duration-500 ease-out" style="width: 42%"></div>
                    </div>
                    <p id="loadStatus" class="text-xs text-cyan-400 mt-3 text-right">系統狀態良好</p>
                </div>

                <div class="bg-gray-800 rounded-2xl p-6 shadow-xl border border-gray-700 flex flex-col justify-center items-center transform transition duration-300 hover:scale-105">
                    <h3 class="text-gray-400 font-medium mb-2 w-full text-left">活躍用戶數</h3>
                    <div class="flex items-center justify-center flex-1 w-full">
                        <span id="usersText" class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500 tracking-wider">1,250</span>
                    </div>
                </div>

            </div>
        </section>

    </main>

    <script>
        // 取得輸入框與顯示區的元素
        const progressInput = document.getElementById('progressInput');
        const progressText = document.getElementById('progressText');
        const progressDisplay = document.getElementById('progressDisplay');

        const loadInput = document.getElementById('loadInput');
        const loadText = document.getElementById('loadText');
        const loadDisplay = document.getElementById('loadDisplay');
        const loadStatus = document.getElementById('loadStatus');

        const usersInput = document.getElementById('usersInput');
        const usersText = document.getElementById('usersText');

        // 監聽專案進度變化
        progressInput.addEventListener('input', (e) => {
            let val = Math.max(0, Math.min(100, e.target.value || 0)); // 限制在 0-100 之間
            progressText.innerText = val + '%';
            progressDisplay.style.width = val + '%';
        });

        // 監聽伺服器負載變化 (加入顏色警告邏輯)
        loadInput.addEventListener('input', (e) => {
            let val = Math.max(0, Math.min(100, e.target.value || 0));
            loadText.innerText = val + '%';
            loadDisplay.style.width = val + '%';
            
            // 根據數字改變顏色與狀態文字
            if (val > 80) {
                loadDisplay.className = 'bg-red-500 h-4 rounded-full transition-all duration-500 ease-out';
                loadText.className = 'text-3xl font-bold text-red-500';
                loadStatus.innerText = '⚠️ 警告：負載過高！';
                loadStatus.className = 'text-xs text-red-500 mt-3 text-right animate-pulse';
            } else if (val > 60) {
                loadDisplay.className = 'bg-yellow-500 h-4 rounded-full transition-all duration-500 ease-out';
                loadText.className = 'text-3xl font-bold text-yellow-500';
                loadStatus.innerText = '系統負載偏高';
                loadStatus.className = 'text-xs text-yellow-500 mt-3 text-right';
            } else {
                loadDisplay.className = 'bg-cyan-500 h-4 rounded-full transition-all duration-500 ease-out';
                loadText.className = 'text-3xl font-bold text-cyan-400';
                loadStatus.innerText = '系統狀態良好';
                loadStatus.className = 'text-xs text-cyan-400 mt-3 text-right';
            }
        });

        // 監聽在線人數變化 (加入千分位逗號格式化)
        usersInput.addEventListener('input', (e) => {
            let val = Number(e.target.value || 0);
            usersText.innerText = val.toLocaleString('en-US'); // 自動加上 1,000 這種逗號
        });
    </script>
</body>
</html>
