<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶可夢頂級帳號庫 - 雲端同步系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 🌟 你的 Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyAXHqvXLLTmYl8kVV1fR0gJRFangwV85n8",
            authDomain: "pokemon-acc.firebaseapp.com",
            projectId: "pokemon-acc",
            storageBucket: "pokemon-acc.firebasestorage.app",
            messagingSenderId: "51529572144",
            appId: "1:51529572144:web:ae349a50d1152a755532f5",
            measurementId: "G-02Q75S323X",
            databaseURL: "https://pokemon-acc-default-rtdb.firebaseio.com" // 自動補上 DB URL
        };

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const inventoryRef = ref(db, 'inventory');

        // --- 全域變數 ---
        let inventoryData = [];

        // --- 核心功能：監聽雲端資料變動 ---
        onValue(inventoryRef, (snapshot) => {
            const data = snapshot.val();
            inventoryData = [];
            if (data) {
                // 將物件轉換為陣列並排序（新的在前）
                Object.keys(data).forEach(key => {
                    inventoryData.push({ uid: key, ...data[key] });
                });
                inventoryData.sort((a, b) => b.timestamp - a.timestamp);
            }
            renderInventory();
        });

        // --- 新增帳號到雲端 ---
        window.addAccountToInventory = function() {
            const accountId = document.getElementById('g_id').value.trim();
            if(!accountId) { alert("請至少輸入帳號代碼！"); return; }

            const newItem = {
                accountId: accountId,
                level: document.getElementById('g_level').value,
                team: document.getElementById('g_team').value,
                price: document.getElementById('g_price').value || "未標價",
                stardust: document.getElementById('g_stardust').value || "未知",
                fullText: encodeURIComponent(window.generateText()),
                timestamp: Date.now()
            };

            const newPostRef = push(inventoryRef);
            set(newPostRef, newItem);

            // 清理
            document.getElementById('g_id').value = '';
            document.getElementById('g_hundos').value = '';
            window.clearImage();
        };

        // --- 從雲端刪除 ---
        window.deleteAccount = function(uid) {
            if(confirm('確定要從雲端刪除這筆資料嗎？所有裝置都會同步消失喔！')) {
                remove(ref(db, `inventory/${uid}`));
            }
        };

        // --- 渲染表格 ---
        function renderInventory() {
            const tbody = document.getElementById('inventoryBody');
            tbody.innerHTML = ''; 

            inventoryData.forEach(item => {
                const newRow = document.createElement('tr');
                newRow.className = 'hover:bg-blue-50 transition-colors bg-white border-b border-gray-100';
                
                let teamColor = 'text-gray-500';
                if(item.team === '紅隊') teamColor = 'text-red-500';
                if(item.team === '藍隊') teamColor = 'text-blue-500';
                if(item.team === '黃隊') teamColor = 'text-yellow-500';

                newRow.innerHTML = `
                    <td class="px-6 py-4 font-mono font-bold text-gray-900 uppercase">${item.accountId}</td>
                    <td class="px-6 py-4 text-sm font-bold ${teamColor}">${item.level}等 ${item.team}</td>
                    <td class="px-6 py-4 text-sm text-gray-600">${item.stardust}</td>
                    <td class="px-6 py-4 text-sm font-bold text-red-600">$ ${item.price}</td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="window.copyInventoryText('${item.fullText}', this)" class="bg-gray-800 hover:bg-black text-white px-3 py-1.5 rounded-lg text-xs font-medium transition-all shadow-sm">
                            <i class="far fa-copy mr-1"></i>複製文案
                        </button>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="window.deleteAccount('${item.uid}')" class="text-red-400 hover:text-red-600 transition-colors p-2"><i class="fas fa-trash-alt"></i></button>
                    </td>
                `;
                tbody.appendChild(newRow);
            });

            document.getElementById('inventoryCount').innerText = inventoryData.length;
            document.getElementById('emptyState').style.display = inventoryData.length === 0 ? 'block' : 'none';
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c7c7cc; border-radius: 8px; }
        .poke-checkbox { width: 1rem; height: 1rem; color: #2563eb; background-color: #f3f4f6; border-color: #d1d5db; border-radius: 0.25rem; cursor: pointer; }
        #imagePreview { max-height: 200px; object-fit: contain; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased relative">

    <header class="sticky top-0 z-50 glass-effect border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2">
                    <div class="bg-blue-600 p-2 rounded-lg text-white shadow-md"><i class="fas fa-layer-group text-xl"></i></div>
                    <span class="text-xl font-bold tracking-tight text-gray-900">寶可夢雲端庫存系統</span>
                </div>
                
                <div class="flex items-center gap-2">
                    <input type="password" id="geminiApiKey" placeholder="Google AI Key" class="p-1.5 border border-gray-300 rounded text-xs w-32 focus:ring-2 focus:ring-blue-500">
                    <button onclick="saveApiKey()" class="bg-gray-800 hover:bg-black text-white px-3 py-1.5 rounded text-xs">儲存金鑰</button>
                    <button onclick="exportTableToCSV('寶可夢庫存總表.csv')" class="bg-green-600 hover:bg-green-700 text-white px-4 py-1.5 rounded text-sm font-medium flex items-center gap-2 ml-2">
                        <i class="fas fa-file-excel"></i>匯出 CSV
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 mb-8">
            <div class="flex justify-between items-center mb-4 border-b border-gray-100 pb-4">
                <h2 class="text-xl font-bold text-gray-800"><i class="fas fa-cloud-upload-alt text-blue-500 mr-2"></i>雲端建檔</h2>
                <button type="button" onclick="addAccountToInventory()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-xl font-bold transition-all shadow-md transform hover:scale-105 flex items-center gap-2">
                    <i class="fas fa-plus-circle"></i> 同步至雲端
                </button>
            </div>

            <form id="generatorForm" class="grid grid-cols-1 md:grid-cols-5 gap-6">
                <div class="space-y-3 bg-gray-50 p-3 rounded-lg border border-dashed border-gray-300 flex flex-col items-center justify-center relative">
                    <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="previewImage(event)">
                    <label for="imageInput" class="cursor-pointer bg-white border border-gray-300 text-gray-600 px-3 py-1.5 rounded text-xs hover:bg-gray-100 w-full text-center font-bold">
                        <i class="fas fa-upload mr-1"></i>上傳截圖
                    </label>
                    <div class="w-full flex justify-center overflow-hidden">
                        <img id="imagePreview" src="" alt="預覽圖" class="hidden rounded shadow-sm w-full">
                        <span id="imagePlaceholder" class="text-xs text-gray-400 py-8">尚未上傳圖片</span>
                    </div>
                    <button type="button" id="aiBtn" onclick="analyzeImage()" class="hidden w-full bg-purple-600 hover:bg-purple-700 text-white px-3 py-1.5 rounded text-xs font-bold mt-2">
                        <i class="fas fa-robot mr-1"></i>AI 自動辨識
                    </button>
                    <button type="button" id="clearImageBtn" onclick="clearImage()" class="hidden absolute top-2 right-2 text-red-500 bg-white rounded-full w-6 h-6 flex items-center justify-center shadow"><i class="fas fa-times"></i></button>
                </div>

                <div class="space-y-3">
                    <h3 class="font-bold text-sm text-gray-500 uppercase tracking-wider">1. 基本資訊</h3>
                    <div><label class="block text-xs text-gray-700 mb-1">帳號代碼</label><input type="text" id="g_id" class="w-full p-2 border border-gray-300 rounded text-sm uppercase"></div>
                    <div class="flex gap-2">
                        <div class="w-1/2"><label class="block text-xs text-gray-700 mb-1">等級</label><input type="number" id="g_level" value="70" class="w-full p-2 border border-gray-300 rounded text-sm"></div>
                        <div class="w-1/2"><label class="block text-xs text-gray-700 mb-1">陣營</label>
                            <select id="g_team" class="w-full p-2 border border-gray-300 rounded text-sm">
                                <option value="藍隊">藍隊</option><option value="紅隊">紅隊</option><option value="黃隊">黃隊</option>
                            </select>
                        </div>
                    </div>
                    <div><label class="block text-xs text-gray-700 mb-1">售價</label><input type="number" id="g_price" class="w-full p-2 border border-yellow-400 rounded text-sm bg-yellow-50"></div>
                    <div><label class="block text-xs text-gray-700 mb-1">星塵</label><input type="text" id="g_stardust" class="w-full p-2 border border-gray-300 rounded text-sm"></div>
                </div>

                <div class="space-y-2">
                    <h3 class="font-bold text-sm text-gray-500 uppercase tracking-wider">2. 亮點特徵</h3>
                    <label class="flex items-center gap-2 text-xs cursor-pointer"><input type="checkbox" id="chk_marshadow" class="poke-checkbox">瑪夏多調查</label>
                    <label class="flex items-center gap-2 text-xs cursor-pointer"><input type="checkbox" id="chk_kyurem" class="poke-checkbox">酋雷姆合體</label>
                    <label class="flex items-center gap-2 text-xs cursor-pointer"><input type="checkbox" id="chk_zamazenta" class="poke-checkbox">蒼響劍盾</label>
                    <label class="flex items-center gap-2 text-xs cursor-pointer"><input type="checkbox" id="chk_necrozma" class="poke-checkbox">奈克洛茲瑪合體</label>
                    <label class="flex items-center gap-2 text-xs cursor-pointer"><input type="checkbox" id="chk_dyna" class="poke-checkbox">極巨化系統</label>
                    <label class="flex items-center gap-2 text-xs cursor-pointer"><input type="checkbox" id="chk_mega_ray" class="poke-checkbox">烈空坐能量</label>
                    <label class="flex items-center gap-2 text-xs cursor-pointer"><input type="checkbox" id="chk_move_groudon" class="poke-checkbox">斷崖之劍</label>
                    <label class="flex items-center gap-2 text-xs cursor-pointer"><input type="checkbox" id="chk_move_kyogre" class="poke-checkbox">根源波動</label>
                    <label class="flex items-center gap-2 text-xs cursor-pointer"><input type="checkbox" id="chk_move_ray" class="poke-checkbox">畫龍點睛</label>
                </div>

                <div class="col-span-1 md:col-span-2 space-y-3">
                    <h3 class="font-bold text-sm text-gray-500 uppercase tracking-wider">3. 詳細數據</h3>
                    <input type="text" id="g_hundos" placeholder="AI 辨識出的百神名單..." class="w-full p-2 border border-purple-200 rounded text-sm bg-purple-50">
                    <div class="grid grid-cols-5 gap-2">
                        <div><label class="block text-[10px]">神獸</label><input type="number" id="st_legend" class="w-full p-1 border rounded text-sm"></div>
                        <div><label class="block text-[10px]">色違神</label><input type="number" id="st_shiny_leg" class="w-full p-1 border rounded text-sm"></div>
                        <div><label class="block text-[10px]">裝扮</label><input type="number" id="st_costume" class="w-full p-1 border rounded text-sm"></div>
                        <div><label class="block text-[10px]">色違裝</label><input type="number" id="st_shiny_costume" class="w-full p-1 border rounded text-sm"></div>
                        <div><label class="block text-[10px]">特背</label><input type="number" id="st_bg_special" class="w-full p-1 border rounded text-sm"></div>
                        <div><label class="block text-[10px]">紀背</label><input type="number" id="st_bg_comm" class="w-full p-1 border rounded text-sm"></div>
                        <div><label class="block text-[10px]">極巨</label><input type="number" id="st_dyna" class="w-full p-1 border rounded text-sm"></div>
                        <div><label class="block text-[10px]">超極</label><input type="number" id="st_giga" class="w-full p-1 border rounded text-sm"></div>
                        <div><label class="block text-[10px]">完美</label><input type="number" id="st_perfect" class="w-full p-1 border rounded text-sm"></div>
                        <div><label class="block text-[10px]">色違完</label><input type="number" id="st_shundo" class="w-full p-1 border rounded text-sm"></div>
                    </div>
                    <textarea id="g_custom_fire" rows="2" class="w-full p-2 border border-red-200 rounded text-sm" placeholder="自訂稀有怪..."></textarea>
                </div>
            </form>
        </div>

        <section class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                <h2 class="text-lg font-bold text-gray-800"><i class="fas fa-database text-blue-500 mr-2"></i>雲端同步總表 (<span id="inventoryCount">0</span>)</h2>
            </div>
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left border-collapse" id="inventoryTable">
                    <thead>
                        <tr class="bg-white text-gray-500 text-xs font-semibold border-b border-gray-200 uppercase tracking-wider">
                            <th class="px-6 py-4">帳號代碼</th><th class="px-6 py-4">等級陣營</th><th class="px-6 py-4">星塵</th><th class="px-6 py-4">售價</th><th class="px-6 py-4 text-center">文案</th><th class="px-6 py-4 text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100" id="inventoryBody"></tbody>
                </table>
                <div id="emptyState" class="text-center py-12 text-gray-400">目前雲端庫存為空。</div>
            </div>
        </section>
    </main>

    <textarea id="hiddenCopyArea" class="hidden"></textarea>

    <script>
        // --- 舊有的輔助功能 ---
        document.getElementById('geminiApiKey').value = localStorage.getItem('geminiApiKey') || '';
        window.saveApiKey = function() {
            localStorage.setItem('geminiApiKey', document.getElementById('geminiApiKey').value.trim());
            alert('AI Key 已儲存！');
        };

        window.previewImage = function(event) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('imagePreview').src = e.target.result;
                document.getElementById('imagePreview').classList.remove('hidden');
                document.getElementById('imagePlaceholder').classList.add('hidden');
                document.getElementById('aiBtn').classList.remove('hidden');
                document.getElementById('clearImageBtn').classList.remove('hidden');
            }
            reader.readAsDataURL(event.target.files[0]);
        };

        window.clearImage = function() {
            document.getElementById('imageInput').value = '';
            document.getElementById('imagePreview').classList.add('hidden');
            document.getElementById('imagePlaceholder').classList.remove('hidden');
            document.getElementById('aiBtn').classList.add('hidden');
            document.getElementById('clearImageBtn').classList.add('hidden');
        };

        window.generateText = function() {
            const v = (id) => document.getElementById(id).value.trim();
            const checked = (id) => document.getElementById(id).checked;
            let res = [v('g_id'), `${v('g_level')}等${v('g_team')}`];
            if(checked('chk_marshadow')) res.push(`🔥瑪夏多特殊調查🔥`);
            if(v('g_custom_fire')) v('g_custom_fire').split('\n').forEach(l => res.push(`🔥${l.trim()}🔥`));
            if(checked('chk_kyurem')) res.push(`‼️酋雷姆合體‼️`);
            if(checked('chk_zamazenta')) res.push(`‼️蒼響劍盾‼️`);
            if(checked('chk_necrozma')) res.push(`‼️奈克洛茲瑪合體‼️`);
            if(checked('chk_dyna')) res.push(`✨可極巨化✨`);
            if(checked('chk_mega_ray')) res.push(`⭐️烈空坐能量夠⭐️`);
            if(checked('chk_move_groudon')) res.push(`固拉多開斷崖之劍`);
            if(checked('chk_move_kyogre')) res.push(`蓋歐卡開根源波動`);
            if(checked('chk_move_ray')) res.push(`烈空坐開畫龍點睛`);
            if(v('g_stardust')) res.push(`星塵 ${v('g_stardust')}`);
            if(v('g_hundos')) res.push(`✅${v('g_hundos')}`);
            ['st_legend','st_shiny_leg','st_costume','st_perfect'].forEach(id => {
                if(v(id)) res.push(`✅數據: ${v(id)}`);
            });
            if(v('g_price')) res.push(`💰價格 ${v('g_price')}`);
            return res.join('\n');
        };

        window.copyInventoryText = function(encodedText, btn) {
            const area = document.getElementById('hiddenCopyArea');
            area.style.display = 'block';
            area.value = decodeURIComponent(encodedText);
            area.select();
            document.execCommand('copy');
            area.style.display = 'none';
            const old = btn.innerHTML;
            btn.innerHTML = '已複製';
            setTimeout(() => btn.innerHTML = old, 1500);
        };

        window.analyzeImage = async function() {
            const apiKey = document.getElementById('geminiApiKey').value;
            if(!apiKey) { alert('請填寫 AI Key'); return; }
            const file = document.getElementById('imageInput').files[0];
            const base64 = await new Promise(r => {
                const reader = new FileReader();
                reader.onload = () => r(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            });
            const aiBtn = document.getElementById('aiBtn');
            aiBtn.disabled = true; aiBtn.innerText = '辨識中...';
            try {
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    body: JSON.stringify({ contents: [{ parts: [{ text: "辨識圖中寶可夢名，用中文逗號隔開，只給名字。" }, { inlineData: { mimeType: file.type, data: base64 } }] }] })
                });
                const data = await resp.json();
                document.getElementById('g_hundos').value = data.candidates[0].content.parts[0].text;
            } catch (e) { alert('辨識失敗'); }
            aiBtn.disabled = false; aiBtn.innerText = 'AI 自動辨識';
        };

        window.exportTableToCSV = function(filename) {
            let csv = ["\uFEFF帳號代碼,等級陣營,星塵,售價"];
            inventoryData.forEach(item => {
                csv.push(`"${item.accountId}","${item.level}等${item.team}","${item.stardust}","${item.price}"`);
            });
            const blob = new Blob([csv.join("\n")], {type: "text/csv;charset=utf-8;"});
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        };
    </script>
</body>
</html>
